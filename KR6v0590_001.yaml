夕大師入丈室請益問如何是露地白牛和尚寄老下座扭住大師鼻孔大聲斥問是誰大師擺脫禮拜而退或以為參禪有省其實非也自傳三其後受道老器識命移住法師寮飯餘為講教觀綱宗相宗八要每與圓映會泉學立三支比量大師於法師寮得讀弘明集廣弘明集法琳傳等護教文獻遠植日後弘護佛教之因自傳三七月望佛教自恣日大師於天童御書樓與圓映訂盟為弟兄自傳三圓映手書盟書今猶存文云同圓種智夫綱常之大莫大於五倫而兄弟朋友乃五倫之二也世有生無兄弟以異姓結手足之親分列友朋竟同盟寄腹心之託即如桃園結義管鮑通財同安樂共死生千載咸欽氣義而吾儕身居方外跡托塵中雖曰割愛辭親尤貴擇師處友然友有善友者焉有惡友者焉善者固可有益於身心惡者難免轉妨乎道業悟自投身法苑訪道禪林所見同袍如許求其如弟之少年聰敏有志進修者亦罕逢其匹也兼之氣求聲應心志感孚是以欲結同參以為道助恭對我佛座前焚香致禱披誠發願願得同究一乘妙旨同研三藏玄文同為佛國棟梁同作法門砥柱同宏大教同演真詮乃至最末後身同證菩提同成正覺互相愛念全始全終今則謹立義規數則以為助道因緣其各永遵俾成法益一則以心印心親同骨肉不可少懷異見陽奉陰違一則白首如新歷久彌敬不可泛交朋黨背親向疏一則以善勸勉有過針規不可弗納忠言任從己意一則疾病相扶患難相救不可忘恩負義袖手旁觀一則安危與共憂樂是均不可但顧自身不思大義一則事必相商言當忍納不可諸般瞞昧片語分離一則出處行藏追隨晤對不可輕離忍別致歎參商一則各自立志弘法利生不可虛度韶光甘居人下以上義規各宜慎重右録盟心律一首天涯聚首兩歡然魚水相親夙有緣手足情同交莫逆安危誓共義周全盟心志在真心印助道功成覺道圓並建法幢於處處迷津廣作度人船時維光緒三十二年七月自恣日於太白名山奎煥樓盟兄今悟書時年二十九歲本命戊寅宮五月十二日子時建生按太白名山即天童今悟為圓映出家時之法名乃曹洞宗派耀古復騰今之今其後接寧波七塔寺法乃改名弘悟故與圓映法師事略不同又奎煥樓乃樓之正名以樓藏清帝御書因俗稱御書樓樓有關帝像然自圓映主席天童改建法堂上層為藏經樓即移供關帝像於法堂樓上圓映時年二十九能屈交十七齡未滿之大師眼力實有足多者秋初仍回永豐寺續受楞嚴兼閲四書五經自傳三冬奘老朝峨嵋山回購得滋補參藥授令服之多年痼疾霍然全愈色身日臻康健自傳三是年出家二年大師初攝肖影且自為題昧盦詩録你你我認識你我認識你你就是你你自題光緒三十三年丁未一九七一九八大師十九歲是年夏大師再去天童聽道老講楞嚴經閲楞嚴蒙鈔楞嚴宗通愛不忍釋暇從道老受相宗八要及五教儀於教義乃略植初基自傳三秋辭歧老去慈溪汶溪西方寺閲大藏經初以道老讚歎閲藏利益心生嚮往圓映力贊其成初為修書介紹次復親送大師去汶溪西方寺閲藏大有造於大師之一生故大師自謂後來他圓映與我雖不無抵牾我想到西方寺的閲藏因緣終不忘他的友誼自傳三同閲藏經者有淨寬後為鎮江金山寺方丈本一後為沙市章華寺方丈昱山昱山法名慧月別署懶石常州人出家於普陀山普慧菴與大師同戒朝夕晤對研究唱和者間續歷二三載真摯高純為大師生平第一益友人物志憶七自傳三輯定毗陵集跋後冬大師閲般若經有省蛻脫俗塵於佛法得新生自此始如自傳三云積月餘大般若經垂盡身心漸漸凝定一日閲經次忽然失卻身心世界泯然空寂中靈光湛湛無數塵剎煥然炳現如凌虛影像明照無邊座經數小時如彈指頃歷好多日身心猶在輕清安悅中旋取閲華嚴經恍然皆自心中現量境界伸紙飛筆隨意舒發日數十紙纍千萬字所有禪録疑團一概冰釋心智透脫無滯所學內學教義世諦文字悉能隨心活用自傳三我的宗教經驗告徒衆書相宗新舊兩譯不同論書後是年秋冬大師目光忽成近視自傳三光緒三十四年戊申一九八一九九大師二十歲初春溫州華山雲泉來西方寺華山蓋開僧界風氣之先者見大師神慧乃為力陳世界與中國之新趨勢及佛教非速革流弊振興僧學不為功時大師禪慧資心頗不謂然與辨十餘日而莫決因請觀其所攜新籍康有為大同書梁啓超新民說章太炎告佛子書告白衣書嚴復天演論談嗣同仁學不覺為之心折遂與華山訂莫逆交大師以佛學救世之宏願由此勃發而不復能自遏一轉先之超俗入真而為回真向俗自傳四華山法師辭世記相宗新舊兩譯不同論書後按大師遇華山辭世記作光緒三十四年告徒衆書亦謂民國前四年起受華山攜來康有為大同書談嗣同仁學等影響然自傳敘與華山相遇已繼謂次年夏間七塔寺請諦間法師講四教儀人物志憶亦謂民國前五年讀到先生以白衣章炳麟署名的告四衆佛子書是則大師之遇華山為光緒三十三年冬二說相左未知孰正今謂晚年不免廢忘致誤取早年之說為定夏聽諦間講四教儀集注於寧波七塔寺華山欲乘間有所宣導故與淨寬力勸大師往聽自傳三四一日傍晚諦老答學衆問次明七識無體八識有體為別大師就理申問詰難數番諦老為𥈭眙半晌聽衆有非議者諦老初不以為忤自傳三諦間法名古虛浙江黃巖朱氏子業藥困於資光緒六年投臨海白衣寺出家九年初聽法華於敏曦十二年初講法華於杭之六通一再掩關於慈溪蘆山寺溫州頭陀寺參禪於金山得天臺教法於跡端融法緣甚盛為當時講師巨擘是年講於七塔寺年五十寶靜諦公老法師年譜鮑海秋諦間法師幼年略狀時圓映以某寺寺産糾紛開罪寧波官府被拘禁於縣衙大師致函寄老俠情噴湧怪其不為營救語涉過激寄老來七塔寺面施呵責大師乃不待法會終了避之於平望小九華寺自傳三大師於小九華識革命僧棲雲為大師與黨人往來之始因從棲雲讀及孫文與章太炎之民報梁啓超之新民叢報鄒容之革命軍等大受革命思想之掀動自傳四棲雲俗姓李湘人弱冠出家嘗從寄老參學歷數年捨而去日本留學加入同盟會與徐錫麟秋瑾等回國潛圖革命時雖西裝革履猶復時以僧裝隱僧寺自傳四秋得寄老諒解乃返甬自傳四時棲雲以革命嫌疑陷吳江獄大師懇奘老為求寄老向蘇撫寄老詩友疏解因得開脫自傳四時寄老主辦寧波府屬僧教育會大師與圓映棲雲襄贊之大師之從事佛教運動自此始先數年清廷廢科舉興學堂各地教育會每藉口經費無著提僧産充學費假僧舍作學堂僧界遑遑不可終日日僧水野梅曉伊藤賢道等乘機來中國誘引中國僧寺受其保護杭州即有三十餘寺歸投真宗之本願寺遇事即由日本領事館出為維護事發清廷乃有保護佛教僧衆自動興學自護教産另立僧教育會之明令浙江之寄禪松風華山江蘇之月霞北京之覺先等先後相共致力於自動興學之舉時僧教育會會長有二一出家長老一地方士紳唯長老多無能士紳多土劣僧寺雖負擔經費以興學辦理多難完善自傳四略史三十年來之中國佛教華山法師辭世記議佛教辦學法從中國一般教育說到僧教育冬寄老應江蘇省僧教育會之邀參加鎮江金山寺成立大會大師與棲雲隨行各有演說自傳四略史歸途遊蘇州之虎丘詩存回甬度年自傳五按無言太虛大師行略謂宣統元年年十九參加江蘇省教育會誤宣統元年己酉一九九一九一大師二十一歲春大師以華山之策發棲雲之慫恿就學於南京祇洹精舍自傳五華山法師辭世記略史凡半年於古文及詩頗多進益楊仁老授楞嚴蘇曼殊授英文諦老任學監同學有仁山智光開悟惠敏等與梅光羲歐陽漸邱晞明亦有同學之誼自傳五三十年來之中國佛教按柳無忌蘇曼殊年譜曼殊於去年任教祇洹十二月由上海去日本至是年八月始返上海大師今春去學如何得值曼殊授課疑按楊仁老曾隨使節去日本與南條文雄等遊因歸心佛教於南京成立刻經處流通佛典民國來佛學之興頗得其力光緒三十四年得錫蘭摩訶菩提會達磨波羅書約與共同復興佛教以弘布於世界楊氏因於去秋成立祇洹精舍為佛教人才而興學且有世界眼光者以楊氏為第一人惜以經費絀僅辦一年而輟秋大師因華山薦以自代任普陀山化雨小學教員自傳五略史十二月祝寄老五九預慶六秩華誕於天童寺自傳五呈詩二絶詩存再回西方寺閲藏過年自傳四五是年道老任北京法源寺住持北方佛學漸興南嶽道階法師小傳圓映住持寧波接待寺並辦佛教講習所葉性禮圓映法師事略大師期望之甚深賦詩持贈詩存遺會入一乘皆佛法才皈三寶即天人當為末劫如來使剎剎塵塵遍現身三千世界真經典剖出微塵也大奇珍重斫輪運斤手總令機教得相宜宣統二年庚戌一九一一九一一大師二十二歲正月棲雲自廣州來西方寺邀大師去廣州廣州白雲山雙溪寺住持月賓與棲雲善乃因棲雲邀大師去廣州協助組織僧教育會自傳五人物志憶四是月革命黨起事廣州不成二月汪兆銘謀刺攝政王於北京革命之機運日迫二月大師偕棲雲放海南行舟次詩有幻海飄蓬餘結習亂雲籠月見精神句意興甚豪經福建香港抵廣州時已三月以月賓為湘人與粵僧有語言俗習之隔礙致僧教育會組織未成自傳五略史陰符經稱性直解序按大師於民國六年編東瀛采真録云所遊未踰閩粵江皖大師抵閩應在此時夏粵僧志光及魯少皥鄒海濱潘達微等發起於華林寺迎月賓及棲雲與大師講佛學大師旋就志光之獅子林組設佛學精舍按時講說講次編出教觀詮要佛教史略為大師講學著述之始自傳五略史德音孔昭之鄒校長按佛教史略有今國家政體變更今既有佛教總會之設之句可知臨刊已有所修正教觀詮要雖敷陳臺家大意然思想自由之適新精神躍然可見如云善學佛者依心不依古依義不依語隨時變通巧逗人意依天然界進化界種種學問種種藝術發明真理裨益有情是謂行菩薩道布施佛法終不以佛所未說而自畫佛所已說而自泥埋沒己靈人云亦云佛教史略論史猶未足言精確然大師思想之特色已充分流露其一論歷史之演變重乎人有望於英雄佛子之興如云脫有馬鳴龍樹無著天親其人乘此世界文明過渡之潮流安知其不能化而為世界佛教之中興與全盛時代乎人能弘道非道弘人歷史第為英雄之譜牒寧不信哉余所以一念及而今而後之佛教每不禁英雄佛子是祝焉其二論佛教之趨變為世界佛教宜變出家本位而重在家如云我國佛教之不發達以佛學拘於僧界以僧界局於方外阻之也其以僧界拘方外局者皆取形式而不取精神者耳然今日之中華民國既度入世界時代政教學術無一不變佛教固非變不足以通矣我佛教等視衆生猶如一子豈規規然拘親疏於緇白之間哉維摩詰李通玄皆在家之菩薩也今世之學士苟有抱偉大之思想沈重之志願深遠之慈悲宏毅之魄力者荷擔此救世之大使命是則尤喁喁深望者也時以佛學與大師交往者有鄧爾雅林君復夏同和鄒魯葉夏聲陳靜濤等從楊仁老學佛之梅光羲時在廣州為司法研究館監督亦時相往還梅氏以新刊之成唯識論述記相贈大師攜以自隨時一披閲自傳五相宗新舊兩譯不同論書後梅光羲法相唯識學概論序九月詩人易哭庵來遊白雲山訪大師於雙溪寺易為寄老詩友戊申夏識大師於七塔寺時任肇慶兵備道重陽前四日值易之誕辰因偕張伯純汪莘伯盛季瑩金芝軒張檢齊于明若等詩人名宦來遊共集安期巖唱和竟日大師登鶴舒臺詩云一自成仙去名山鶴有臺白雲迎客掩丹桂傍巖開鑄此靈奇境應窮造化才一亭清寂寂煮茗共傾杯詩為盛汪等稱許每向人吟誦因得獲知於廣州大詩紳梁節庵江霞公自傳五人物志憶九是秋月賓退住持職衆以大師得粵中達官大紳推重因舉為雙溪寺住持是為大師住持寺院之始略史人物志憶四十一月與粵中詩僧秋澄去肇慶訪易哭庵遍遊鼎湖山七星巖諸勝存舟過羚羊峽鼎湖蓮洞諸詩自傳五詩存是年大師在粵頗與黨人相過從交有潘達微莫紀彭梁尚同等以是閲及托爾斯泰巴枯寧蒲魯東克魯泡特金馬克斯等譯著大師之政治思想乃由君憲而國民革命而社會革命而無政府主義自傳四致吳稚暉書是年江蘇成立僧師範月霞諦間主持之三十年來之中國佛教宣統三年辛亥一九一一大師二十三歲春大師講維摩詰經於白雲山自傳五發起改雙溪寺為摩訶講園並為序摩訶講園章程序大師倡導之諸宗平等各有殊勝之義序文亦見端倪如云竊謂禪教淨律實須各殊其途直指旁通方能普同其歸唯各盡其分乃各成其用唯各成其用乃各盡其性全其性則無乎不具而實未嘗離乎此故曰一即一切一切即一大師與黨人往還日密黨人間多豪放不羈大師與之俱化自謂乃不復若昔之循謹然各種祕密集會已時參預令我煆煉敢以入魔敢以入險的勇氣豪膽者亦由於此自傳四其參與祕密集會羅落花太虛大師軼聞曾約略道及太虛法師之南來也在建國前一二年爾時吾黨雲集廣州圖屋清社師偕吾黨出生入死寄錫白雲雙溪寺憶余之謁師也於鄭仙祠似十一月之夜朱執信鄒海濱葉兢生諸先生挈余繞十八洞行至山門虛掩昏無人焉吾輩轉曲廊廊盡荒院數楹琉璃一點黯黯欲滅趨前從紙窗內窺見有擁破衲披斗蓬之黃面瞿曇兀坐於室海濱先生曰此即太虛師也余齒稚第知從諸先生後挺身擊殺韃虜密勿之謀未之敢預也諸先生與師作耳語余則立風簷下延佇有無瞰我者昏燈如霧余隱約辨師為三十許人惡知是時師才二十許耶三月二十九日有廣州之役黨人殉者叢葬於黃花岡大師哀之作弔黃花岡七古自傳四人物志憶九按弔黃花岡舊作久佚陳靜濤猶憶其初四句云南粵城裡起戰爭隆隆炮聲驚天地為復民權死亦生大書特書一烈字編寫黃花岡詩話之紫楓以弔黃花岡為題披露大師一天星斗明明見滿地胭脂點點看詩其實此為月夜不寐疊前韻寄汪公篤甫非弔黃花岡詩特與此有關耳四月大師以廣州革命失敗急退雙溪寺住持移居盛季瑩所寓江西會館自傳四五人物志憶九時官廳偵黨人急大師自恐不免頗有韜晦之意雜感云書劍聚成千古恨英雄都化兩間塵從今刪卻閒愁恨臥看荒荒大陸淪孤吟斷送春三月萬事都歸夢一場護取壁間雙寶劍休教黑夜露光芒初九日棲雲為官方所逮羈押海南縣民事待質所陳靜濤每月到所探視及資助之至八月十九出獄乃止陳靜濤為編者說於棲雲處得大師弔黃花岡詩涉革命嫌疑官方猶以大師為雙溪寺住持發兵圍白雲山索之不得大師得訊匿居潘達微之平民報館自傳四人物志憶九按人物志以此為五月事殆誤棲雲被逮光復乃得釋曾隸陳炯明部為團長又為花縣清遠從化三屬清鄉司令及兵站司令等自傳四後息影滬上大師圓寂猶來致哀悼大師因事不安於粵又窘於財思歸故鄉而不得寄汪公篤甫有云年來卻為嚶嚀指作詩誤此際真成去住難幸清鄉督辦江孔殷力為向粵督開脫汪莘伯盛季莘等官紳亦多為疏解汪莘伯等復資助之因得以離粵而寢其事自傳四人物志憶九五月返滬至寧波謁奘老寄老因寄老識詩友馮君木因君木又識章巨摩穆穆齊等自傳五六人物志憶五大師往普陀山度夏寓錫麟堂自題所居樓曰萬緑軒自傳六詩存錫麟了老為大師教授阿闍黎遇之甚厚十餘年間常多資助自傳八是夏時訪昱山於般若精舍因識楚詩僧豁宣湛庵遂成契友多所唱和自傳六人物志憶七輯定毗陵集跋後印老閲及大師詩文深為讚許因和掩字韻以相勉相訪每深談移晷自傳六印光法名聖量陝西郃陽趙氏子初業儒和韓歐闢佛之議嗣悔前非出家於終南二十六歲參學紅螺山專精淨業光緒十九年於北京圓通寺遇普陀法雨寺住持化聞邀之南來自是卓錫法雨或閉關或閲藏一以淨業為歸是年年五十一妙真等中興淨宗印光大師行業記宣統元年大師任教普陀時即見知於印老自傳五秋初大師應寄老召至天童時以推行地方自治占寺奪産之風益急諸方集會上海商推寄老進京請願大師為擬請願保護及改革振興佛教計劃書經神州日報主筆汪德淵修潤且將有隨侍入京之行旋以川漢鐵路風潮日緊未果行自傳六略史其間大師至上海寓愛儷園時烏目山僧黃宗仰為愛儷園主羅迦陵所知經印頻伽精舍大藏經於園民國二年始完成自傳六人物志憶三按自傳及人物志憶並以寓愛儷園事為由粵初歸滬上時今檢詩存應為秋初寓愛儷園與白慧同作有句云萬樹蟬聲身世感一園秋色古今心荷蓋瀟瀟來夜雨桐陰寂寂寄秋吟愛儷園贈別白慧有句云逢君卻喜秋風健贈小隱即烏目山僧有句云人天各有蒼茫感悽斷秋聲暮色間其為秋季無疑自傳及志憶均誤宗仰俗姓黃出家後得法於鎮江金山江天寺為羅迦陵所重因來滬為籌印頻伽大藏易服從俗名黃中央時與黨人往來且以經濟相資助後失意再度出家任棲霞山住持卒後國民政府為建紀念堂於棲霞大師應昱山招三至西方寺閲藏凡月餘自傳三自傳六人物志憶七八月十九日武昌起義不旋踵而各方響應冬遊慈溪觀音寺又隨了老訪赭山心愷詩存大師養疴於寧波西河沿之觀音寺詩存寺為奘老所住持江浙光復後大師即出甬漫遊滬杭以及江淮以思想言論之相近與之聲應氣求者首為江亢虎領導中國社會黨人自傳四自傳六詩存光復之際僧衆組僧軍以參加光復之役者上海有玉皇卻非紹興有開元寺許鐵巖以寺産充軍餉組僧軍推紹興戒珠寺住持諦間任統領鐵巖副之自傳六人物志憶三中華民國元年一九一二辛亥壬子大師二十四歲一月一日辛亥十一月十三日孫文就臨時大總統職於南京通令改用陽曆大師抵南京發起組織佛教協進會設辦事處於毗盧寺因社會黨員戚君晉謁孫總統令與祕書馬君武接談於協進會事得其贊可自傳六略史人物志憶六大師與仁山等開佛教協進會成立會於鎮江金山寺有大鬧金山事件震動佛教界大師自謂我的佛教革命名聲從此被傳開受著人們的尊敬或驚懼或厭惡或憐惜我的佛教革命失敗史其經過情形略如自傳六所說仁山亦到京擬上書教育部以金山寺改辦僧學堂我因告以佛教協進會的方針及此時非辦一學堂的事須謀新中國新佛教之建設若能照協進會的會章進行則辦僧學亦自為其中的一事仁山大喜謂有同學數十人在鎮江亟邀我同往就金山寺開成立會到金山住觀音閣與寺中方丈青權監院蔭屏知客霜亭等籌設開會會場印發會章宣言通告鎮江揚州南京上海的各處僧衆及鎮江軍政商學各界開會時到二三百僧衆而各界來賓亦到三四百人以鎮江社會黨員占多數發起人推我為主席講明設會宗旨宣讀會章尚稱順利但仁山演說後即有揚州僧寂山登臺演說批駁激動仁山怒氣再登臺歷述青權寂山等向來的專制提議即以金山寺辦學堂全部寺産充為學費來賓大為鼓掌寂山向僧衆高聲呼打群衆騷動通過仁山的提議並推舉我與仁山負責接收金山寺為會所籌備開辦僧學當晚仁山率草餘同學入寺劃定會所房屋次晨即開始辦公入庫房查點帳簿及向禪堂宣布辦學以鎮江事概付仁山主持自去南京霜亭等已於某夜辛亥十二月二十外率工役數十人打入會所仁山等數人受刀棍傷遂起訴法院經月餘判決青權霜亭等首從五六人數年或數月的徒刑而會務及金山寺務均因以停頓紛不可理參看略史按佛教協進會之失敗大師晚年回憶似苦難負責自傳謂會章雖含有以佛教財産辦佛教公共事業的社會革命意味但係取和平進行步驟略史亦謂我以和平態度報告籌備之經過至於衝突原因自傳謂仁山剃度於金山寺房頭觀音閣房頭僧時受寺僧凌壓仁山在學堂時亦因以受其排擠略史則謂他們從前在僧師範學校時曾與楊鎮諸山長老發生過很大的磨擦故結論謂我雖為理論的啓導而在鎮江金山寺等的實行者則另有一群因實際行動太輕率散亂了未幾招來巨大的反擊即歸夭折我的佛教革命失敗史然金山興學固出自仁山主謀而大師當時實以革命手段出之者如佛教月報創刊紀念民二夏作云夫固有以霹靂一聲震醒大多數人之耳目復為大多數人所嫉視而退居反動之地位則佛教協進會是也中興佛教寄禪安和尚傳癸丑冬作云余憤僧衆之委靡頑陋擬用金剛怒目霹靂轟頂之精神搖撼而驚覺之與十數同志創佛教協進會於金山此金剛怒目與霹靂轟頂之精神安得謂之和平二月清帝遜位袁世凱就總統職於北京四月一日大師應寄老召於上海參加中華佛教總會寄老聞大鬧金山事件頗憤新進之鹵莽乃來滬聯合十七布政司舊轄地僧籌創中華佛教總會勸大師停止佛教協進會之進行是日開會於留雲寺唯以籌款助餉請求保護為事自傳六略史三十年來之中國佛教中興佛教寄禪安和尚傳大師起而演說政府保護僧寺係當然責任僧獻軍糧乃人民當然義務僧不須以捐獻求政府保護政府亦不應以保護僧寺要僧籌餉許鐵巖大贊成其說備致傾慕遂成契友自傳六人物志憶三時佛教組織別有謝無量發起之佛教大同會李證剛翊灼等七人發起之佛教會佛教會專事責斥僧尼開緇素相諍之端逮中華佛教總會成立佛教會乃自動取消自傳六三十年來之中國佛教其時大師本平等普濟之佛法究談各種社會主義社會黨而外劉師復之無政府黨亦相接近相習之知名士女有殷仁張天放徐安鎮陳翼龍張克恭林宗素蔡漢俠傅文郁沙淦呂大任等人物志憶八大任記其初識大師之因緣云太虛大師早年生活之片段元年春在上海雲南路仁濟堂開社會主義研究會中有年輕和尚發言獨多與余意亦獨愜詢之始知為太虛法師其立言旨趣則亦謂欲真正解除人民痛苦非於種族革命政治革命而外同時實行社會主義不可自後余兩人過從甚密春暮至寧波訪圓映於接待寺在甬時晤禪友會泉送別詩友湛庵詩存夏遊平湖當湖泛舟訪瀛洲書院詩存作懷故人詩八首民元前詩文契友略見於此湛庵禪長豁宣明微論師昱山琴志樓主豐城劍人盛季瑩淡寧道丈汪莘伯君木居士馮君木心薇畫哲潘達微尚同文俠梁尚同詩存按此據懷湛庵去年於此日白華一笑逢及懷尚同別來一年餘精神常注此而推定秋承鐵巖邀與之偕遊紹興偕鐵巖暮抵越城有秋色淡搖千里碧句盤桓二三月因與劉太白王子餘楊一放王芝如楊小樓陳誦洛等交自傳七人物志憶三時為文刊於紹興公報為普及教育立憲政治等之宣導孫伏園魯迅先生眼中的太虛大師是年楊仁老卒金陵刻經處事由歐陽漸主持民國二年一九一三壬子癸丑大師二十五歲一月八日壬子十二月二日寄老入寂於北京法源寺初以各省占寺奪産之風仍熾而中華佛教總會尚未得政府批准衆舉寄老北上以奠定總會基礎值內政部禮俗司杜某方分別寺産以議提撥寄老力爭而不得直悒甚回法源寺即晚卒詩友熊希齡等以事聞大總統中華佛教總會章程乃經國務院審定公布佛教寺産賴以小安自傳六中興佛教寄禪安和尚傳噩耗南來大師作心喪八指頭陀以志哀悼相隨學道白雲層棒喝當頭領受曾從此更無師我者小窗垂泣涕如繩萬樹梅花竟埋骨一輪明月孰傳心遺詩自足流千古翠冷香寒憶苦吟大師於法門師匠獨折心於寄老蓋其魄力雄厚志願堅毅非一般師家可比寄老亦期望大師甚殷嘗召之至丈室端容霽顏縷告以生平所經歷事並述孟軻氏天將降大任於斯人也一章勉余大師習勞苦而耐枯冷中興佛教寄禪安和尚傳雖以金山事件見憾於寄老而一則恨之又愛之一則畏之又敬之也二月二日二十七日大師參加八指頭陀追悼會於上海靜安寺演說三種革命以抒悲憤自傳六略史我的佛教革命失敗史然為濮一乘主編之佛學叢報所醜詆二十七日僧界全體及各界居士為中華佛教會正會長寄禪和尚開追悼大會太虛和尚演說佛教宜革命有三一組織革命二財産革命三學理革命本報按佛教革命之名詞發現不久度亦妄人之邪說耳若大庭廣衆之間明目張膽放言高論則未免肆無忌憚矣然即如某僧演說佛教宜革命有三亦唯第二條財産問題尚有討論之餘地若第三條之牽涉學理竊恐非自命新佛之提婆達多從地獄復起不可至第一條之組織革命四字則不但無理由之可言且并邏輯亦不可解矣大師之三種革命乃思想制度經濟並重實能握佛教革新之全般論題此是何等智慧自非濮一乘輩所知大師因作敢問佛學叢報以駁之自傳六我的佛教革命失敗史舊曆新年大師應式海約住寧波延慶寺之觀堂凡月餘為計劃佛教弘誓會進行事宜撰緣起及章程自傳七擬刊行宏願雜志佛教月報一初以觀堂僧衆不良民元冬為鄞縣沈知事所逐令佛教會鄞縣分部選僧住持初推選歧昌心愷諦間等四人時式海設弘誓研究會於平湖報本寺蓮風志恆靜安等從之遊聞觀堂事乃力邀諦老於上海留雲寺主由諦老任方丈而式海等辦弘誓研究會其中人力物力由會衆負責勸以勿存觀望諦老乃舊正月來任改觀堂為觀宗寺約大師籌商推進會務約玉皇鎮壓劣僧惟不久蓮風志恆等傾向諦老諦老雅不願寺有佛教弘誓會諍議時生式海靜安玉皇等相率離去觀宗寺遂成臺宗法派門庭住持進退不復受佛會選任自傳七大師主改剃派法派為佛教公有諦老主改佛教公有為法派二老間之異議自此始大師所撰弘誓研究會改組而成佛教弘誓會章程可據以窺見大師初期佛教革新之主張摘略如下名義佛教弘誓會為佛教中之特別團體宗旨本會以四弘誓願為宗旨事業甲利人當組織宣教團慈善團編譯團乙兼利當修習止觀改組教團組研究社講習所丙自利當勤修戒定慧息滅貪瞋癡入會甲個人入會不論僧俗不拘國籍凡信仰佛教熱心佛學者乙寺院入會一由住持者自願將所住持寺院加入本會每年酌量納費者本會當負保護之責二凡寺院完全加入本會者由本會派人住持即為本會所公有皆由本會調處不得復以私人資格占為己有會員甲權利會員有受本會保護教育之權利有選舉被選舉之權利有被推為本會寺院住持之權利乙義務會員有維持本會經濟信從本會宗旨遵守本會規約擴張本會勢力進行本會事業之義務丙規約會員當互相警策互相親愛遵佛教誡同心協力廣行慈善地址以寧波觀宗講寺為本部各地由會員發起分設支部據此實為組合有志僧俗憑藉自身努力從小而大化私為公為佛教教團之根本革新三月大師離觀宗寺住觀音寺玉皇亦來共住大師與玉皇之友誼自此漸深自傳七其時大師發起維持佛教同盟會撰章程及宣言佛教月報一論維持佛教有不可無者五不可無自由組合之團體不可無勇猛犧牲之精神不可無受學求教之志願不可無實行博愛之籌備不可無安心立命之修證思為自由信仰感情聯繫精神一致之自由組合以建設理想僧團維持同盟會宣言此仍佛教協進會佛教弘誓會之精神而來然文希時在北京勸以勿為特別組織宜乎合同而化亞髠致太虛書仁山時在江西以為不敢苟同不願另立無謂之新名詞再挑動頑固輩惡感仁山致太虛書二三同志且情存妥協革命教團之企圖乃不得不善刀而藏三十一日中華佛教總會正式開成立會於上海舉冶開熊希齡為會長清海靜波為副會長實權操此人手自傳七時省支部二十二縣分部四百餘與陳靜濤書會中通過任大師為佛教月報總編輯文希亞髠為總務主任仁山等住會辦事自傳七此出文希陳醇蘗於中協調所致醇蘗致太虛書大師未出席大會有上佛教總會全國支會部聯合意見書提議七事其重要而富有意義者為佛教財産應為佛教公有根本解決之法將奈何則宜採行集産制度必有一法以相輔而行始無障礙則個人不得傳法收徒是也寺産為僧衆公有而中國以適應宗法制度創立剃派法派形成變相家庭大師始終反對之所謂集産制度蓋總集佛教寺産為佛教公有僧侶則按勞分配而各取所值餘如增設懺摩宗專為人誦經禮懺與其餘各宗不致混淆有妨專修增設異方便宗以五戒十善為基念佛往生為歸使善男信女皈依者皆為有統系之組織此二即後來法苑正信會之濫觴至於服制則除袈裟直裰之禮服外他項似不妨隨俗僧裝之革新此固大師當日率先身教者弘誓研究會講辭醇蘗致太虛書八日北京開第一屆國會大師有上參衆兩院請願書略謂籲請貴會根據信仰自由一條實行承認政教分權凡佛教範圍內之財産居宅得完全由佛教統一機關之佛教總會公有而保護之以興辦教育慈善布教等事業否則亦宜根據一律平等之條切實保護並規定佛教徒僧衆同有參政之權五月十三日四月初八日佛誕大師主編佛教月報創刊時住上海佛教總會辦事處清涼寺佛教月報一是年佛誕道老於北京法源寺舉行佛誕二九四年大會朝野畢集盛況空前南嶽道階法師小傳上海亦有舉行大師為清海作筆述佛誕紀念會演說自傳七主張今年以後當遵用陽曆四月八日為佛誕年來大師與新社會黨沙淦等組織即紅旗社會黨過從甚密其時為呂大任主編良心月刊鼓吹無政府共産主義人物志憶八呂蔭南太虛大師早年生活之片段此中共産主義指各取所需之無政府主義共産與集産之差別可讀唐代禪宗與現代思潮上佛教總會全國支會部聯合會意見書等時大師以為無政府主義與佛教為鄰近而可由民主社會主義以漸階進自傳四由民主有政府之集産各得所值進而實現無政府之共産主義乃能各取所需然鼓吹社會主義之刊物曰良心月刊或不免奇突之感實則大師雖適應而為政治活動仍本諸西方寺悟解之心境其風格似魏晉玄學之率真社會思想近老氏重道之無治而浪漫精神過之是年二月在延慶觀堂之講辭可據以見良心與革命之如何統一人之處事貴真率耳德莫德於真賊莫賊於僞古之聖賢豪傑無不成於真也然僞亦出於古之聖賢豪傑故老子有聖人不死大盜不止之說嗚呼演及今世人智益開人僞彌甚袞袞諸公集大事而享大名者察其表觀其言聖賢豪傑誠何多讓但苟一揭去其假面目則黑暗之裡幕醜穢雜肆殆令人不可響邇此所以真潔高尚之士憤之嫉之不能自已慨然欲披髮入山抱石沈淵以謝此五濁惡世也然而悲天憫人之念梗於胸次嘗思抉僞披真必有一根本解決之道期有以一洗現社會之僞習促人類黃金時代之實現太虛不敏略有一得請就此以貢陳諸君之前名譽者事行之所著而社會所以酬有功者也名譽一成即為名譽所纍而惜名之甚者動止顧忌言行多諱當為而不敢為不當為而為乃無往而不以僞若是者皆終身一名之奴隸而已縱得名垂萬世既已自喪其真復以僞熏僞流僞毒於天壤亦罪人之尤者耳故吾人立身行事莫若以真真何所憑亦自憑之良心而已良心者萬物之端也純任良心者一動一止一言一行雖舉世譽之不加勸盡人毀之不為沮心如直弦無所遷就活潑潑地不受汙染維摩曰直心是道場此也孟子曰浩然之氣至大至剛此也陽明子曰但憑良知即知即行此也莊子曰是進於知者此也無恐怖無沾滯無趨避無顛倒故大真實人即大解脫人是夏大師偕呂大任重憂遊杭之西湖一路詩興甚豪人物志憶八存同呂重憂由滬赴杭與郁九齡陳稚蘭泛西湖八首六月初識章太炎於哈同花園時臨二次革命前夕座中月霞宗仰多詢時局人物志憶二七月二次革命起九月而定時大師移居黃中央宗仰之印刷所呂重憂以沙淦等被殺亦來避居其中昕夕商討各種社會主義之得失利病旁及東西宗教哲學尤重於佛學自傳七呂蔭南太虛大師早年生活之片段九月佛教月報以費絀停刊大師離職去不復與聞佛教會事住會諸同志因與靜波等齟齬均先已星散自傳七大師於佛教月報共出四期嘗發表致私篇宇宙真相無神論幻住室隨筆等致私篇曰天下亦私而已矣無所謂公也極力發揚真我論即陸子宇宙內事皆己分內事之義無神論宣言無神即無造物主亦無靈魂而一切皆以無為究竟者也所論頗為徹底遮他邊論宗教政治之進化階程實為一極重要之卓見論云余常有一種理想往來胸次而未嘗吐之言說因與無神論略有關係請附及之蓋政治與宗教界進化之較量也政治界之進化由酋長而君主由君主而共和由共和而無治指無政府主義宗教界之進化由多神而一神由一神而無神尚聖由尚聖而無教愈演愈進世界底於大同則政治既歸無治宗教亦即無教即無神之佛教亦於以得兔忘罤得魚忘筌而不復存其名詞矣大師至紹興詩存偕楊一放王芝如楊紫林釋卻非玉皇泛舟遊石屋有驟雨送新涼之句冬大師至慈北金仙寺參加選任炳瑞蓮風為五磊寺方丈之會議由諸行無常求合理的進步詩存有關金仙寺諸作約舊曆十月或十一月初光景民初或是年大師參加中華民國統一國民黨黨章今存奘老交亦幻由亦幻交與編者該黨史實不詳民國三十七年經樂觀以問陳立夫經解釋謂關於太虛大師遺物統一國民黨來由事前經轉詢開國文獻館茲接來復擬意見兩項一民元國民黨共和黨兩大黨成立同盟會方面聯合統一共和黨國民共進會共和實進會國民公黨組成國民黨共和黨方面聯合統一黨民社國民協會國民促進會等組成共和黨至若統一國民黨當時並無實現名號但當時有一傳聞可尋脈絡統一黨原為章太炎宋遁初等所組織統一黨既並成共和黨在滬統一黨員一小部分因意見脫出又不滿改組於是有聯合而組統一國民黨之意後經調停並未成立實現二五色國旗由臨時參議院提出頒行長江習用九星旗五色九星並列黨章或係此義與武昌方面毫無所關至若白平二字不知何解或係定章則之暗記以上所說仍係或然之辭究竟來歷唯有存疑矣按黨章由奘老交來更有圓映盟書淨慈寺糾紛文件辨大乘與一乘原稿辭佛學院院長函現實主義科目與後多有出入相片多幀極遲亦民國十七年時物雖大師自傳未論及統一國民黨事但必有深切之關係據奘老及芝峰民六年冬與大師同住所說白平為大師化名今考佛教月報四期有佛法與社會主義短文署白萍思想與大師同據呂蔭南說大師筆名多用落鳧緑蕪緑蕪與白萍適相映成趣該黨史實雖未詳白平應即白萍之省為大師化名民國三年一九一四癸丑甲寅大師二十六歲一月癸丑值寄老周年祭大師撰中興佛教寄禪安和尚傳以志哀思自春徂夏楊一放王子餘等邀大師住紹興徐社專為禹域新聞寫稿自傳七七月五六月間大師善根內熏倦於塵俗生活復回俗以趨真自傳七蓋自佛教協進會挫折以來於佛教頗抱悲觀大有離心之勢唯泛濫於新舊文學以自消遣習為文人之落拓疏放每為友人所邀間遊於上海寧波杭州紹興二年餘矣自傳七而今復回俗以返真者一則大師從事社會活動此心初未嘗離於佛法自傳四再則環境有以促成之大師自謂已而鑒於政潮之逆流且自審於佛陀之法化未完成其體系乃習禪普陀告徒衆書歐戰爆發對于西洋學說及自己以佛法救世的力量發生懷疑覺到如此的荒廢光陰下去甚不值得我之宗教經驗蓋光復二年來之政治多未愜人意民二之春大師即有潮流滿地來新鬼荊棘參天失古途之歎逮二次革命失敗繼以國會及省議會之解散一般革命情緒異常低落而國際風雲又日益險惡大師際此政治氣氛窒息之運懷疑於世間政術懷疑於自己力量乃復活昔年之善根潛力復歸於真而一求究竟焉大師至寧波遊天童寺禮寄老冷香塔謁淨心長老時圓映講楞嚴經方至七處徵心詩存二十八日歐洲大戰起八月大師至普陀山寓錫麟堂與了老商談決來山掩關時昱山掩關於般若精舍詩友豁宣亦寓是自傳八大師為昱山輯定毗陵集作跋後頃者擬禁足錫麟禪院去君般若精舍不及半里遂又得昕夕過談顧君已迥不如昔也焚棄竹帛高閣典籍空其室內大有淨名示病之風檢討舊作寥落殆盡乃遽取其火存者為之輯次都凡十篇顏曰毗陵集蓋取仿永嘉集也君之見地踐履亦略似永嘉祇以世無曹溪為印證耳按大師嘗歎昱山真摯高純為平生第一益友當西方寺閲藏時屢屢鞭辟向裡督促我用本分工夫然昱山與我的影響猶不止此自傳三所謂不止此者然大師終不與佛教絶緣者則道誼上有豁宣昱山的時相慰勉自傳七此來適昱山掩關於此於大師之發心掩關應不無激發之處大師友輩中能不雜功利純以道誼相慰勉策進者有昱山其人大師回甬去滬購備應用典籍自傳八十月八月下旬大師掩關於普陀山之錫麟禪院印老來為封關作閉關普陀四律以見意自傳八顏其關房曰遁無悶廬自署曰昧盦作梅岑答友以謝諸俗緣詩存遺芙蓉寶劍葡萄酒都是迷離舊夢痕大陸龍蛇莽飛動故山猿鶴積清怨三年化碧書生血千里成虹俠士魂一到梅岑渾不憶爐香經梵自晨昏大師在關中坐禪禮佛閲讀寫作日有常課初溫習臺賢禪淨諸撰集尤留意楞嚴起信於此得中國佛學綱要世學則新舊諸籍每日旁及於嚴譯尤於章太炎各文殆莫不重讀精讀故關中文筆頗受章嚴影響自傳八因粵友佩剛專父請即舊作無神論之彈破造物主者而更審決之作破神執論自傳八文冬閉關不久仁山來訪以文希任楊州天寧寺主為邀出關助其辦學大師卻之自傳八是年甲寅作震旦佛教衰落原因論列舉化成政軛戒弛儒溷義喪流窳六事文月霞主辦華嚴大學於哈同花園弘揚賢首宗不久遷杭學生有持松常惺慈舟戒塵了塵等為近代佛教之一流三十年來之中國佛教議佛教辦學法從一般教育說到僧教育民國四年一九一五甲寅乙卯大師二十七歲春致力於三論玄疏於百論疏契其妙辨自傳八大師關中著作首成佛法導論自傳八論凡七科一緒言二小乘三大乘四小乘與大乘之關係五佛法與人世間之關係六佛法與中國之關係七中國佛教之整建與發揚論小乘以三句攝了生死為因離貪愛為根本滅盡為究竟論大乘亦以三句攝菩提心為因大慈悲為根本方便為究竟論小大之關係則小乘是大乘之方便行而後世人師則無寧先令悟菩提心從佛法而論及適行今世為大師當時之佛法概觀按告徒衆書及略史並謂民國五年作導論論中有處今中華民國佛教四衆信人則當請政府廢棄四年十月頒布寺廟管理條例則五年說頗為近情唯自傳以此為首作四年夏了老曾為印行五年春昱山出關即見此小冊言之又若是確鑿疑四年首作而五年重加修正姑依自傳附此年其後繼作教育新見哲學正觀辨嚴譯訂天演論荀子論周易論韓愈百法明門論的宇宙觀等論文自傳八大率以佛理論衡世學及世學之涉及佛法者折其偏邪誘攝世學者以向佛宗如以圓覺經之四相以論哲學之優降以十二緣起格量天演以唯識論荀子等教育新見立相對的個人主義以養成人人皆為自由人使就其各個人之相對者對個人對家庭對社會對國家對世界化合之而能經營其自由業為教育鵠的揭示大同世界圓滿生活之教育最能表現大師融合社會主義與佛法由人類一般而階進大乘之思想是春了老任普陀山普濟寺前寺住持大師每為主文稿自傳八五月九日袁政府部分承認日本二十一條之要求夏初許良弼來訪以辨嚴譯各篇集題曰嚴譯小辨付之刊印流通自傳八是年夏起專心於楞伽深密瑜伽攝大乘成唯識論尤以唯識述記及法苑義林章用力最多將及二年之久時又涉覽律部留意於僧制自傳八而後知整僧之在律而攝化學者世間需以法相奉以為能令久住正法饒益有情之圭臬相宗新舊兩譯不同論書後時夏季大師哀華人之盲趨冥行及悲歐蠻之大相斫作墨子平議末曰彼海西諸族殆皆墨翟之苗裔歟夫癡見共流愛慢同穴無所簡擇而務馳騁亦苦樂雜然相進而已矣亂之上也治之下也此風今日且靡靡天下一墨則不足以相救衆墨則適足相撓鬥毗墨之道一往而無所回顧則今之世其去吾人所愛之和平益以遠矣悲夫王一亭來山晉香訪大師於關中以詩持贈因相契重自傳八追念王一亭長者是夏以日本要求傳教自由孫育筠楊度嚴復等乃承袁政府意發起大乘講習會邀請月霞諦間主講八月籌安會帝制議興孫育筠等名列六君子月霞稱病南還獨諦老於京盛講楞嚴傳袁克定受皈依焉自傳八蔣維喬諦間老法師傳秋七月與陳誦洛書為論墨子泛及先秦學術文卻非來任普濟寺職時袖詩過訪自傳八是秋大師讀及陳某中國之阿彌陀佛歷言日本密宗之教義乃有一究密宗之心自傳八中國現時密宗復興之趨勢十月二十九日政府公布管理寺廟條例卅一條豫地方官以限制僧徒及侵害教産之大權是條例內務部長朱啓鈐商承諦老意見而産生蔣維喬諦間老法師傳寶靜諦公老法師行狀自傳八北京覺先首揭此出諦間請求指為賣教呼籲取消大師亦撰文反對自傳八十二月袁世凱稱帝雲南起義是年冬大師痛於管理寺廟條例審度時勢欲據教理教史以樹立佛教改進運動乃作整理僧伽制度論為一經意之結撰自傳八編閲附言五六略史三十年來之中國佛教本論內容凡四品一論僧以中國本部有八十萬僧伽為準別佛徒為住持部信衆部與章太炎之建立宗教論同其言曰非捨俗為僧者不足證法身延慧命非信僧居俗者不足以資道業利民生漢土所流傳尊崇者其學理全屬大乘系統而律儀則重聲聞乘內祕菩薩行外現聲聞相漢土佛教化儀之特色乎在俗菩薩既攝在人天乘則形儀隨俗而不能住持像教入僧菩薩則攝在聲聞聲聞乘衆以波羅提木叉為師依毗奈耶處住僧依品此以住持佛教之責屬在僧衆故嚴為訓範以佛法之修習為中心而旁及近代思想以備弘揚佛法覺世救人取僧伽之形儀重菩薩之精神為大師整僧之根本意趣此可參略史二論宗上不徵五天下不徵各地統隋唐來大乘以為八小乘附焉曰務使八十萬僧伽皆不出於八宗之外常不毗於八宗之一始從八最初方便學門門入道終成一圓融無礙行頭頭是道然有一言不得不正告者此之八宗皆實非權皆圓非偏皆妙非粗皆究竟菩提故皆同一佛乘故大乘八宗各有特勝而無不究竟平等普應為大師此期思想綱要此上承蕅益之說而發者所論分宗專學頗足針對由來籠統之病初學貴在一門深造乃能精義入神久修自知殊途同歸寧慮局道相斫所謂方便有多門歸元無二路者也數百年來學者病在汗漫唯汗漫乃適成紛拏佛法深廣人智淺狹取捨莫定茫昧無歸以故學不精察心不明了欲袪斯病則端在分宗專究耳宗依品三論整理制度分教所教團教籍教産教規別別為之議制實行集産制度立法苑蓮社即懺摩與異方便均同舊議唯曆制主月曆衣制主袍衫如舊傾向於僧儀之保守與昔革命時代不同四論籌備進行分三期以達到政府之廢除管理寺廟條例承認政教分離由僧伽自組統一自主之僧團為鵠的然上須得政府之承認下須得僧衆之願意殊未易實現所以必須籌備圓滿時機成熟乃得張而施之而未可鹵莽從事焉籌備進行品統觀本論依乾隆舊籍而定論現今僧數之多以江浙一隅而例論全國教産之富均不符實際所論大乘八宗上不徵五天則其源塞下不徵各地則其流隘局於中國內地拘於舊傳八宗不獨有武斷之嫌且亦無以應國際文化交流之世況大乘八宗其時或形骸僅存或形質久絶乃必欲八宗等暢寧復可能尤以政教分離決非中國政情所能許富思考而未克多為事實之考察自不免智者之一失然所論僧制之改革要為唯一有價值之參考書大師又作人乘正法論以為在家信衆正信會之道德軌範使五戒十善之佛化得以深入民間而達改良社會政治風化之益由此正信會之普及與前住持僧之深入期以實現佛教救世之精神略史自傳八禪關漫興亦是冬作可據以見關中之生活心境海島幽棲似坐船管寧傳說隱樓顛心齊恰是涵虛白門閉原非草太玄縷縷爐香經案靜重重燈影佛臺圓易驅惜命偷油鼠難護輕生赴火蜎半壁圖書連沆瀣滿壺冰雪耐熬煎慣聞喜鵲牆頭叫默透馴蛇瓦眼穿送到寺鐘催早起朅來吟伴擾遲眠詩思偶逐秋聲壯瘧勢曾因暑病添卻憶狂風驚拔木每臨清沼念池蓮雨看千嶂煙嵐積晴放一房光氣鮮老樹窗前青未了亂山簷下紫堪憐朝霞燦燦生寒浦暮色蒼蒼接遠天被絮新裝任冬盡瓶概斜插欲春妍禪超物外空餘子鎖斷人間更幾年月影夜窺花不動潮音日說偈無邊文殊漫把圓通選此意難教口耳傳民國五年一九一六乙卯丙辰大師二十八歲春初小病病中得聊叟詠雪二絶次韻卻寄詩存昱山出關大師和其圓關詩詩存人在永嘉天目間點紅塵亦不相關三年牧得牛純白清笛一聲芳草間六月袁世凱死政局日紊首楞嚴經攝論於是夏脫稿告徒衆書本論為大師是期專論佛法之名作楞嚴經為中國佛學之大通量未嘗有一宗取為主經未嘗有一宗貶為權教應量發明平等普入該禪淨密律教五而又各各宗重各各圓極文大師本楞嚴以總持大乘得中國佛學綱要洵當時思想之結晶按告徒衆書與略史並言五年作攝論海刊八十一十二且曾特為聲明惟楞嚴大意以此為民國三四年作自傳亦取三年說二說相左依自傳攝論之作與悟入楞嚴心境有關然於此不能無疑考自傳原稿二十八年三月初寫但云于會合臺賢禪宗關于起信楞嚴的著述加以融通抉擇從此二書提唐以前中國佛學綱要而三十四年七月修正補充為于會合臺賢禪的起信楞嚴著述加以融通抉擇是三年冬每夜坐禪專提昔在西方寺閲藏時悟境作體空觀漸能成片一夜在聞前寺開大靜的一聲鐘下忽然心斷心再覺則音光明圓無際從泯無內外能所中漸現能所內外遠近久暫回復根身座舍的原狀則心斷後已坐過一長夜心再覺係再聞前寺之晨鐘矣心空際斷心再覺漸現身器符起信楞嚴所說乃從楞嚴提唐以後的中國佛學綱要而楞嚴攝論即成於此時從茲有一淨裸明覺的重心為本迥不同以前但是空明幻影矣又原稿云有萬非昔悟的空靈幻化堪及者後修正為有萬非昔悟的空靈幻化及從不覺而覺心漸現身器堪及者是則二十八年猶無悟入楞嚴心境之說二十九年二月大師為訪問團員說我的宗教經驗乃始有之再考之攝論論初有吾別有論不出八宗即四年冬完成之僧伽制度論而大師四年夏間始專究唯識攝論即多以唯識名義通楞嚴是則以攝論為民三所作蓋難取信大師謂三年冬悟入楞嚴心境因著楞嚴攝論殆以近代學者以楞嚴為華人所造大師忠於所學乃不惜為之方便證成歟今略之以存疑是年大師於唯識義有所悟入自傳八云民五曾於閲述記至釋假智詮不得自相一章朗然玄悟冥會諸法離言自相真覺無量情器一一塵根識法皆別別徹見始終條理精微嚴密森然秩然有萬非昔悟的空靈幻化堪及者參看我的宗教經驗從此真俗交徹表現於理論之風格一變幽思風發妙義泉湧萬非逞辨競筆者能及因每有肇端而不克終緒之論片如成大乘論法界論三明論王陽明格竹衍論等作自傳八夏杪自題自稱死於此年應於此悟有關一扇板門蚌開閉六面玻窗龜藏曳棺材裡歌薤露篇死時二十有八歲昧盦詩録是夏方稼蓀偕其姑瘦梅來山晉香時過關論詩相為唱和堅索詩稿付印大師乃集為昧盦詩録與之有江五民等作序秋季詩録刊行自傳八昧盦詩録跋八月道老是夏講楞嚴經於寧波報恩寺經筵既罷來山過錫麟堂禪關與大師抵掌劇談言無不暢自傳八南嶽道階法師小傳二十五日孫中山以察視舟山群島之便偕胡漢民等來山了老與道老陪遊孫氏為大師手題昧盦詩録署姓名於左人物志憶六自傳八大師奉詩一律中山先生遊普陀作此即呈道正卓犖風雲萬里身草年關繫國精神舒來日月光同化洗出湖山看又新民國元年曾約王文典陪先生赴杭未果今聞先生新遊西子湖來也佛法指歸平等性市民終見自由人林鐘送到歡聲壯一惹豪吟起比鄰五年孟秋之杪昧盦太虛未是草十月十九日九月朔作南嶽道階法師小傳冬應陳誦洛浙江月刊索文為撰釋中華民國論宗五蘊唯識論義有真正之宇宙觀唯識論也真正之國家觀唯民論也之語文評唯民月刊大師閉關期中曾有續宏明集新宏明集佛教詩醇佛教文醇之選輯均創始而未竟自傳八民國六年一九一七丙辰丁巳大師二十九歲二月四日立春大師出關當即遍訪山中知友自傳九紀之以詩出關剛值立春日卻為立春方出關山後山前霎時遍春風浩蕩白雲間出關已攝影為紀念從此剃髮留鬚自傳九老成穩健非復昔年疏放情態大師至寧波謁奘老於觀音寺去接待寺訪圓映遊天童育王寺訪淨心宗亮源巃等盤桓於寧波者數月其間曾去上海自傳九又一度回普陀詩存夏遊慈溪訪玉皇於普濟寺因偕遊慈溪龍山清道觀詩存自傳九玉皇來寧波大師偕之往鄞西錫山寶嚴寺度夏寺亦奘老所住持自傳九集唱和為寶嚴風韵東瀛采真録內政部准章嘉清海請修改前中華佛教總會章程成立中華佛教會宏空佛教危言按略史謂佛教總會於民國三年被靜波清海改為中華佛教會誤秋大師偕劉驤逵道尹汪旭初祕書王志澄知事圓映過接待寺訪梁山伯廟自傳九大師過觀宗寺時仁山任觀宗寺輔講引常惺來見自傳九常惺法師塔銘并序詩存續集按自傳以此為春間事常惺法名寂祥江蘇如皋人十二歲出家使入學十七歲卒業於邑之省立師範民三年入華嚴大學五年參禪於天寧六年夏來觀宗寺從諦老習天臺教觀時年二十二密林常惺法師傳大師承陸鎮亭太史意詩存外集與圓映王吟雪等結木犀香詩社於觀音寺自傳九詩存時臺灣基隆月眉山靈泉寺主善慧建立法會請圓映講演佛法歧老主水陸法事詩存東瀛采真録圓映以事不克分身乃介紹大師東行大師久思去日本一覘佛教與歐學調劑之方因要善慧以事畢陪赴日本一行而定東遊之議自傳九東瀛采真録十月臨行詩社友人多以詩送行東瀛采真録圓映有太虛法師代豫遠赴東瀛用木犀香社香韵聊當陽關三疊詩大師和之錫山清夢倦寒香又說男兒志四方迦葉當年破顏笑菩提何處歇心狂且攜詩鉢貯滄海待詠梅花傲雪霜祇恐此行難代得胸無萬卷玉琳琅按圓映有代豫之說大師有難代之謙參考自傳其事甚明乃潮音草舍詩存編者不知何以改為難了得圓映初介大師閲藏以深入佛法再介東遊以考察僧制於大師所益綦重不當以晚年扞格而一筆勾之八日從了老附江天輪赴滬舟次真常之人生脫稿擬以作東遊法施東瀛采真録雙十節晚大師登春日丸從歧老東行為遠遊國外之始抵日本之門司轉亞利加丸於十九晚泊基隆即登月眉山靈泉寺東瀛采真録二十八日靈泉寺法會開始凡七日臺日來賓極盛大師與日本布教師輪流說教大師講真常之人生及佛法兩大要素善慧自為傳譯自傳九東瀛采真録會期某夕大師與臺北佛教中學林教授熊谷泰壽筆談詢明治維新來之佛教情況布教歐美之成就各宗研究及名學者等甚詳論及僧制於日僧之不去俗姓帶妻食肉及各宗自為部勒不能融合成一大佛教團致其不滿之感東瀛采真録十一月六日善慧陪了老及大師遊基隆翌日去臺北於基隆之水族館臺北新北投之溫泉大師深留美感自傳九東瀛采真録九日至彰化適彰化曇華堂舉行法會大師乃為說法佛教為東洋文明之代表今代表西洋文明之耶教已失其宗教功用於歐美歐美人皆失其安身立命之地故發生今日之大戰局吾輩當發揚我東洋之和平德音使佛教普及世界以易彼之殺伐戾氣救脫衆生同業相傾之浩劫東瀛采真録蓋時西方大戰中國多西洋文明破産之說大師固堅主耶教不適用於今世者十一日季秋二十七日曇華堂法會圓滿晚餐次彰化廳長勢山新聞記者施庵等與作擊鉢吟會即晚去基隆自傳九東瀛采真録十二日餞送歧老先期回國東瀛采真録十三日德融善慧弟子陪遊臺北寓中學林多日從德融井上齊藤熊谷等教授詢日本佛教情形甚詳東瀛采真録十八日善慧陪赴臺中參觀臺中展覽會寓慎齊堂二十日起應慎齊堂佛教講演會之請講我之佛教觀亦善慧通譯自傳九東瀛采真録其間大師應臺灣望族林紀堂之邀遊阿罩霧其三弟獻堂請於家中略說法要東瀛采真録鹿港遺老洪月樵聞大師遊臺函贈鶴齊詩臠二集并邀去鹿港詩多故國之思大師贈以講稿及詩録并以詩答之東瀛采真録曾聞天網說恢恢讚佛梅村拜五臺蓬島連雲秦代望潛流有水漢時來聊從大海遊懷放怕向中原醒眼開雞鶩一群祇逐食治平無復見雄才年年不共不能和早是光陰六載過據社憑城狐鼠逞噬人肥己虎狼多浴雲嫌我帶龍氣講學逢君隱鹿河便好蒿萊同沒盡不關臨去轉秋波大師對國內時政之失望如此十二月二日善慧陪大師作遊日之行五日抵門司上岸行九日抵神戶寓莊櫻癡家途經小郡湯田溫泉三尻驛宮島郡岡山並略事遊覽東瀛采真録十一日善慧陪大師遊西京以佛剎多在其地瞻禮西本願寺清水寺萬隆寺臨濟之天龍寺天臺之清涼寺真宗之佛教大學智積院之大學知恩院等以驟感天寒而善慧復以事須早回故遊蹤甚為匆促東瀛采真録十三日返抵大阪往觀天王寺翌日歸神戶十五日登輪別善慧回國善慧贈以日式之黃褊衫織金五衣金繡九衣以為紀念東瀛采真録按東瀛采真録陰曆與陽曆雜用又多為手民所誤植自傳於臺日之行蹤每先後顛倒今依録略為推正舉其行程如上十九日薄暮歸抵上海結束二月餘之遊化考察所得深覺整理僧伽制度論之分宗頗合於日本佛教之情況而本原佛教以聯成一體則猶勝一籌乃於革新僧制之素志彌增信念自傳九略史東瀛采真録大師寓上海錫麟下院晤陳完劉洙源王仙舟與楫沈惺叔等為王仙舟等說因明大意自傳十東瀛采真録二十六日離滬赴甬臨行詩友穆穆齊來訪別之以詩東瀛采真録民國七年一九一八丁巳戊午大師三十歲一月大師住寧波觀音寺集東遊之詩文遊記編東瀛采真録以徒弟乘戒去臺灣中學林肄業之便攜去由靈泉寺印行自傳十二月大師於觀音寺度舊年自傳十是冬大師於密部經軌就頻伽藏一度披閲未為深入研究自傳十象賢芝峰來觀音寺依止大師為謄正楞嚴經攝論等稿芝峰為編者說春應了老之請出任普陀山前寺知衆時玉皇再任糾察頗資臂助自傳十時丁巳年底陸軍部有以普陀山作德俘收容所之議大師為呈部懇免自傳十普陀為德僑收容所之反對夏有邀遊南洋者謀集資以開建中國佛法僧園僧伽制度論辦法之一為革新僧寺樹規模太虛宣言諦老講圓覺經於北京寶靜諦公老法師年譜七月六月初陳元白裕時來普陀山大師與談佛法意甚感動乃捨同善社歸佛元白曾引蔣作賓雨岩黃葆蒼元愷入同善社既心知同善社之非乃去滬邀蔣黃來普陀大師為談原人論及成唯識論大意相依近月悉發心學佛自傳十覺社宣言太虛宣言八月秋初大師偕昱山元白等出普陀遊天童育王至寶嚴寺謁奘老自傳十時寧波佛教孤兒院成立大師與圓映並任院董陳屺懷玄嬰主其事開學日大師演說甚詳由是大師與陳屺懷時相晤談自傳十訥公語業附言文大師與元白等抵滬商諸章太炎王一亭劉仁航靈華等創立覺社推蔣作賓任社長以資號召開始弘揚佛法之新運動其初大師在山與元白等談及整理僧制及南遊計劃唯鑒於歐戰未已議先成立佛學團體漸圖進行覺社乃緣此産生覺社初期事業定為出版專著編發叢刊演講佛學實習修行自傳十人物志憶二太虛宣言大師時寓愛多亞路與章太炎也是廬為鄰因時相過從人物志憶二聞蘇曼殊病卒挽之以詩昔年精舍建祇洹我亦宜南學弄丸十載未能謀半面一書曾憶剖雙肝天荒集裡同留句世亂聲中忽蓋棺不信奇人竟庸死欲歌薤露意先寒九月中秋大師遊西湖客白衣寺遇華山自北京來華山法師辭世記卻非詩集按自傳十謂七年夏季至杭晤華山秋初至上海著手編輯覺書遇華山自五台北平歸考是年冬作華山法師辭世記二年夏大師於滬編佛教月報遇華山七年秋晤華山自北平歸於杭是則自傳所記二次相逢年月均誤是月元白去漢口葆蒼去重慶大師撰往生安樂淨土法門略說付葆蒼葆蒼刊行於重慶自傳十覺書己未佛教年鑑道學論衡及楞嚴經攝論由中華書局出版發行論衡乃編集普陀所作教育新見哲學正觀訂天演宗破神執論譯著略辨佛法導論六種而成自傳十十月大師應李隱塵開侁陳性白等請往漢口出元白讚歎宣揚之力八日九月四日於楊子街寄廬王國琛家開講大乘起信論並編出大乘起信論略釋二十三日講訖始終與會者僅七人為大師弘化武漢之始自傳十漢口佛教會創始記序王國琛大乘起信論略釋緣起講畢攝影為紀念大師且紀之以詩李隱塵阮次扶育嵩陳元白全敬存王澄齊國琛馬康侯中驥王吟香道藝等諸大居士邀太虛過漢皋談如來藏緣起義者兼旬今將返滬攝影留別乃題一偈以證法喜飛夢漢江塵一談微遠因影中同現影身外獨呈身了了心無住澄澄意更伸隨流得其性來往海之濱佛曆二九四五年九月十九日崇德釋太虛大師講筵既罷歷遊武漢名勝自傳十又於安徽會館作公開講演普結法緣王國琛大乘起信論略釋緣起大師返滬陳自聞偕行舟次九江雨中望廬山不見賦詩懷東林蓮社自傳十詩存是月歐洲大戰終止十一月十月初大師主編覺社叢書創刊自傳十整理僧伽制度論開始發表並宣布覺社意趣之概要覺社叢書出版之宣言宣言云人間何世非亞美歐洲諸強國皆已捲入戰禍各出其全力以苦相抵抗之世乎民國何日非南北爭鬥唯一派團體為旗幟唯個人權利為標準之日乎鐵彈紛射火焰橫飛赤血成海白骨參天加之以水旱之災疫癘之祲所餘鋒鏑疾苦之殘生農泣於野商困於廛士無立達之圖工隳精勤之業哀哀四民藝藝億醜遂相率而流入乎苟生偷活窮濫無恥之途不然則醇酒婦人嬉笑怒罵聊以卒歲聊以紓死又不然則遠遊肥遁海蹈山埋廣朱穆絶交之篇著稽康養生之論又不然則疑神見鬼惑己迷人妖祥雜興怪異紛乘指同善社等持世者修羅生存者地獄餓鬼畜生其高者則厭人棄世而獨進乎天嗟嗟人道幾希乎息矣吾儕何心乃獨皈三寶尊發四誓願以自覺覺他覺行圓滿之道倡乎蓋將以示如來藏清人心之源弘菩薩乘正人道之本也當此事變繁劇思潮復雜之世徵之西洋耶回遺言理乖趣謬既不足以應人智之要求軌範人事徵之東洋李孔緒論亦無力制裁攝持此人類之心行矣於是互偏標榜競從宗尚挺荊棘於大道寶瓦礫為奇珍挽近更由物質文明之反動見異思遷出水入火播弄精魂繁興變怪要皆未改轉其顛倒迷妄之想也烏乎菩提所緣緣苦衆生諸佛菩薩悲願同切惟弘佛法能順佛心惟我佛無上正等正覺之教平等流入大地人類之心中轉大法輪咸令自覺立人之極建佛之因乘斯機緣建斯覺社固將宏綱異道普悟迷情非以徒厭世間獨求解脫也故本社當修自覺行以回向真如修覺他行以回向法界一切衆生針對中外政局之苦迫國內思潮之雜亂發起此佛化覺世新運動大師晚年自謂少壯的我曾有撥一代之亂而致全世界於治的雄圖期以人的菩薩心行無我大悲六度十善造成人間淨土這是民十年以前的事佛教之中國民族英雄史所謂非以徒厭世間獨求解脫也覺世救人之道在乎立人之極建佛之因以人乘階梯佛乘亦始終為大師弘法之根本精神是月鄞慈鎮奉象佛教會以寧波警察廳長嚴師愈贊助舉大師為寧波歸元庵住持因時往來甬滬間自傳十奘老為編者說大師在甬聞華山於樂清逝世悼之以詩為作華山法師辭世記自傳十文十二月一日十月二十八日覺社假李佳白尚賢堂大師與章太炎王與楫等開佛教講習會李子寬了空參與聽講初生信心自傳十覺書二是年徐蔚如集印老文稿題印光法師文鈔而流通印老之名大著歸心念佛者日多真達等中興淨宗印光大師行業記世界佛教居士林亦是年初創追念王一亭長者民國八年一九一九戊午己未大師三十一歲二月二十日正月二十日覺社講習部假尚賢堂請大師開講二十唯識論劉笠青史裕如一如筆記成唯識二十頌講要自傳十覺書己未佛教年鑑覺社近得劉笠青史裕如等維護因自設社址於愷自邇路蔣作賓以奉派參觀歐洲戰蹟離去自傳十四月一日三月初一日起大師於覺社開講觀無量壽經及因明入正理論等覺書己未佛教年鑑覺社時有佛教大學部與佛教孤兒院之創議社員多慮規模大而無以為繼未獲實現太虛宣言覺書四録事是春大師作唯物科學與唯識宗學中華民國國民道德與佛教大師以唯識之識含得相分物質見分精神識自證分證自證分故以總含諸法之真唯識論方便比擬為近於一元二行之真唯物論以明唯物科學與唯識之相通所論唯心之道德與昔弘誓研究會所講者同如云人復真如之心道之元也心契本覺之性德之本也其致之也庸易要在內反而不外騖耳五月四日北京學生為山東問題示威遊行其後全國學生工人響應是謂五四運動六日北京警察廳將民四之管理寺廟條例重行布告施行事先內務部藉詞清查檔案指六年章嘉等請立之中華佛教會為抵觸法令豫以廢止該條例原由帝制黨參酌諦老草議而成因帝制傾覆而未見實行去年諦老入京講經得交通系要人支持乃有此重行公布之舉時諦老商得內務部同意所製戒牒僧籍概由觀宗寺專賣自傳十二宏空佛教危言七日佛誕大師為黃葆蒼董慕舒李錦章剃落於寧波歸源庵去年葆蒼至重慶與慕舒錦章為法友三人發心深徹誓願出家專修以事弘揚以救世人大師度之出家字以大慈葆蒼大覺慕舒大勇錦章自傳十覺書己未佛教年鑑六月北京覺先初因寺廟條例而反對諦老鄞慈五邑佛教會時與諦老齟齬日深亦推竹溪為代表赴北京請願竹溪過滬約大師同行大師以覺社事委大勇與竹溪五月晉京寓法源寺奔走月餘未達取銷寺廟條例目的而條例亦由是未付實行自傳十二覺書己未佛教年鑑大師在京歷遊名剎名園京中學者林宰平梁漱溟畢惠康殷人庵梁家義范任卿黎錦熙等並先後來法源寺晤談胡適之曾約晤大師告以宋明儒之語録體創自唐之禪録胡因而進為壇經及禪録之考究自傳十二是年夏留日學生陳定遠憤日人挾弄喇嘛回國籌設中國五族佛教聯合會以期蒙藏內向適大師在京乃與道老覺先參加並請莊思緘蘊寬夏仲膺壽康湯鑄新薌銘胡子笏瑞霖張仲仁一麟王家襄等共起提倡以資促成時黎黃陂居津大師與陳思遠去津晉謁為論佛理惟格於寺廟條例致佛教會事未成自傳十二人物志憶六大師在津穆穆齊偕之訪黃郛膺白始與締交自傳十二九月張仲仁等發起己未講經會推莊蘊寬夏壽康為會長請大師講維摩詰經於象坊橋觀音寺大師隨講出維摩詰經釋文義新穎言辭暢達於積集福智資糧創造淨土特多發揮王虛亭楊犖哉馬冀平陶冶公倪譜香胡子笏周秉清等悉由是起信王黻彜尚菩與黎錦熙邵西筆記經釋外之口義為維摩詰經紀聞自傳十二人物志憶十三維摩詰經紀聞序覺書己未佛教年鑑黎錦熙維摩詰經紀聞敘按維摩法會日期年鑑作閏七月自傳作八月初尚在敷講紀聞敘作九月則指陽曆而言十月八日中秋大師賞月於西山戒壇寺李隱塵陳元白聞大師敷講於北京特自漢口來聽講畢因陪遊西山諸勝自傳十二李隱塵吳璧華熊希齡等發起續講大乘起信論聽衆日多講畢秋垂盡矣自傳十二維摩詰經紀聞序十一月五日大師由天津南下抵南京翌晨十四日禮楊仁老之塔訪歐陽竟無於支那內學院籌備處內院時在籌設中關於支那內學院文件之摘疑按閲竟無居士近刊誤為冬日七日至滬即由費範九陪往南通十日十八日應張謇季直請講普門品於狼山觀音院凡三日且遊覽名勝參觀建設事業張謇高弟江謙時為張謇稱道大師乃緣成此法會自傳十二人物志憶十二張氏請大師講經先以詩請此生不分脫娑婆正要勝煩冶共和過去聖賢空舍衛相輔兄弟戰修羅覺人誰洗心成鏡觀世豈聞面皺河師儻能為龍象蹴安排丈室聽維摩按自傳與人物志憶均以南通講經為先於北京且以安排丈室聽維摩為張謇宴敘時所贈殷人庵撰講維摩緣起引此詩謂有預兆京中傳為佳話云實則南通講經在後可證者一己未佛教年鑑云九月十九日南通張謇請釋太虛講普門品於狼山觀音院二寶蓮華盦詩有太虛已赴嗇翁約九月十八日講經狼山觀音堂三詩存張公季直邀南通紫琅觀音院講經有後夜窺寒月秋聲曲徑聽之句四維摩詰經紀聞序末署二九四六年秋之望釋太虛序於南通然以此詩為預兆則亦有之詩刊於覺書四期舊七月出版故閏七月講維摩經此詩巧為預兆矣此詩非南通講經時作蓋張謇書贈大師寓禮請講經之意大師晚年誤忘因此詩先於維摩法會乃以南通法會為先十二月十月覺書五期出版適大慈購得西湖南山之淨梵院從事潛修大師乃商決結束滬之覺社改覺書季刊為海潮音月刊卓錫西湖專心編輯十一月中赴杭自傳十二覺社宣言十五年來海潮音之總檢閲覺書己未佛教年鑑是年諦老得蒯若木葉譽虎助開辦觀宗學舍成近代佛教之一流從一般教育說到僧教育寶靜諦公老法師年譜民國九年一九二己未庚申大師三十二歲一月七日彌陀誕大師為大慈舉行入關禮玉皇為主庶務大慈次子恭佐恆演護侍之自傳十二十日十一月二十日大師作太虛宣言述整理僧制之志願文十一月滇督唐繼堯派代表曾子唯來杭兼電議和代表繆嘉壽禮聘大師赴滇垣弘法大師以潮音初編滇道修遠辭謝未行自傳十三己未佛教年鑑按自傳誤為廣州回杭時事二月四日十二月十五日大師以歐陽竟無之支那內學院章程有非養成出家自利為宗旨語殊覺藐視僧伽乃作支那內學院文件摘疑大師與內院為法義之諍自此始自傳十二其後內院丘檗晞明致函大師云以措辭未圓易啓疑慮則改為非養成趣寂自利之士亦無不可要之非簡出家乃簡出家唯知自利者袪釋疑團藉免誤會舊正月海潮音創刊大師發表覺社宣言綜述一年來弘化業績作海潮音月刊出現世間的宣言略云海潮音非他就是人海思潮中的覺音宗旨發揚大乘佛法真義應導現代人心正思新思潮者名之曰現代人心第以新思潮之生起動不由自唯是隨環境牽動而動由境界風而動因不得不動而動由無明風而動沒有自覺自主的力也沒有善的標準與真的軌持不過是糊塗雜亂混沌齷齪的一代人心的表現罷了故必須尋出個善的標準與真的軌持發生出自覺自主的力量來乃能順應著這現代人心使不平者平不安者安而咸得其思想之正大師以為欲應導現代人心正思即需發揚大乘佛法真義大師所推重之大乘真義即中國臺賢禪淨共依之起信楞嚴如曰大乘佛法的本身即衆生心是就我們人類切言之亦可曰人生心即是能具能造人生世界種種事物的大乘佛法真義原是人人自心中所本有的因為揭發說明了他便發生一個覺悟大乘佛法真義的人生心因為開發闡明了詮他的經教便發生了一個發揚大乘佛法真義的海潮音將這大乘佛法的真義稱舉到人海思潮的最高性上去為現代人心作正思惟的標準將這大乘佛法的真義宣布到人海思潮的最大性上去為現代人心作正思惟的軌持大師被推舉為西湖彌勒院及大佛寺住持奘老士老大覺等先後為之管理大師仍住淨梵院時泛一葉扁舟來往於湖南淨梵湖北彌勒之間自傳十三四月大師以新近之思想學術闡明三十唯識論發揮唯識學之新精神作新的唯識論按無言太虛大師行略云冬回杭州於車軾舟舷上寫成新的唯識論乃誤讀自傳致誤大師卓錫西湖時與康南海居蕉石鳴琴相往來茗談輒復移晷大師合彌勒院與大佛寺為一復古名兜率寺之舊康氏為之書額自傳十三人物志憶六大師時多論評世學之作論陳獨秀自殺論昧盦讀書録論胡適之中國哲學史大綱上篇讀梁漱溟君唯識學與佛學近代人生觀的評判大師不滿胡適之進化論的歷史觀念責其抹殺個人之才性不明佛法所說之心性梁漱溟時有唯識述義公世右空宗而抑唯識大師為論空與唯識義本一致於佛藏擇法眼圖評謂梁君所言僅齊三論顯說其密指者似在禪宗而未能達大師於近代人生觀的評判云我以為為人間的安樂計則人本