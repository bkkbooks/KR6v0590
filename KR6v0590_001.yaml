body:
  text: 名號籍貫年齡眷屬一名號大師之名號有俗名有法名有筆名今就所知者條理而敘述之一淦森阿淦二沛林大師乳名淦森親鄰輒呼為阿淦沛林為大師學名均以五行缺金木水立名自傳一大師生於清光緒十五年十二月十八日舊曆民國二十三年大師於漢口正信會值四十六初度時有占卜為業而新近皈依者詢以誕生時刻擬私為推算大師告以丑時卜者歎為難得蓋大師之生辰為己丑年丁丑月己丑日乙丑時鍾益亭為編者說四丑之生辰於五行缺金木水故取名如是三唯心唯心為大師出家之法名自傳二所依臨濟法派偈云心源廣續本覺昌隆能仁聖果常演寬弘唯傳法印證悟會融堅持戒定永紀祖宗唯心之唯即第十七字四太虛大師以太虛行乃出家之表字取名於鎮海縣團橋鎮之玉皇殿自傳二以今觀之確唯太虛二字始足以表達大師廣大深遠之高致宣統三年大師度夏於普陀印光老來訪閲其詩文而心許之因和易哭庵掩字韻以相勉太虛大無邊何物能相掩白雲偶爾棲當處便黮暗吹以浩蕩風畢竟了無點庶可見近者莫由騁駁貶太虛無形段何處能著染紅塵驀地起直下亡清湛灑以滂沱雨徹底盡收斂方知從本來原自無增減大師進而和之日月回互照虛空映還掩有時風浪浪有時雲黯黯萬象恣妍醜當處絶塵埃雖有春秋筆亦難施褒貶餘霞散成綺虛空忽渲染恰恰紅塵漠恰恰青天湛悠然出岫雲無心自舒斂泰山未嘗增秋毫未嘗減自傳六二老同以太虛諸法本真為本來清淨在塵不染而印老主超脫泯寂大師主融冶無礙故印老必吹以浩蕩風灑以滂沱雨方得本來無染而大師則萬象恣妍醜當處絶塵埃且日月回互餘霞成綺彌顯太虛之莊嚴大師心境中之太虛異乎印老之所見泰羲太印度詩哲泰戈爾來華大師有太戈爾哲學的簡擇之作署名泰羲蓋太虛之諧音海刊十四十一有補白小評萬有文庫但署一太字即太虛之略稱上二由太虛一名演化而來五悲華大師答王弘願書自認悲華為其筆名署名悲華者已集得十七篇如論陳獨秀自殺論等大抵為批評之作悲華乃悲憫中華之義亦可釋為慈悲引生之蓮華行宣統三年夏戴靄天有送悲華室主回浙詩民國六年秋圓映有贈悲華室主之扶桑詩知由悲華室得名宣統三年初夏汪莘伯有積雨悶坐睹悲華詩有感和韻答之詩民國三年冬仌弦有讀普陀志寄懷悲華子詩悲華與悲華子早見於詩友之相稱固不始於七年創刊海刊也華子非心芬陀昧盦詩録附有書鏡月夢自稱華子殆悲華子之略稱以非心為筆名者如評大乘起信論考證署名芬陀者有任孤兒教育者應具性格之商榷等芬陀梵語芬陀利之略即白蓮華是故非心為悲之形離芬陀乃華之音譯上三者由悲華一名演化而來六昧盦昧盦詩録編集於民五之夏昧有深潛渾朴芒昧愚蒙意大師以昧為別署者以大師青年時代心精勇鋭目空一切在禪慧融徹中俠情奔湧不可一世自傳四然才華卓越與熱情奔放限於時會無以推進革新佛教之弘願由於不遂初衷諸凡頓挫反引發疏放之俗習大師憬然於此乃欲求佛法之高深學養庶能適應環境以改進乎佛教從見理之深遠言態度之溫和言無不有需於昧於是拈昧昧法門以自為陶冶俾能與才能卓越俠情奔放相協和以實現覺世濟群之素志民三之掩關普陀由是而法化普洽即其明證然大師特以昧為方便深求其精神則猶然為禪慧與俠情相激蕩覆黃健六書云吾自審捨身捨心救僧救世慧德無讓古人福緣乃遜時傖每逢隨俗浮沈可括囊無咎無譽才一發心拯拔輒招致疑神疑鬼大師勉於自昧而終不能不求有所拯拔即求有所以建僧弘法而覺世此大師真精神之所在亦偉大之所在亦受毀謗之所在余遂莘贊大師曰只為眉毛拖地惹得一身骯髒是也昧昧昧然此猶是一昧字以昧昧為筆名者如論梁漱溟東西文化及其哲學署名昧然者如論甘地等七交蘆子署名交蘆子者如成大乘論等悉掩關普陀時作交蘆之名取義於楞嚴經因塵發知因根有相相見無性同於交蘆中間無實性是故若交蘆時大師有楞嚴攝論之作故撰文以交蘆名焉八覺九群大師晚年創覺群周報於上海時寫短評即分此二字為筆名十雪山老僧竹陰閒話署此名所以表示長老之身分者有作儒佛會勘者大師許其契機書閲儒佛會勘隨筆惜對方為不懂事漢竟起而上下其議論乃不得不示現雪竇山老僧之風格再為閒話一番勸其吃茶養息去十一縉雲老人縉雲山為漢藏教理院所在地抗戰期中大師多度夏於此故晚年每自稱縉雲老人以此署名者如議印度之佛教老人老朽朽太大師晚年寫示弟子之信札輒署名老人老朽亦有作朽太虛者然非以老自傲實寓警策之意衰老之自覺面對欲革新而未能之佛教內心之惆悵為何如與月空書云余經數醫診治病仍無起色老僧不管興亡事後事如何付後人老朽字大師念及學問與事業之繼承無人唯有不了了之然悲心所至又有不能以不了了之者則唯自傷老朽勉發後人之進趣耳十二白平大師早年與黨人相往還外來信札每稱大師曰白平奘老及芝峰為編者說今存大師遺物有黨章一有白平字樣奘老交亦幻亦幻交與編者十三緑蕪落鳧此為大師民國初年於一般刊物投稿之筆名呂蔭南太虛大師早年生活之片段十四密宗革興會大師託名密宗革興會發表王師愈諍潮中之閒話大醒為編者說十五宏空民國八年有署名北京僧宏空發布佛教危言反對政府恢復民四製定而一度擱置之管理寺廟條例卅一條於諦間特多抨擊或以此出大師作宏空即太虛之隱語耳時大師確在北京而自傳十二亦謂謂我為反對諦間者北京僧宏空可能為大師託名然亦有以為不然該文有吾老矣無能為矣之句不類大師口吻今未能決其是非姑留以存疑綜上所說主名凡十五依於流衍來者凡十二其用為筆名而發表文字者有唯心太虛太泰羲悲華非心芬陀昧盦昧然昧昧交蘆子覺群雪山老僧縉雲老人緑蕪落鳧密宗革興會之十八或加宏空為十九二籍貫大師為浙江崇德石門人民國十六年呈內政部整理宗教文亦署籍浙江崇德大師之籍貫崇德似無可異議然今考之則應是海寧非崇德也人物志憶九云余原籍屬石門而生長於海寧州之長安鎮故與海寧汪莘伯有小同鄉之誼考之自傳一大師生父為石門今改崇德人十餘歲即孑然一身來海寧長安鎮從張其仁學泥水工經十餘年入贅於張氏以期繼承其工業翌年卒大師生母從未去崇德大師十四歲冬一度回崇德祭掃先塋但未能取得處理祖遺産業之權即遄返海寧是可知大師生長於海寧張氏故與海寧汪莘伯有小同鄉之誼然順於中國之宗法風習大師猶自稱原籍崇德原籍蓋其祖籍實則海寧人也三年齡大師生於光緒十五年臘月卒於民國三十六年三月依自傳所說世壽得五十九歲如云那時受戒時我才十六個年頭未滿十五歲自傳二草歲那年的夏天在七塔寺聽講二十歲那年的冬天我赴江蘇僧教育會自傳五二十二歲的春初到了廣州自傳五民國初年我二十四歲自傳七以民元為二十四歲推之則宣統二年二十二歲至廣州光緒三十四年二十歲在七塔寺聽講經光緒三十年十六歲在天童寺受戒生於光緒十五年核之事實無不合此為中國一般之計年法若據潮音草舍詩存及詩存續集以初度論年則大師去世時五十八歲猶未滿如云此身四十六初度甲戌臘月十八剃鬚漢皋人間四八今初度丙子黿渚四八初度度世年復年忽滿四十八丁丑滿四十八說偈身世今盈四十九戊寅五十初度己卯臘月十七夜至十八晨以余五十歲滿五十一初度己卯菩提場談院長訪問團團員等祝生日書示并序以初度論年故民國二十八年三月大師駐錫雲南碧雞山初寫自傳而序謂五十歲的時候嘗試寫過五十以前自傳五十歲起有了己卯日記若依一般計年法則是五十一歲今此年譜依自傳即一般計年法故論及初度每有出入處如陽曆民國二十四年大師四十七歲而一月二十二日始為大師四十六初度若此之類讀者勿以為疑民國二十九年夏大師講我的佛教改進運動略史所論三期之年歲多所未合自相矛盾進退難通應是記者聽之未審推算致誤不應以此起疑又呂蔭南太虛大師早年生活之片段自謂親聞大師所說而實有一年之誤總之大師之年齡依自傳及詩存極明確而無所疑也四眷屬等覺大士必先眷屬圓滿妙覺佛陀有近眷屬大眷屬內眷屬之衆今準此意略敘大師之眷屬先論世俗眷屬父系崇德呂氏世業農或言出晚村後人亦末由稽考父名駿發幼孤貧習泥水工於海寧之長安光緒十五年春入贅於海寧張氏冬生大師翌年病卒年二十八母系海寧長安張氏外祖父其仁為泥水工巨擘以工起家光緒二十四年以七十餘高齡棄世外祖母周氏道名理修本吳江富家女幼讀書多識而明決初嫁生一子子綱值洪楊亂離挈兒避難來長安因再嫁張氏生女一即大師生母晚年居道庵道佛兼奉信行頗篤遊江南名山九華普陀等殆遍光緒十五年時年逾六旬矣大舅祖綱業商光緒二十八年頃病癱卒有子三二舅子綱本外祖母先夫所出幼隨母來長安因從母以張為氏聰明多才藝曾赴童子試惜以吐血染阿芙蓉癖日以潦倒以教蒙館度生有女二後不知所終母張氏秀美而婉弱年十六而婚當年生大師翌年夫卒後改適石門洲全鎮之李姓有子女三居常多愁善病光緒二十七年夏病卒年二十八次論僧伽眷屬師祖奘嚴奘年法名寬妙湘人光緒十四年出家於湖南衡陽東洲羅漢寺光緒二十九年來參寧波之天童以後往來天童儼以寧屬為第二故鄉奘老古道熱腸肝膽照人清末圓映以事觸寧波縣知事怒被判驅放回原籍奘老濟之以旅資且代為枷繫伴送至上虞人以是稱之奘老護念大師甚切外祖母以外一人而已民三十七年十一月編者訪之於天童年七十五歲猶康樂率真如昔師士達法名弘量湘人光緒十八年投羅漢寺從奘老出家光緒二十二年來江浙二十九年住持上海敬心寺士老不拘小行而持誦甚虔民國三十三年無病卒年六十七大師慨今佛門付法徒存形式故不以法系為重其剃徒及徒孫中其事有可記者附見於年譜略攝二表如下一剃徒法名表字俗名籍貫出家生卒情形乘悲安徽返俗乘智安徽返俗乘戒江西返俗大安浙江民國七年十年頃卒傳心大慈黃葆蒼湖北民國八年十一年秋卒傳佛大覺董慕舒四川民國八年十四年春卒傳衆大勇李錦章四川民國八年十八年秋卒大默鄧湖北民國九年十年卒傳慧大嚴王虛亭安徽民國十一年十五年冬卒傳忠大敬唐畏三湖南民國十二年二十四年卒傳信大愚李時諳湖北民國十二年不明傳震大剛王又農湖北民國十二年三十四年卒德瑛尼李梅石湖北民國草二年卒二徒孫法名表字籍貫師長生卒情況法宗恆演湖北大慈留學拉薩得格西位法旭恆照湖北大慈二十四年卒恆明河北大慈二十二年返俗法光密吽湖南大勇二十四年返俗法淨密慧湖北大勇拉薩學法法如密嚴四川大勇二十六年返俗法普密悟河北大勇留學拉薩得格西位法輪密圓大勇法雨廣潤弘妙湖北大敬杭州靈隱寺退居法喜江西湖南培元寺住持法常江西湖南羅漢寺僧職大師剃徒以大慈大覺大勇及大嚴大敬大愚大剛為上大勇西行求法惜未竟入藏之志大愚信願深切宜可大成惜以求證心切流入歧途徒孫