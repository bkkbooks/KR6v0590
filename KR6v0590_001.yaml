中秋大師於觀月亭待月詩存續集十月十三日一代藝人律宗耆德弘一卒於泉州林子青弘一大師年譜二十七日印順寄印度之佛教初章來請序大師因撰議印度之佛教為大師印度佛教史之概觀文第一期之佛教應曰佛陀為本之聲聞解脫庶於後行之大乘有其本根第二期可曰菩薩傾向之聲聞分流但應歷佛滅至馬鳴前約五百餘年內更分小節第三期應束三四期曰佛陀傾向之菩薩分流此中可分四小節一佛陀行果讚仰而揭出衆生淨因之真常唯心論此於六百年頃法華涅槃般若華嚴等漸興及馬鳴諸論代表之二對治外小執障而盛揚摩訶般若之性空幻有論此於七百年頃龍樹提婆諸論代表之三依據法性空義而補充小大有義之有為唯識論此於九百年頃無著世親諸論代表之四空有劇烈爭辨而小大宗見各持之漸傾密行論此於千餘年頃清辨月稱安慧護法諸論代表之則驗之向傳印華佛史無不符合之大乘時代也第四期可曰如來為本之佛梵一體則承前厭倦苦諍而傾向外內大小空有融合持行之趨勢龍智等密咒盛行在佛滅千二百年起奄奄五六百年內更可分小節則適當我國唐開元前以至宋元時是也基佛世之淳朴握持馬鳴龍樹無著之一貫大乘前融采聲聞分流而後攝擇宗見各持與如來一體亦即依流傳在中國者攝持錫蘭傳者及擇取西藏傳者成一批評而綜合而陶鑄之新體系庶其為著述印度佛教史之目標歟是年下學期大師講法性空慧學概論於漢藏教理院心月融海妙欽合記又講四教儀了參光宗記其懸論成天臺四教儀與中國佛學大師學本中國佛學而近二十年來佛學院每偏重唯識而四川又多重中觀及密宗是年後大師乃多講中國之佛學十二月南華寺虛雲以主持法會之便來訪大師於縉雲山大師殷殷以共舉佛教為望海草四一一月佛教海草四五一月佛教惜虛雲為左右播惑顯明張子廉於淨虛空中橫生枝節時林主席等發起護國息災大悲法會道場四十九日十二月九日始明年一月二十六日圓滿戴傳賢為法會會長迎南華虛雲主持之法會甚盛民國三十二年一九四三壬午癸未大師五十五歲一月大師在重慶於錢業公會講經海草四二各地電函摘要十三日陪都擴大舉行釋迦世尊成佛紀念大會由大師及虛雲分別開示盛況空前海草四二陪都成佛日大會特輯十四日大師與馮玉祥于斌白崇禧發起中國宗教徒聯誼會舉行發起人會海草四二函電摘要是月海潮音由福善移往成都大慈寺編發海草四一卷首三語二十二日臘月十五大師應榮昌緇素請車抵榮昌駐錫寶城寺寺主嚴定海草四三太虛大師蒞榮昌遊化紀要二十四日十九日大師應榮昌各界歡迎就縣廟講中國文化及佛教於戰後歐洲民族之關係永遠記海草四三太虛大師蒞榮昌遊化紀要二月大師度舊年於寶城寺十日回重慶詩存續集編輯室來函摘要大師於羅漢寺逢星期六及星期日公開答問海草四四破疑網於重重二十七日唯識學者歐陽竟無卒於江津之內學院海草四四一月佛教大師挽之云勝軍論後有斯文公已追蹤先覺石埭門中空上座我尤孤掌增哀是月大師於金劍山漢院屬寺創設大雄中學籌備經年至此始正式開學大師任董事長以吳子詒為校長大師書數語以贈學生求學之道要求學成為一個知識德行能力都完備的人在社會中為一能自力能互助之份子在國族中為一能工作能貢獻之國民在世界中為一能承先能啓後之世人推至其極則如釋迦牟尼佛在宇宙中為一能遍覺能普救之大雄大雄者大英雄也先從社會中在國族中做起大師初擬辦一含有政治意味之學校因介紹識連謀有關之吳子詒惟幻葦舫參預其事後其事未能實現乃改辦中學三月二十一日大師以張道藩以我們需要的文藝政策相詢乃作對於文藝政策之管見時欲以恢復宋儒傳統襲取應用西洋哲學為範疇之新儒家日見囂張多師理學餘緒而排斥佛法大師故斥謂設一言固有文化即隨瞀儒淺見籠統的以接受韓歐程朱一流為恢復而不知韓歐膚淺無識之偏狹程朱陰盜陽憎之欺僞其狹僞實為中國文化千年來漸陷低弱之主因則恢復固有文化反成加三民主義以拘蔽使不能有所擇取於初盛唐雄大宏遠之全國民族文化也大師同時作中國民間之教化何在後且數數論及此實則新儒家也者既不與一般民間思想相關復不為新進思想所取僅為御用文化耳二十二日大師於重慶獅子山跋國際大學教授吳曉鈴說諸佛世尊如來菩薩尊者名稱歌曲文某日癸未仲春大師偕定九李子寬往遊涪陵普陀山之紹宗寺詩存續集詩存外集海草四四一月佛教五月九日立夏後三日戴季陶孝園為康寂園寄遙楊叔吉洗塵席間推大師為紀一詩海草四八一月佛教孝悌人之本寂光佛所歸一園賓主序林外日依依二十二日中國宗教徒聯誼會成立海草四六訪函記要大師任常務委員佛回天主基督各一人以衛立民為總幹事是會之任務為擁護抗戰建國尊重信仰自由提高精神修養勵行社會服務促進世界和平五項贊文大師留渝期間廣播佛教與國民外交佛教之中國民族英雄史閲為性空者辨均是時作月底大師回縉雲山七月二十七日大師以大雄中學立案事在重慶致海定書一三八月一日林主席卒於渝後蔣中正繼任夏季大師應張治中康澤之約赴夏令營講佛教哲學與青年修養海草四九一月佛教是年夏秋間大師撰中國今後之文化大公報九月十九日聯合國戰勝後之平和世界新中華八月號人群政制與佛教僧制時代精神又講佛教徒應參與中國和世界的新文化建設了參記於文化政治多所論及論平和世界原則為世界人類之利益為第一國家民族之利益為第二個人家屬之利益為第三時滇緬路中斷西藏之對國府日見頑梗中央有武力解決之意大師乃作西藏問題之適當解決文八月三十日大師作再議印度之佛教為漢院學生講之中國佛學印度之佛教於真常唯心論即大師所贊之法界圓覺宗頗有微辭以大乘之發展為性空唯識而後真常唯心論與大師之先真常而後性空唯識相反因再為評議十月四日大師閲入中論記脫稿文月稱之入中論法尊於三十年譯出大師曾為刪潤是論高揚中論空義而專破唯識大師不忍唯識之被破乃朋唯識而一一反難之評入中論為功過互見而瑜不掩瑕七日重九大師與黃懺華陶冶公陳耕石在縉雲山聯句詩存續集十日國慶大師於漢院講各人要在自己的岡位上努力光宗記文大師謂求學時要警策自己適應環境利用環境去充實自己作事時要透視現實確定理想根據理想去改造現實是年下學期大師於漢院講中國佛學性覺光宗等記為大師對於中國佛學中國獨創之佛學作一縱貫之敘述講經一載大綱為一佛學大綱二中國佛學之特質在禪一依教修心禪二悟心成佛禪三超佛祖師禪四越祖分燈禪五宋元明清禪三禪觀行演為臺賢教四禪臺賢流歸淨土行一依教律修禪之淨二尊教律別禪之淨三透教律融禪之淨四奪禪超教律之淨五中國佛學之重建時大師又講賢首五教儀了參記其懸論名聽講五教儀拾零文是年秋冬大師所作小品多以感為題如雜憶和雜感閲東方雜志漫感偶閲理想與文化的隨感感愚昧之害他自害談中印佛教之偶感十一月大師應復旦大學社會學系社會研究室之約往講中國之佛教天慧記海草四十二佛教新聞大師自復旦轉金劍山視察大雄中學及塔坪寺民衆學校海草四十二佛教新聞詩云金劍創開新氣象塔坪還保古風規一般淨化人間世縉嶺雲深是總持大師於大雄中學以勤儉誠公為校訓略為開示塵空記文大師抵渝時以內政部頒布八月間修正之寺廟興辦公益慈善事業實施辦法既由縣市政府主組委員會征收興辦又於各僧寺每年收益在五萬元以上者即須征收百分之五十以今之物價論則五萬元才為敷五人最低生活費耳復全由縣市主組委員會征收不惟非自行興辦且殆無過問之權致蔣主席書致各地佛教陷於紛亂大師乃召集中國佛學會理監事聯席會議發出虞電呼籲反對中央及地方主管機關宜仍居監督指導地位責令各省佛教會聯合恢復中國佛教會并健全市縣佛教會自組佛教自組興辦公益委員會集辦應辦公益以符教産辦教務之旨要之如認佛教為中華民國不可容存而欲毀滅之者應明白宣布其理由如認佛教為約法憲章所容許自由信仰宗教之一佛教徒亦為中華民國國民則於類似天主教等教産之僅存佛教教産固應同享法律之保護乃內政部主管司科不允取消竟謂此由參考大師前年呈行政院文意而訂大師乃迫得於翌年一月二日致書蔣主席作悲憤之陳辭略謂與太虛前呈行政院之文意適成北轍南轅之舛馳一係健全僧寺振興佛教一係掠奪寺産毀滅佛教誠有霄壤天淵之別本年內政部所修訂辦法則由縣市政府鄉鎮保甲為刀俎而寺僧為魚肉可立致全國佛教於摧殘者也而整興僧寺發揚佛教以利益國家民族及世界人類為太虛第一生命太虛對於中國文化世界學術之貢獻非淺而抗戰在國民一分子之佛教徒立場上對於抗建之努力亦不為少乃未蒙中樞之佛教主管司科及一分省縣中鄉保當局之諒察時有摧奪僧寺危亡佛教以斬絶太虛第一生命之舉動則太虛固無負於國人而國人實有負於太虛也如荷矜察而令由主管官署貫徹施行則太虛自當在佛教徒立場上倍加努力以贊襄復興中國民族之盛業不然則決不能坐視寺僧摧剝佛教危亡而再靦顏苟活於斯世也書上得停止實行十二月一日大師應西南緇素之請飛抵桂林道安李濟琛任潮等來迎駐錫月芽山海草五一太虛大師飛西南宏法受熱烈歡迎三日李濟琛假佛教會設席歡迎黃旭初蘇希洵等均來會海草五一飛西南宏法受熱烈歡迎四日大師於廣西省佛教會公開講演中國之佛教與復旦所講者同海草五一飛西南宏法受熱烈歡迎連日暢遊名勝均紀以詩詩存續集六日大師偕湖南歡迎代表聞又越培元專車抵衡陽老友空也學生茗山等來迎駐錫花藥山海草五一西南宏法受熱烈歡迎海草五二五洲宏化的太虛大師茗山痛哭老人八日大師應衡陽佛教居士林請就社會服務處講佛教與中國文化及世界和平海草五二五洲宏化的太虛大師大師偕空也越培元等經培元寺抵南嶽十四日十八日衡山佛教會及南嶽各界於祝聖寺開會歡迎大師講佛法大意澄源記文海草五二歡迎太虛大師詩録大師暢遊南嶽名勝所至均紀以詩詩存續集且於水簾洞工校講工業文明之佛教石頭塔商校講緣起性空義等海草五二五洲宏化的太虛大師海草五二一月佛教大師與趙市長等返衡陽翌日大師被公舉為花藥山住持大師以茗山任監院海草五二五洲宏化的太虛大師茗山痛哭老人二十一日大師抵耒陽駐錫金錢山寺二十三或作四日應耒陽民教館請於民衆劇場講佛教與人生明真記海草五三大師弘化行蹤大師留耒期間指導省佛會集黨政軍代表決議組織湖南僧侶救護隊海草五三大師弘化行蹤二十七日衡陽杜局長來花藥山禮請大師赴粵漢路大禮堂說法大師講佛法原理與做人聞又澄源合記文三十日大師抵歧山仁瑞寺海草五三大師弘化行蹤是年圓映春在無錫南京秋去天津北平保定於淪陷區大轉法輪受朝野尊敬葉性禮圓映老法師事略漢藏教理院建大講堂及圖書