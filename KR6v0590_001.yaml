施頌頌曰緣起無實相續互關如理行事濟衆勤勇大師移錫延慶寺大醒亦幻芝峰隨侍左右無言菩薩學處講録記述序民國三十六年一九四七丙戌丁酉大師五十九歲一月三日大師偕芝峰等去溪口回一別十年之雪竇寺留三宿不勝廢興之感覺群草六草七重歸雪竇詩云妙高欣已舊觀復飛雪依然寒色侵寺破亭空古碑在十年陳夢劫灰尋時雪竇寺住持職大師已於夏季交與大醒大師去天童育王訪舊與芝峰度舊年於阿育王寺詩存續集閒讀史達林傳於共産黨員應具之體力智力意志力豫以同情之感云記閲書遣閒看完這一段話真同看到瑜伽師地論察驗菩薩種姓應具的六度善根一樣令人肅然起敬地感覺著如遇到了菩薩但缺少一些慈悲仁愛二月二日丁酉元旦大師於延慶寺開講菩薩學處凡三日為大師最後說法無言記成菩薩學處講録無言菩薩學處講録記述序大師新春試筆作中國應努力世界文化文六日大師至慈溪普濟寺又信侍座回憶大師留甬期間禮奘老解常佩玉玦親為奘老懸於胸前奘老為編者說有訣別之兆又作詩奉奘老為大師最後詩篇吃虧自己便宜人矍鑠精神七四身勤朴一生禪誦力脫然蕭灑出凡塵錫蘭僧索麻等不守信約藉口滬地天寒去香港過冬一月六日即離華返錫徒耗香港上海西安等信施且有不利中國佛教之傳說大師因擬致摩訶菩提會書囑葦舫以世苑祕書名義由法舫轉交原書云法舫來函亦忘了原約以彼等為來華傳教者措此錯誤言詞今可以世界佛學苑祕書葦舫名義正復一函與哥侖布摩訶菩提會一原訂約雙方為哥侖布摩訶菩提會與西安世界佛學苑巴利三藏院雙方交換各二僧華赴錫二僧以學巴利佛教為主兼傳華文佛教錫來華二僧以學華文佛教為主兼傳巴利佛教各期五年二雙方未達目的地前及離目的地後來回一切費用皆由自備到後由訂約雙方互供膳宿并供每月三十羅比備用三事前曾警告應由加飛重慶轉飛西安不可走海道乃回信經海道所增困難及一僧之費用概由自任故只可聽之四索麻等抵滬為備供膳宿處一星期便即赴陝上海並無世界佛學苑機構後以索麻等要求在上海安居三月另籌備宿處及食費約耗萬餘羅比由上海佛教團體及信徒籌付然索麻等只熱心傳巴利佛教對於學習華文佛教無表示求學五當安居初西安已派善歸比丘來接待至安居將終索麻等決表示返港過冬善歸始返西安為修住處及種種籌備歡迎與專員往返結果不去不惟大失人望且空耗經費不資矣六決返香港係出索麻等自意然苑長仍囑香港信徒豫以資助並約春暖再至西安後因索麻又怕西安寒冷及疑地方不安等重慶峨眉漢口及寧波之延慶寺雪竇山等亦均表示可歡迎前去乃索麻等突然來信於一月六日乘船經新加坡而返錫矣今詳告索麻比丘來華離華之經過于貴會者非欲責以他事但欲貴會明了種種違約行動全出索麻等三比丘而敝苑之西安巴利院不僅忠實履約且曾為種種額外之招待也大師組黨未成梵波塵空作關於佛徒組黨問題謂大師立於超然地位從未向任何人作任何活動之表示他本人卻無任何活動和領袖的企圖殊與大師態度不合大師作佛教不要組政黨對大師政治活動之態度表示最為明確大師以為極力表揚我的清高與我捨身為佛教為大衆的態度卻不盡相同大師之意境使佛教有組黨必要且需其出而領導者則自當捨身捨心以圖之今雖無組黨可能因緣未具仍望以覺群社為其聯絡時大師有論時事小品數則如呼籲美蘇英倡導和平國內和平的前途瞻望與中間調解救西洋之亂即救世界之亂十七日大師得福善病訊於寒雪中自甬來滬駐錫玉佛寺直指軒慟福善福善於二十日不治去世大師深慟之作慟福善不獨惜其人且為上海佛教之開展惜也三月五日大師於上海玉佛寺召開中國佛教整委會第七次常務會議時整理大致就緒議決於五月二十七日起開全國會員代表大會七日中國佛教會整理委員會附刊十七十二日大師為玉佛寺退居震華封龕書封龕法語為大師最後遺墨略謂為震華法師封龕太虛老人諸法剎那生諸法剎那滅剎那生滅中無生亦無滅卅六年三月十二日在玉佛寺般若丈室按震華未及大師之門或傳其與福善為大師得意弟子非也大師說法且竟忽中風舊疾復發京滬杭甬間弟子聞訊來集多方醫護而大師殆以化緣周畢竟以十七日下午一時一刻於玉佛寺直指軒安詳捨報時玉佛寺主葦一出家弟子大醒亦幻塵空燈霞月耀松月演培在家弟子李子寬謝健沈仲鈞衛立民楊樹梅過聖嚴胡聖輪侍者楊承多等侍側助念彌勒聖號祝上生兜率再來人間塵空虛公病室日記十九日為大師行封龕禮老友善因親來主持參加典禮者寺院及佛教團體外到當地黨政機關代表及馬占山湯鑄新黃金榮等凡三千餘人中宣部攝影場及中外日報記者競為攝影報道月耀虛公治喪處日記治喪期間重慶法尊武昌葦舫西安超一開封淨嚴杭州會覺巨贊宏妙大師徒孫印順妙欽續明南京曇鉢鎮江雪煩茗山常州明智等均先後來集弟子集議對於大師志業之推進議決重慶世苑漢藏教理院由法尊主持武昌世苑圖書館由葦舫主持海潮音由塵空主編大師色身舍利塔建於奉化雪竇山各地得分請舍利建紀念塔大師法身舍利由印順負責編纂大師遺物概移存武昌紀念時政要名流海內外佛教緇素電唁哀挽備極哀榮四月八日舉行大師荼毗典禮自玉佛寺趨海潮寺寺主心緣參加恭送荼毗行列者長達里餘是日仍由善因主持說法舉火月耀虛公治喪處日記十日晨法尊等於海潮寺拾取靈骨得舍利三百餘顆紫色白色水晶色均有而心臟不壞滿綴舍利足徵大師願力之宏月耀虛公治喪處日記十四日大醒亦幻淨嚴塵空等恭奉大師舍利靈骨至雪竇翌晨抵寧波緇素集迎致祭專車入雪竇山安供法堂塵空奉骨入山記五月二十日印順續明楊星森等開始於雪竇寺圓覺軒編纂太虛大師全書其緣起及編目云佛法為東方文化重鎮影響我國文化特深此固盡人皆知之然能闡微抉祕暢佛本懷以適應現代人生需求者惟於太虛大師見之大師本弘教淑世之悲願以革新僧制淨化人生鼓鑄世界性之文化為鵠故其論學也佛法則大小乘性相顯密融貫抉擇導歸於即人成佛之行世學則舉古今中外之說或豫或奪而指正以中道其論事也於教制則首重建僧於世諦則主正義道和平憂時護國論列尤多大師之文或汪洋恣肆或體系精嚴乃至詩咏題序無不雋逸超脫妙語天然然此悉由大師之深得佛法稱性而談未嘗有意為文有意講說蓋不欲以學者自居也文字般若未可以世論視之平日所有撰說或單行流通或見諸報章雜志時日不居深恐散佚為佛法計為中國文化計全書之編纂自不容緩同人等擬編印全書奉此以為大師壽舉凡部別宏綱編纂凡例悉遵大師指示以為則且將編印矣不圖世相無常大師竟匆遽示寂也昔雙林息化賴王舍結集乃得色相雖邈而法身常在則是本書之編纂流通彌足顯大師永壽之徵矣全書都七百萬言勒為四藏二十編次第印行若此勝舉吾文化先進佛教耆德當必將樂豫指導以贊助其成矣法藏一佛法總學二五乘共學三三乘共學四大乘通學五法性空慧學六法相唯識學七法界圓覺學制藏八律釋九制議十學行論藏十一宗依論十二宗體論十三宗用論十四支論雜藏十五時論十六書評十七酬對十八演講十九文叢二十詩存二十五日四月六日中國佛教會整理委員會中國佛學會暨南京市佛教會假毗盧寺舉行全國性之追悼會到國府委員章嘉國府各部會代表及全國各省市代表等千餘人會場滿懸哀挽詩聯有蔣主席潮音永亮等五千餘件海草八七佛教新聞其餘各地追悼會遍於全國以重慶漢藏教理院漢口佛教正信會最極隆重國際若印度新德里召開之泛亞洲會議臨時舉行追悼會覺群四十四十二摩訶菩提會建太虛圖書室為紀念海草八七佛教新聞等並見大師德化之溥二十六日首都毗盧寺舉行中國佛教會勝利後第一屆全國會員代表大會海草八七特刊中國佛教會務經大師一年來領導得以正式成立方期整建不遠其如政局復陷動亂功敗垂成緬懷大師孰不愴慟六月六日政府頒褒揚大師令國民政府令三十六年六月六日釋太虛精研哲理志行清超生平周歷國內外闡揚教義願力頗宏抗戰期間組織僧衆救護隊隨軍服務護國之忱尤堪嘉尚茲聞逝世良深軫惜應豫明令褒揚以彰忠哲此令民國三十七年一九四八丁酉戊戌一月海潮音由大醒編輯五月三十日大師全書編竣續明太虛大師全書編纂始末略記七月大師全書初編佛法總學四冊以李子寬蘇慧純協力由上海大法輪書局印行流通民國三十八年一九四九戊戌己亥一月六日臘八雪竇山大師舍利塔工事粗備以時局動蕩大醒奉大師靈骨入塔時各地舍利紀念塔武漢由李子寬鍾益亭呂九成等廈門由蔡契誠許宣平虞德元等發動興建先後完成餘香港暹羅由優曇重慶由法尊西安由定悟開封由淨嚴等分請舍利猶在籌建中二月大醒以海潮音移臺灣編發民國三十九年一九五己亥庚子二月大師全書二三兩編上海排印未及發行而政局突變第四編大乘通學四冊在香港出版優曇李子寬陳靜濤蔡契誠何心尊等集資組太虛大師出版委員會於香港發心次第付印流通四月一日印順編太虛大師年譜脫稿
