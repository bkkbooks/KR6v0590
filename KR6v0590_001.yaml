會祕書維利申喀函大師駐錫南京佛會辦事五月國民會議開會大師上國民會議代表諸公意見書擬就保護寺産之建議經班禪代表提出會議通過十三日元致電達賴請其來京與班禪修好蓋時大師與班禪晤談知班達間之隔礙起於徒屬其後八月一日國府乃公布維護寺産之明令謂以後無論軍警以及機關團體個人等如有侵奪占用佛寺僧産者概依法律辦理中佛會之成立至是始獲得中央黨部之認可略史呈行政院維護佛教寺僧電邀達賴來京大師駐京期間隨時弘化講心經於中國佛學會李了空與胡法智記成般若波羅蜜多心經講義講佛學與國術於中央國術館傳戒胡法智記講現代人生對於佛學之需要於基督教青年會談玄胡法智記文時以圓映等辭職諸山承認之經費抗而不繳不合作運動陷會務於無法進行略史而黃健六致書大師且印刷分發指會議選舉為不合法建議中佛會移滬辦事略史黃健六致滿智書大師鑒於事之難行亦於六月三日申報聲明辭職黃鐘十四日上海部分執委以協和挽留名義於上海功德林召開第三屆第二次執行委員會議案如下一王一亭居士提議請辭職各執監委員一致挽留請求復職議決通過去函敦請二王一亭居士提議南京設立會所上海仍應設駐滬辦事處並於四屆大會提出追認議決京會請太虛法師謝鑄陳居士主持會務上海設駐滬辦事處常會由會召集或即在上海開會公推圓映法師暨王一亭居士為辦事處主持有事開會公議又公推鍾康侯居士為本會駐滬辦事處祕書長每月致送車費五十元現代僧伽四三此非協議挽留實乃偷天換日棄京會於不問大師佛教會之工作完全失敗圓映為江浙諸山叢林名流居士所擁戴以反對佛教之革新大師與圓映間乃不可復合二十一日大師主持中國佛學會之改選加強組織海十二九史乘二十八日大師離京抵北平七月二日發出退職之通告以明今後之責任時雲南四川等省佛教會攻訐黃健六而挽留大師之函電編集為黃鐘茲録有關函件二種以略見當時情形大師復黃健六書云惠書展悉雖則溢譽之辭才追繡虎其如無悔之意德躍亢龍然此個己之間亦何關於得失憶前者華札朝至蕪緘夕復亦既披陳實情冀袪疑滯並云如有良方願承明教儻求改進儘可提商乃遽爾印刷分發挑起教內之鬥爭報章騰播引來俗間之非毀致令已認之半數經費抗延不繳議決之會務僧員養成設辦莫從百事阻撓群凶肆擾不惟口吐刀矛上搖監察院之聽直欲身為屠膾下挾流氓幫之威弟兄反目邪外快心廟産興學雖打銷於國民會議而又促成立佛會許設雖通過於中央黨部而仍莫進行事至於斯勢安可為宣布退出夫豈容已紙老虎戮穿不堪再用破沙盆扶起但逞偏鋒鹵莽為能未嘗非法而竟成非法駢枝亂設指上海辦事處已是糟糕而更成糟糕未見調聏有方硬為拉扯奚益應移居士之熱誠從事衆頑之感化稍解唯我唯私之癡微發為教為衆之意勿存把持重謀組織欲建僧寶之住持必為僧制之整理斯言決定可喻金剛實施方案能立初步基礎新進危言本祇什一希冀若得提攜之道不難和合以行吾自審捨身捨心救僧救世慧德無讓古賢福緣乃遜時傖每逢隨俗浮沈可括囊無咎無譽才一發心拯拔輒招致疑神疑鬼進無可許退猶不容憎愱所加濫小報詈為修羅顛倒之極捏名信誣為邰爽秋黨縱無傷吾之毫髮亦可覘世之響趨出任勞苦徒損自他則不惟我應忘世而世亦應忘我矣嗟乎居士亦能永忘之歟黃健六致滿智書云不得已始致書太虛法師有所商榷意圖挽救於萬一耳而昧者不察一味以私心妄想測度先後以謗書十餘種紛投沓至捏詞誣陷遍發傳單舉凡人間之卑劣手段皆不惜引而用之或盜用安慶迎江寺之名或假託正信會三萬餘人之衆或捏稱安慶佛教會改組促進會名義無中生有盡情誣辱一時知名之彥謝鑄陳居士來書亦斤斤於職負去就為辭何示人識量之不廣耶大師抵平駐錫居士林當晚為大師洗塵到靳雲鵬祁大鳴熊東明胡子笏汪波止台源等四十餘人海十二九史乘七月一日大師應華北居士林暑期佛學講習會請講能斷金剛般若波羅蜜多經胡繼羅繼歐繼木合記成能斷金剛般若波羅蜜多經釋後又講大乘入道次第章大意能斷金剛般若波羅蜜多經釋序海十二九史乘法舫致編者書三日大師講僧教育之目的與程序於柏林教理院化城記文五日大師開始於柏林教理院講大乘宗地圖逢星期日星期一開講凡三十小時而畢法舫記成大乘宗地圖釋法舫大乘宗地圖釋後序本圖釋為大師八宗平等各有殊勝之極則分教法與宗義而廣明一切佛法概從第六意識為中心而觀察之蓋深得唯識學之心髓然此為大師過去之佛法統系講時已心不在是故曰此圖為華文佛法之一總綱總持華文所詮表之一切佛法也最近所創世界佛學苑其研究佛法之根據又較吾昔根據華文者大有擴充今後之佛學應趨於世界性作最普遍之研究修證與發揚今後研究佛學非復一宗一派之研究當於經律論中選取若干要中之要作深切之研究而後博通且融會一切經律論成圓滿精密之勝解上不徵五天下不徵各地之拘局時已大為解脫昔擬作大乘宗地之引論本論餘論大乘宗地引論僅成引論且以此圖釋作本論而餘論不出其後以現實主義為本改名真現實論以前所出者為宗依且將作宗體宗用論以完成其全體思想其間以梅立德之約大師講宗教對於現代人類的貢獻於協和醫院華文學校法舫記又於彌勒院佛教學校講現代學僧畢業後的出路台源記文八月十二日申報有慧空大覺等聲明攻訐大師不數日慧空等聯名否認蓋時黃健六本師諦老講涅槃經於上海玉佛寺現代僧伽社員多憤黃健六之作梗適心道以諦老十六年所作金剛經新疏詡為老人三十年持誦之獨到者實為清溥畹經疏之抄襲告於芝峰乃以覺道為名而揭發於現代僧伽諦老徒屬不忍因有捏名慧空等意外之誹毀大師知係現代僧伽招來反嚮置之不理與康寄遙書三此為中佛會事件之餘波十八日靳雲鵬翼青從大師受皈依請於華北居士林講八識規矩頌為紀念胡繼歐記成八識規矩頌講録海十二九史乘法舫致編者書大師先明順轉雜染分以第六前五第八第七識為次第次明逆轉清淨分以第六第七第八前五識為次第悉以意識為出發頗便初學時大師於居士林更講有從世界危機說到佛教救濟念佛往生的原理佛教應辦之教育與僧教育從中國一般教育說到僧教育當時佛學院之僧教育不盡如大師理想以為仿辦世俗學校的佛學院亦幾於為寺僧社會添造出不切實際不符宗旨的游僧今日的僧教育應速分為兩大支一支為汰除的僧教育使之退為沙彌或優蒲以習農工而自食其力一支為考取的僧教育使之入律儀院二年教理院七年參學處三年的學僧養成弘法利人的職僧由選拔為職僧推定為德僧者以主持佛教大師以為不如是則興辦佛學院非功德而實為罪過大師理想中之建僧教育始終未得少分實行一般侈談僧教育者似絶少領解於此九月一日大師以夏秋間大水遍十六省武漢尤甚作告武漢民衆書談玄致大師書敬請全國僧寺努力救災啓文根本救災在全國人心的悔悟亦先後作是日又作告全國僧寺住持書主組織僧寺聯合會佛教護法社僧俗各別組織勿為魚肉僧寺之劣紳土豪所得便十八日瀋陽事變發生十月發大師撰為瀋陽事件告臺灣朝鮮日本四千萬佛教民衆書勉以秉承佛訓起而革日本軍閥政客之命書云現代歐洲國家走上帝國主義極端而被民族革命所反抗走上資本主義極端而被共産革命所反抗於是歐洲文明陷入於全體崩潰之末路吾人方期以智悲兼充福慧雙隆自他俱利心色交融之佛法為亞洲各民族文化之總線索以之復興亞洲之民族文化復興亞洲之民族國家相資互助濟弱扶傾以成為講信修睦之大聯合進而化轉歐洲之立國精神同趨入國際和平世界大同之盛軌而可為亞洲各民族之導率者要唯印度中華日本之佛教民衆乃不圖佛教徒確占過半數之日本民族今竟不能自抑其貪欲瞋恚迷昧因果之理造作凶暴之行妄動干戈強占中華民國東北之遼吉兩省復運其海軍陸戰隊威脅天津青島海州上海以及長江各都市且強迫滿人蒙人為傀儡而誑言獨立十惡五逆一時俱作以殘毀五族共和之中華民國亦即為逼令東亞以至南亞全亞佛教民衆入於自相殘殺之一途將亞洲民族之活路突然堵塞亦將進於世界和平之基礎忽爾摧壞若循日本最近對中國之行動而進展誠思以地大人衆新興蓬勃之中國民族又豈能為日本完全吞滅則勢須出於兵連禍結相持不下甚而引歐美各國相率來此東亞以作戰場發生二次世界戰爭中國固首受其害而日本數十年來所造成之政治的經濟的優勢殆將一舉而歸於毀滅亦寧日本之利進言之不惟東亞以及全亞各民族聯合復興之機緣為破壞即國際和平亦為之崩裂使世界常陷於紛爭而莫出然此蓋日本少數貴族軍閥政客之所為耳不惟非日本全國民衆之公意而明達事理人士且多反對之者特處於軍閥政客暴威之下無可如何而已可憐哉日本以及朝鮮臺灣之民衆日本之軍閥政客將迫之永歸淪滅何可不速起自救乎瑜伽師地論菩薩地戒品云又如菩薩見有增上增上宰官上品暴惡於諸有情無有慈愍專行逼惱菩薩見已起憐愍心發生利益安樂意樂隨力所能若廢若黜增上等位由是因緣於菩薩戒無所違犯生多功德因此我臺灣朝鮮日本四千萬信佛民衆應速速成為一大聯合以菩薩大悲大無畏之神力曉諭日本軍閥政客因果之正法制止其一切非法行動如勸阻而不聽從則進而與東亞南亞以及全球之佛教聯合組織成佛教之國際以聯合振興亞洲各民族皆獲平等自由為職志亦以聯合世界上平等相待各民族實現永久和平為歸趣起而若廢若黜日本軍閥政客之增上名位使不能憑藉以施行其上品之暴惡逼惱中國五族以及臺灣朝鮮日本一切無辜之有情民衆咄咄我臺灣朝鮮日本之四千萬從佛口生從法化生之同胞君等其真為信佛民衆乎君等其真以佛菩薩之心為心乎君等其真正奉行佛菩薩之教訓者乎將以君等對日本軍閥政客能否制止其非法行動以決之咄咄我臺灣朝鮮日本四千萬佛教同胞其速起速起速起是年大師在平遊溫泉明陵南口湯山紅螺山諸勝詩存二十八日大師應陝西辛未講經會之請離北平南下化城為侍録海十二十一史乘三十日大師受鄭州各界之歡迎講從地理上交通的中心說到國家社會的中心於商會淨嚴與化城記趙際五處長與黃縣長招待甚殷海十二十一史乘十月二日大師以張伯英等電請及淨嚴袁西航馬一乘黃壽椿余乃仁等來鄭歡迎故折往開封一行即日偕余乃仁邱寄蘋袁西航等遊龍亭繁塔相國寺諸名勝於河南佛學社開示顯示真實相所開的三重方便門淨嚴與袁西航記海十二十二史乘三日應劉峙主席之歡宴下午應省立水利工程學校及河南大學農學院約就水專大禮堂講對於學生救國之商榷慧輪記海十二十二史乘四日上午講佛法之四現實觀於河南大學樂天愚記下午各界假人民會場開歡迎大會劉主席夫婦李局長夫婦等均來與會聽衆逾萬大師講中國之危機及其救濟淨嚴化城心海合記翌日離開封西行海十二十二史乘七日大師抵