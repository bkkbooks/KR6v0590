唯此仁智是圓覺因即大乘之習所成種姓亦即人道之乘也換言之人道之正乘即大乘之始階也大師回杭舟次九江函覆王弘願所詢唯識義書民國十年一九二一庚申辛酉大師三十三歲新春大師鑒於僧寺內外交困實為佛教復興之大礙大師乃唱僧自治說欲實行僧自治須擯絶撓亂之他力官府之摧殘地方痞劣之欺壓尤應去除本身腐敗之點力自整頓而振興之一般學佛者之行不由中尤為新興佛教前途之危機特提行為主義之佛乘以資警策從來為佛教徒者大多只知以享受福樂或靜定理性為果無論重理解或重證悟到如何圓妙都只空理不成事實至近乃更厲行一般知識階級中或認佛法為達到本體的哲學或則但認一句禪謎或則但守一句佛名或則但以佛的經書形像數珠木魚蒲團等項為佛事而不悟盈人間世無一非佛法無一非佛事吾確見現時學佛的人漸多大都迷背佛乘不修習佛之因行不知一切有益人群之行為皆佛之因行反厭惡怠惰其流弊將不可勝言故大聲疾呼敢為之告曰吾人學佛須從吾人能實行之佛的因行上去普遍修習盡吾人的能力專從事利益人群便是修習佛的因行要之凡吾人群中一切正當之事皆佛之因行皆當勇猛精進去修去為廢棄不幹便是斷絶佛種大師言之若是其剴切沈痛而學佛者則終於念佛念咒了生了死而已大師以為佛的因行以敬信三寶報酬四恩為本隨時代方國之不同而有種種差別在自由的共産主義下則以從事農礦勞工醫藥教化藝術為成佛之因行在和平的全民主義下則加為警察律師官吏議員商賈等三月二十三日二月大師任西湖淨慈寺住持大師久欲憑藉禪林以實施理想之改建為佛教樹新模適以淨慈虧缺甚巨無法維持乃由華山徒屬之因原如惺介紹接已故之雪舟和尚法而進院自傳十四略史杭州測量局員王行方徐柳仙陸慧生等發起講經會請大師於幽冀會館講唯識三十論如如記録成唯識三十論講録大師開講於二十四日二月十五適為進淨慈寺之次日自傳十四海二四大事記海三辛酉年鑑唯識三十論講録贅言大師著手於淨慈寺之興革取締鴉片酒肉修濟公殿嚴飾佛像陳列佛學書報以供衆閲改禪堂為角虎堂以繼永明禪淨雙修之風且籌辦永明學舍以作育弘法僧才設佛教慈兒院以教育小沙彌次第推行百廢俱興自傳十四略史永明精舍大綱五月朱謙之來兜率寺擬從大師出家朱氏以將所有佛書批評一過從新整理建設起為目的大師告以不必出家為介紹往從歐陽竟無遊自傳八大師提倡佛學而實不以一般治學方法為是於此可見時大師有佛法大系之作本體為真如的唯性論現行為意識的唯心論究極為妙覺的唯智論以之統論大乘諸宗為大師大乘三宗論之初型二十日修正管理寺廟條例二十四條公布此出程德全面請徐總統乃得撤銷前之卅一條修正公布尚能消極維持自傳八三十年來之中國佛教大師嫌其未善擬修改管理寺廟條例意見書三十九條其特點一析別寺廟之性質為宗教寺廟奉神寺廟公益寺廟俾純正之佛寺得與耶回教堂同為財團法人第一條二寺廟之管理人權義既視一般僧道為重大賢否尤關寺廟之隆替故特定專章以明其責任第九至十四條三確定寺廟財産之所有權屬於寺廟自身第十五條寺廟無犯罪之日但可責諸管理者寺産不得沒收或提充罰款第二十條對於教徒之繼承私産收受未成年人為徒以不正當行為而誘人捐款或入教確定為應加禁止第二十六條而豫以處罰第三十一條此雖猶未盡大師之本意而實寓整頓維持之意七月五日六月初一大師於淨慈寺啓講華嚴經之淨行品自傳十四海二五言說林講經不數日杭州白衣寺慧安等諸山住持托拾浮詞誣控大師於官署事緣大師疏忽初未循例回拜慧安因致嫌隙退居鴻定以煙癮未除為大師拒其回寺乃訴惑溫州同鄉潘國綱同善社首領張載陽因有慧安等出面呈控時縣長王藹南吉檀杭紳汪曼鋒等支持大師而上海新聞界康寄遙等亦為有力之呼援其案乃擱置於省署自傳十四八月九日蕭耀南任湖北督軍蕭與李隱塵有同鄉之誼故是後大師武漢弘化頗得其助自傳十五二十三日七月二十大師應北京辛酉講經會請離杭北上過滬偕史一如同行自傳十四海二七獅子林後九月六日八月五日大師開講法華經於北京弘慈廣濟寺十一月七日十月初八日圓滿大師依窺基法華經玄贊為講義周少如秉清録其口說成法華講演録逐日載諸亞東新聞參與法會者釋遠參莊思緘夏仲膺蔣維喬胡瑞霖馬冀平林宰平龔緝熙後出家名能海朱芾煌王虛亭等大勇自五臺來李隱塵陳元白從武漢來法會極一時之盛講畢為平政院長夏壽康等數百人授皈依自傳十四法華講演録辨言海三辛酉年鑑海二十評論壇末法會期中十月初一起大師於南池子夏宅別為蔣維喬等講因明論為大勇王虛亭等講金剛經大勇記之為金剛義脈為遠參講梵網經為元白領導之女衆講大阿彌陀經講說不倦間有日講七八小時者自傳十四海三辛酉年鑑時北五省旱災甚劇馬冀平等乘講經會發起金卍字會以大師領銜通電馬冀平及道老等辦理數年教養災童至三四千人自傳十四人物志憶十三十月二十七日九月二十三日大師以善因有病力求回湘集京中緇素議決海潮音自十一期起遷北京由史一如編輯自傳十四南北東西的海潮音海二十啓事是年潮音得唐大圓張化聲張希聲投稿倍有生氣自傳十四日僧覺隨堅邀大師去日本以傳學唐代東流之密宗大師無去意大勇發心隨行自傳十四菩提道次第略論序十一月九日十月初十大師離京返杭徐大總統頒贈南屏正覺匾額講經會公推倪譜香陪送自傳十四人物志憶六論梁漱溟東西文化及其哲學大師適與張仲仁同車張以梁漱溟新著東西文化及其哲學供閲大師作論梁漱溟東西文化及其哲學以為評正自傳十四文梁君比年已回佛入儒雖猶稱許佛法為最究竟而目下不贊同提倡佛法欲以孔家文化救中國大師評論之要如說梁君視佛法但為三乘的共法前遺五乘的共法後遺大乘的不共法故劃然以為佛法猶未能適用於今世且慮反以延長人世之禍亂乃決意排斥之其理由蓋謂東方人民猶未能戰勝天行當用西洋化以排除物質之障礙西洋人猶未能得嘗人生之真味當用中華化以融洽自然之樂趣待物質之障礙盡而人生之樂味深乃能覺悟到與生活俱有的無常之苦以求根本的解脫生活於是代表印度化的佛法始為人生唯一之需要若現時則僅為少數處特殊地位者之所能非一般人之所能也余則視今世為最宜宣揚佛法的時代一則菩提所緣緣苦衆生今正五濁惡世之焦點故二則全地球人類皆已被西洋化同化外馳之極反之以究其內情下者可漸之以五乘的佛法除惡行善以增進人世之福樂中者可漸之以三乘的共佛法斷妄證真以解脫人生之苦惱上者可頓之以大乘的不共法即人而佛以圓滿人性之妙覺故而對於中國排斥混沌為本的孔老化受用西洋的科學同時即施行完全的佛法以混沌之本拔則鬼神之迷信破故若對西洋則直順時機以施行完全的佛法可也余所謂完全的佛法亦未嘗不以三乘的共佛法為中堅但前不遺五乘的共法後不遺大乘的不共佛法耳明正因果以破迷事無明之異熟愚則中華宗極混沌樂為自然之惑袪而西洋逐物追求欲得滿足之迷亦除於是先獲世人之安樂漸進了生脫死之域以蘄達乎究竟圓滿之地梁君拘於三乘共法前遺五乘共之人天法後遺大乘不共之菩薩法回佛入儒正由其所見佛法之淺狹然其眇目曲見之唾餘每為時人所托拾障礙佛法不淺大師回淨慈寺倪譜香康南海等以總統匾額送入反對者亦無如之何自傳十四人物志憶六其先大師離杭浙江省長沈金鑑以潘國綱張載陽關係撤銷大師淨慈寺住持大師在京聞之上訴平政院事後擱置自傳十四關於淨慈寺糾紛腐僧土劣惡吏相勾結現存大師當時所擬答辨可以概見一二一道委指根源為允中法徒為事實上之錯誤蓋根源實於允中退住持之後接已故之雪舟法為住持者道委殆因其人已死無對證故為混矇二根源鴻定皆於雪舟故後繼其法派為淨慈寺住持太虛何為不可而淨慈既為傳法寺院但不紊法派並出原住持志願便為正當傳繼況復經依例呈縣署注冊及紳衆僧衆送賀表示贊成更何有習慣不合手續缺完之處三寺院産業每有由人施入者然一經施入即屬寺産此為常例前年因合併彌勒院大佛寺復兜率寺之古稱遂將縣公署判屬於彌勒院之宣姓房地認為宣金彌所施以彌勒院登記書上本載明為宣金彌戶而又屬彌勒院者與彌勒院大佛寺戶者俱合為兜率寺戶以便管業而已其實此房地屬彌勒院係太虛聞之僧衆紳衆據情呈報倒謂太虛矇蔽官紳實屬違背若官斷為宣姓太虛無爭也四在鎮江為創辦佛教協進會此係團體行為波及者且事在十年前在寧波係由鄞縣某鄉自治委員准縣諭推舉住持歸源庵因前住持及債戶與鄉人等有糾葛控訴鄞縣知事於會稽道即今錢塘道尹張鼎銘自退另換無論其事與住持淨慈無干也即其事亦何犯教規五選賢不符淨慈習慣已各方公認應但言傳法彼不明承接已故之老和尚法派以繼住持乃中國各地叢林常有之例不獨淨慈前住持鴻定前前住持根源然也至既有根源鴻定如此在前則太虛更為有根據耳道委乃云強名接法何所見之不廣也若言太虛何不接鴻定之法則此亦須出雙方願意若鴻定必欲太虛接其法方傳交淨慈住持則太虛若不願接其法時在太虛可以不為淨慈住持卻之在鴻定亦可以不交淨慈拒之而此寺乃由願傳交住持之鴻定邀寺衆及諸山靈隱寺等請太虛接雪舟法以為住持實出雙方願意豈容有旁人不甘六謂鴻定紊亂法派道尹殆不知法派二字作何解也雪舟既屬淨慈寺法派鴻定繼雪舟法何謂紊亂法派若繼非淨慈寺所流傳法派而為淨慈住持始為紊亂法派若今諭委肇庵是七據道尹所言則鴻定已不合淨寺習慣太虛尤不合淨寺習慣故皆不合為住持此若不合當更無能合之法然則試問道尹將如何産出淨慈寺合習慣之住持若更無法産出豈淨慈寺將永無住持乎八龔少軒乃錢塘門外一流氓杭州人多知之不過有人買使作無聊言耳試問彌勒院或宣姓或太虛皆與風馬牛不相及何得無端捏控乃道尹道委竟與一鼻孔出氣奇哉倪譜香等發起請大師於西湖省教育會講心經有倪譜香德薰之講録行世自傳十四武漢信衆推陳性白來杭迎大師去武漢講經大師偕性白西上十二月二日十一月四日抵漢口自傳十四海二十二大事記按自傳十四謂與陳性白在輪船上過了年正月初一日泊漢皋十五謂辛酉年底我由杭至鄂然此出大師誤憶是冬仁王法會自傳竟亦忘之元旦抵漢實為十四年事十二月六日十一月八日大師於漢口佛教會時佛教會所前棟已完成開講仁王護國般若經蕭耀南劉承恩如期蒞會聽受禮拜二十六日二十八日圓滿海二十二大事記海三武漢佛教辛酉年鑑十一日十三日兼為女衆開講佛說阿彌陀經於彌陀誕傳授三皈五戒臘八又傳一次海二十二大事記是年持松密林赴日學密密林常惺法師傳民國十一年一九二二辛酉壬戌大師三十四歲一月辛酉十二月十六十七兩日李隱塵陳元白等鑒于大師住持淨慈之疊生故障主純憑理想新創養成佛教人才之學校大師乃提出佛學院計劃柬邀武漢政商各界集議其事決進行籌備自傳十五佛學院置院舍記漢口佛教會辛酉年鑑二月十七日二月初一大師應漢陽歸元寺請啓講圓覺經湘鄂贛省僧衆來會者親對音儀乃漸釋昔來之隔膜自傳十五海四壬戌佛教年鑑三月十三日二月十五日開佛學院籌備會於歸元寺得李隱塵王森甫胡子笏湯鑄新皮劍農陳元白蕭止因熊雲程蕭覺天趙子中孫自平王韻香及長沙佛教正信會周可均等卅餘人自認為創辦人佛學院院董會略史海四壬戌佛教年鑑十七日十九日起每晚為四衆開示唯識觀法海四壬戌佛教年鑑武昌佛乘修學會熊世玉阮育嵩饒鳳璜等函懇草示大意佛乘修學會致太虛法師書乃以孫紹基趙曾儔壽人合記之唯識觀大綱應之其中圓滿一心之唯識觀最足見和會起信與唯識之理大師所談唯識與專宗唯識者蓋有所異四月一日三月初五圓覺法會圓滿海四壬戌佛教年鑑法會期間大師出圓覺經隨順釋科目春又作對辨大乘一乘對辨唯識圓覺宗三重法界觀自傳十五大師倡導大乘平等而宗本在臺禪得學要於楞嚴起信比年唯識大盛大師特於唯識深研頗有於平等中對大乘空宗統唯識於圓覺而立不空宗之意故於賢首家貶抑唯識處如判唯識為法相為大乘而自居於一乘法性起而為之抉擇貫通對辨唯識圓覺宗有曰三論顯性側重體性之性唯以遮詮空一切法殆同有主無賓劣者未能入於具顯相用之不空性然固當名之為法性宗也唯識彰相深探體相之相雖以表詮立一切法未嘗取貌遺神悟者皆能證於全彰體用之如幻相固可名之為法相宗尤當與即相之性法華等即性之相華嚴等同名為中實宗也般若宗以遠離蕩除一切法相皆畢竟空而顯性真瑜伽宗先分別離析一切法相皆唯識變而顯性真天臺宗法華等經宏融相同性之教賢首宗華嚴等經宏即性起相之教由此四門同入密嚴但以無生法性乃根本智境是大涅槃果唯識圓覺乃後得智境是大菩提果一可攝小一獨在大故復分二宗三重法界觀立物我法界心緣法界性如法界三重法界之立影略三性而來本於臺禪之融貫以論三性猶是高舉唯識使與臺賢圓覺教義相齊是三文悉此春出足以見大師當時之意趣八日清明後三日大師應黃陂縣知事謝鑄陳健邑紳趙南山陳叔澄柳質皆等邀請偕了塵陳元白李時諳陳仲皆等赴黃陂民衆空巷來觀大師寓前川中學於前川中學木蘭女校自新堂講佛法三日王淨元記之為前川聽法紀聞自傳十六王淨元前川聽法紀聞詩存大師次陳叔澄詩以為紀念未可栖栖笑仲尼頻年我亦慣驅馳春深大野來今雨學講前川憶古師佛海潮聲傳隱約人天夢影正離奇法身流轉愴無極應有維摩病大悲按自傳以此為十二年春事誤十四日三月十八日大師應武昌中華大學請開始授印度哲學及新的唯識論海四壬戌佛教年鑑大師辭陝西佛教會康寄遙等之迎請轉為商得漢口華嚴大學講師妙闊同意赴秦講學自傳十六覆陝西佛教會延請法師函按自傳誤以此為十二年事五月四月初讓得武昌黎邵平少屏宅為院舍四日佛誕大師於漢口佛教會受院董會隆重之禮聘為院長禮請疏出黃季剛手大師乃進行招生事宜章程由創辦人呈湖北軍民長官及內教兩部備案自傳十五佛學院置院舍記佛學院院董會略史其時大師辭去淨慈寺住持交卸兜率寺以外得陳性白倪譜香內得奘老玉皇等助得以和平交卸了事大師並約大覺玉皇智信來武院助理事務自傳十四十五二十一日四月二十五日大師覆李琯卿書為論佛法唯識與哲學之異冶性空唯識於一爐西洋底哲學都是先認定現前底人世是實有底東西乃從而推究此現前實有底人世在未有以前原本是一件什麼東西於是或說元唯是心或說元唯是物或說元唯是心物並行乃再從而說明原本雖然是一件什麼東西向後由如何若何乃變成現前的人世此在發足點先迷了錯了故無論如何橫推豎究終無一是佛說全不如此因為現前的人世現前是空的就是沒有的現前的人世既都沒有又何論現前的人世以前原本是什麼呢必先於此有些體會於佛法方能領解迷著了夢事為實有便宛然實有這便是三界唯心萬法唯識的注解了心識者何曰迷夢是三界萬法者何曰夢事是迷夢夢事皆畢竟無實故三界唯心萬法唯識亦畢竟無實必先悟實無心識可唯乃可談三界唯心萬法唯識竟無居士學說質疑約此時作歐陽主法相唯識分宗大師主法相必宗唯識大師始依傍法苑義林章以論三宗三十日五月四日挪威大學哲學教授希爾達聞大師名德特自北京來漢口請晤大師為論佛法林震東陳維東譯語海四壬戌佛教年鑑與挪威哲學博士希爾達論哲學六月大師回甬謁奘老訪故友陳屺懷金夢麟等自傳十五大師還滬於古靈山小住值大勇將再東渡學密聞志圓談及時人或以諦老印老及大師為中國佛教三大派或以諦老為舊派而大師為新派者雖大師未嘗有意乎新舊之分自傳十五而事實固已形成新舊之勢七月抵南京訪毗盧寺觀同滌暑湯泉暢遊燕子磯十二洞之勝時曼殊揭諦寓毗盧寺從聞歐陽竟無師資有反對起信論之說自傳十五八月大師沿江西上至安慶迎江寺時馬冀平長安徽財廳與迎江寺竺庵發起安徽僧學校禮聘常惺任其事常惺就大師咨商學課契仰倍深自傳十五常惺法師塔銘并序大師於佛教會講佛法為人生之必要廬山學遊觀三日有大士閣月夜等詩詩存十一日觀音誕竺庵陪大師遊廬山寓大觀樓漫遊名勝訪德安於白塔寺禮遠公塔於東林自傳十五詩存天池寺僧坦山來訪歎息匡廬佛地乃今盛傳耶教不聞三寶之音大師詢知古大林寺遺址近在不遠因相偕策杖尋訪捫石讀碑知在劃界橋北茅屋草坪錯落間相與歎息大師乃有就此修建講堂以備暑期弘化之意自傳十七牯嶺雜感即此時作雲頂一峰曇詵跡大林三寺白香詩夕陽何處遺蹤覓煙緑塵紅總可悲大師回武昌適中華大學舉辦暑期講習會應陳叔澄校長約於二十日六月二十八開講因明入正理論手編講義名因明大綱參與講學會者有梁啓超高一涵傅銅佩青等大師始與梁啓超晤交自傳十五人物志憶六海四壬戌佛教年鑑武漢佛教會假中華大學禮堂請大師梁啓超傅佩青作佛學講演集聽者千人以上自傳十五人物志憶六二十六日七月十三日佛學院開董事會成立會舉梁啓超為院董長陳元白代李隱塵為院護大師乘機建議於廬山大林寺遺址修建講堂以供暑期講學得梁李等贊同力任籌劃進行自傳十五十七人物志憶六佛學院院董會略史海四壬戌佛教年鑑大師偕梁啓超李隱塵等遊黃岡之赤壁謁湯化龍墓盤桓數日樂談佛學無倦人物志憶六自傳十五九月一日七月十九佛學院舉行開學禮蕭督亦蒞院致詞佛學院僧俗兼收目的在造就師範人才出家者實行整理僧制工作在家者組織正信會推動佛教於廣大人間是期所聘教師有空也史一如潮音已於夏季移武昌編輯陳濟博等學生六七十名僧衆有漱芳能守默庵會覺觀空嚴定法尊法芳舫量源等居士有程聖功陳善勝其後出家名淨嚴張宗載寧達蘊亦自北京平民大學來從學課程參取日本佛教大學管理參取禪林規制早晚禪誦唯稱念彌勒回向兜率為異自傳十五略史海四壬戌佛教年鑑大師之建僧運動發軔於此中國佛教界始有佛學院之名是學期大師講佛教各宗派源流手編講義時武昌已成立正信印書館講瑜伽論真實義品默庵記而未全成真實義品親聞記又講八囀聲及六離合釋等循循善誘精神殊佳自傳十六按自傳謂我講世親發菩提心論據壬戌佛教年鑑乃空也講大師講此論則為十三年秋大師於中華大學講印度哲學每周一時自傳十六時大師讀梁啓超歷史研究法特致書與論佛曆時猶以佛滅周穆王五十二年說為可信書是秋王虛亭自北京來武昌從大師出家字以大嚴受戒寶華山即住山未返自傳十一十月十六日八月二十六日大慈以疾卒於杭冬初九月下旬從大師多年而維持淨慈甚力之智信又卒於佛學院大師並悼之以詩自傳十五王淨圓致大覺法師書玉皇念佛送智信上人西歸詩按自傳以大慈卒於冬初誤十一月六日九月十八漢口十方女衆叢林成立請大師講阿彌陀經海四壬戌佛教年鑑十二月五日十月十七大師應湖南緇素請去長沙緣寧鄉大溈山民國七年毀於匪千年法庭淪為墟莽省教育會復覬覦寺産大師老友惠敏開悟居間勸請大師乃商定恢復溈仰祖庭量入為出等條件允任溈山住持至是偕劉東青同行嚴定為侍者抵長沙即與趙炎午仇亦山等商定恢復溈仰宗及溈山産業維護整理計劃海三十二赴溈山詳記嚴定侍院長大師住持湘省大溈山密印寺記七日十九日開悟曉觀等陪送大師去溈山經桃華洞靈雲寺至寧鄉便道訪惠敏罘月於回龍山十一日進院以性修為監院海三十二赴溈山詳記嚴定侍院長大師住持大溈山密印寺記按大師負名義十五年二十六年始由寶生繼任住持大師在山禮靈祐禪師塔說偈並作讀八指頭陀住持溈山詩感和四首湘中緇素惠敏廖名縉等和者甚衆詩存遺十六日二十八日大師返長沙趙炎午吳景鴻等發起假六星橋湘西公會請大師講學大師凡講三日題為對於批評佛法者的批評佛法與宗教及科學佛法為圓滿之哲學海三十二赴溈山詳記嚴定侍院長大師住持大溈山密印寺記按自傳以長沙講學為先於溈山進院誤大師在長沙與曉觀等發起創辦孤兒院二十一日十一月四日返武昌自傳十六嚴定侍院長大師住持大溈山密印寺記是冬玉皇近十年來時為大師服務辭職還杭住靈隱寺自傳十六是年歐陽竟無講成唯識論於內學院論前先講唯識抉擇談海三十記事海四壬戌佛教年鑑於起信論有所非毀大師因之作佛法總抉擇談先依唯識三性以通論大乘曰依此三性以抉擇佛法藏不共之大乘佛法則皆圓說三性而無不周盡者也但其施設言教所依託所宗尚之點則不無偏勝於三性之一者析之即成三類一者偏依託遍計執自性而施設言教者唯破無立以遣蕩一切遍計執盡即得證圓成實而了依他起故此以十二門中百論為其代表所宗尚則在一切法智都無所得即此宗所云無得正觀亦即摩訶般若而其教以能起行趣證為最勝用二者偏依託依他起自性而施設言教者有破有立以若能將一切依他起法如實明了者則遍計執自遣而圓成實自證故此以成唯識論等為其代表所宗尚則在一切法皆唯識變而其教以能建理發行為最勝用三者偏依託圓成實自性而施設言教者唯立無破以開示果地證得之圓成實令起信策發因地信及之圓成實使求證則遍計執自然遠離而依他起自然了達故此以華嚴法華等經起信寶性等論為其代表所宗尚則在一切法皆真如而其教以能起信求證為最勝用此大乘三宗之宗主基師嘗略現其說於唯識章曰攝法歸無為之主故言一切法皆如也攝法歸有為之主故言諸法皆唯識攝法歸簡擇之主故言一切皆般若攝法謂統攝法界一切法罄無不盡也其所宗主之點雖或在如或在唯識或在般若而由彼宗主所統攝之一切法則罄無不同故三宗攝法莫不周盡然此三宗雖皆統一切法無遺其以方便施設言教則於所託三性各有擴大縮小之異般若宗最擴大遍計執性而縮小餘二性凡名想之所及皆攝入遍計執唯以絶言無得為依他起圓成實故故此宗說三性遍計固遍計依他圓成亦屬在遍計也唯識宗最擴大依他起性而縮小餘二性以佛果有為無漏及遍計執之所遍計者皆攝入依他起唯以由能遍計而起之能執所執為遍計性及唯以無為體為真如故故此宗說三性依他固依他遍計圓成亦屬在依他也真如宗最擴大圓成實性而縮小餘二性以有為無漏及離執遍計皆攝入圓成實復從而攝歸於真如無為之主唯以無明雜染為依他遍計故故此宗說三性圓成固圓成遍計依他亦屬在圓成也其次本此自義以彈歐陽氏之說起信論以世出世間一切法皆不離心故就心建言實無異就一切法建言也一切法共通之本體則真如也即所謂大乘體真如體上之不可離不可滅相真如自體相如來藏也換言之即無漏種子即本覺亦即大乘相大所起現行即真如用即能生世出世間善因果之大乘用其可離可斷相則無明也一切染法皆不覺相換言之即有漏種子即違大乘體之逆相所起現行則三細六粗等是也無始攝有順真如體不可離不可滅之本覺無漏種未起現行亦攝有違真如體可離可滅之無明有漏種恆起現行故名阿黎耶識譯者譯為生滅不生滅和合爾言依如來藏者以如來藏是順真如體不可離滅之主而無明是違真如體可離滅之客故言依也真如宗以最擴大圓成實故攝諸法歸如故在生滅門中亦兼說於真如體不離不滅之淨相用名為真如以諸淨法佛法統名真如而唯以諸雜染異生法法為遍計依他統名無明或統名念此起信論所以有無明熏真如真如熏無明之說也唯識宗以擴大依他起故祇以諸法之全體名真如而真如宗時兼淨相淨用統名真如此於真如一名所詮義有寬狹一也唯識宗於熏習專以言因緣真如宗於熏習亦兼所緣等無間增上之三緣以言二也明此二者各宗一義而說不相為例故不相妨唯識宗乃依用而顯體故唯許心之本淨性是空理所顯真如或心之自證體非煩惱名本淨若真如宗則依體而彰用故言以有真如法故有於無明是心從本以來自性清淨而有無明應如此斷句不應於自性清淨句下斷句其所言之自性清淨固指即心之真如體而亦兼指真如體不可離斷之淨相用也此淨相用從來未起現行故僅為無始法爾所具之無漏種子所言從本以來自性清淨不但言真如而亦兼言本具無漏智種於其內然此心不但從本以來自性清淨亦從本以來而有無明為無明染而有染心則無始有漏種子恆起現行而成諸雜染法也雖有染心而常恆不變則雖有漏現行而真如體及無始無漏種不以之變失也此在真如宗之聖教無不如是說者此諸聖教可誹撥者則攝一切法歸無為主之真如宗經論應皆可誹撥之故今於此不得不力辨其非也按自傳以此為十二年作誤是年杭州宗淨土之馬一浮宗禪之劉大心相諍甚烈覆王弘願居士書五圓映遊化新加坡與檳榔嶼葉性禮圓映法師事略民國十二年一九二三壬戌癸亥大師三十五歲一月十四日二十八院外研究部成立大師為講教觀綱宗海四壬戌佛教年鑑二十二日臘月六日大師作評梁啓超大乘起信論考證反對以西洋進化論觀念治佛學略謂西洋人之學術由向外境測驗得來不然者則向學說上推論得來故有發達進化之程序可推測而東洋人之道術則皆從內心熏修印證得來又不然者則從遺言索隱闡幽得來故與西洋人學術進化之歷程適相反對而佛學尤甚焉用西洋學術進化論以律東洋其餘之道術已方枘圓鑿格格不入況可以之治佛學乎吾以之哀日本人西洋人治佛學者喪本逐末背內合外愈趨愈遠愈說愈枝愈走愈歧愈鑽愈晦不圖吾國人乃亦競投入此迷網耶要之以佛學言得十百人能從遺言索隱闡幽不如有一人向內心熏修印證一朝證徹心源則剖一微塵出大千經卷一切佛法皆湛心海應機施教流衍無盡一切名句文皆飛空絶跡猶神龍之變化無方否則祇竄繞於一切世間從其本際展轉傳來想自分別共所成立之名相中而已嗚呼東西洋之科學哲學文學史者而日本於今日所以真正佛學者無一人也二十六日孫中山與越飛發表共同聲明為國共合作先聲二月大師於寒假期中偕陳元白等遊宜昌度舊曆元旦於沙市舟次赴宜昌雜詩小別漢皋逢歲底乍經沙市恰年頭二十日初五抵宜昌說法於普濟寺及商會王容子等及王吟香全家受皈依自傳十六定慈太虛法師西行遊化記按自傳謂正月初一抵宜昌誤大師於宜昌舟次閲唐煥章之陳獨秀人生真義之駁正等乃作略評外道唐煥章文二十二日七日江口皮劍農沙市陳妄清等來迎因相偕訪全敬存於那惹坪之維摩精舍自傳十六詩存定慈太虛法師西行遊化記三月二日正月十五大師偕陳皮全等至枝江江口晤本一於東山寺說法兼為陸軍某連全連官兵授皈依自傳十六定慈太虛法師西行遊化記五日十八日以沙市水警局長徐國瑞專輪來迎因偕抵沙市訪章華寺淨月皈依者有徐國瑞陳妄清等自傳十六定慈太虛法師西行遊化記十日二十三日渡江遊荊州於承天寺之瓦礫一堆頗多感慨自傳十六定慈太虛法師西行遊化記十二日二十五日大師離沙市回武院小病自傳十六舊曆新年佛化新青年刊出版寧達蘊張宗載先曾發起新佛教青年會編行新佛化旬刊於北京及來學武院又得悲觀陳維東周浩雲等同志大師乃為改稱佛化新青年會令寧張推行佛化青年運動編佛化新青年自傳十六海三八海三十三寧張等奉大師為導師以農禪工禪服務社會自食其力和尚下山等為號召本大師人工與佛學之新僧化而推行之為大師佛教運動中之左派大師鑒於佛教界之囿於小乘離欲為佛法弘通之障乃因王實之說為在家學佛說法論佛法普及當設平易近人情之方便略云士夫心知佛法之正故生違異如李政綱梁漱溟或乍入而旋出與僧中多犯戒行者何莫非不善處置有關生理情欲之煩惱障而時時生反應之表徵哉故處今日而欲圖佛法之普及則王君所主張兼足正當愛情正當生活之方便殊有不可不採行之勢也然此亦不須於佛法別求方便者其屬於在家士夫者但當於佛法先求信解而勿慕行證昔晚清楊仁山居士飲食婚宦悉同常俗此則人人可行者而其信解於佛法者固堅卓不可搖奪矣進此則為三皈優蒲再進此則為一戒二戒三戒四戒乃至五戒優蒲此當精熟於優婆戒經之開遮持犯固仍以平易近人為準再進之則當以菩薩戒本為登峰造極其屬在家菩薩則正當愛情正當生活猶不在遮禁而廢事逃禪悖倫苟安乃適為有犯於戒故在家士夫當深識此其未能入佛法者勿因恐奪其情欲裹足不前或故生反對其已入門者亦勿須摹仿僧事唯以敲打磬宣佛誦經廢家棄業離群逃禪為學佛但由信而漸求其解由解而愈堅其信信隆而三皈而五戒而不離常俗婚娶仕宦農商工作之事業以行布施愛語利行同事等菩薩行可耳但官為好官農為好農商為好商工為好工便是行菩薩道當時在家衆之學佛百弊叢生不止惡不行善或從不修學肆行輕毀或初則外抗俗流內糾教徒再則出而奴此別主異說李政綱之流或妄稱先進除所奉二三外輕斥一切老居士或執此宗而力排他宗內院之流或藉名護法貪欲為行魚肉僧衆之佛棍大師作論學佛者須止惡行善大聲疾呼佛法佛法多少人假汝之名行其罪惡汝其奈之何上來二文一示正道一遮邪徑使在家學佛者誠能依此為準繩中國佛教庶乎有興復之望武院春季開學添聘張化聲為教授學科以三論為中心大師講三論玄要十二門論陳維東善馨筆記成十二門論講録三論般若講要亦程聖功於此時記自傳十六按自傳謂此年講百論有陳維東筆記為十二門論之誤四月四日二月十九日漢口佛教會成立宣教講習所大師為所長聘新自溫州弘法歸來唐大圓為教務主任學生僧俗兼半象賢芝峰預焉畢業後轉入武院海四七事紀海五武漢癸亥年鑑按自傳以為唐大圓夏間來誤十六日三月一日蕭督軍來院參觀海四四紀事時湘省教育界有提用教産之議大師致書廖笏堂請聯絡在京佛徒共為制止書五月二十三日佛誕傳為佛元二千九百五十年武漢佛教徒假中華大學舉行盛況空前之紀念大會蕭耀南黃季剛李隱塵張化聲等均有演說大師講紀念佛誕的意義是日傳授三皈數達千人自傳十六海四五海潮音社先有對於今年佛誕紀念會之宣言主張各地召開教務會議北京舉行全國教務會議以佛教之統一為全國統一倡是夏大師撰有關教育之論文託中華大學校長陳時叔澄提出於舊金山第一次世界教育會議以大同的道德教育造成和平世界陳時致太虛法師書年來以歐陽竟無唯識抉擇談之議及起信論王恩洋作大乘起信料簡以助之而梁啓超又作大乘起信論考證起信論非馬鳴作非真諦譯殆成學界定論梁氏本學術進化眼光以論起信斷為國人所作引為民族文化之光榮內院師資本法相唯識以衡起信斷為梁陳小兒所作評為剗盡慧命雖立論不同抑揚全異而在以起信論為中國佛學準量者實感有根本動搖之威脅大師領導之武漢佛教同人乃為集大乘起信論研究刻隋慧遠起信論疏明起信為古今共信維護起信論之教權用力可謂勤矣大師為起信論研究作序衡以純正之論辨不無故意曲解敵論之嫌然方便臻乎上乘特録之以見其善巧世之嘖有煩言于歐陽梁王三君者其未知三君權巧之意者乎夫梁君特以比來昌言學佛漸流為時髦之風尚而實則於先覺遺留之三藏至教鮮有曾用精審博考之研究由砉然懸解佛法諦理然後信受奉行者大都人云亦云就流通之一二經論約略涉覽輒糢糊影響以談修證夫於教理既未有深造自詣之信解遂遽事行果而欲求其無所迷謬其何可得乎此梁君所以擷録日人疑辨之餘緒取今時學佛者所通依之起信論以深錐而痛札之縱筆所至且牽及一切大小乘三藏使囫圇吞棗之學佛者流從無疑以生疑因疑深究庶幾高閣之寶藏至教皆浸入學佛之心海乃能確解而堅信耳至於歐陽君王君其意亦同加以古德據起信而將唯識判為大乘權教遂致千年來之學佛者對于唯識無造極之研究今欲導之一志專究須先將蔽在人人目前之起信闢除亦勢之必然者也謂豫不信請觀歐陽居士復唐大圓之書云今時之最可憐者無知之佛教徒好奇之哲學徒名雖好聽實則沈淪不得已而抑起信或於二者有稍益歟起信是由小入大過渡之作有攝大乘論讀不必讀之可也又請觀王君之料簡云夫斯論之作固出於梁陳小兒無知遍計亦何深罪特當有唐之世大法盛行唯識法相因明之理廣博精嚴甚深抉擇而此論乃無人料簡靈泰智周之徒雖略斥責而不深討貽諸後世習尚風行遂致膚淺模稜剗盡慧命似教既興正法以墜而法相唯識千餘年來遂鮮人道及矣由此觀之則三君之說皆菩薩之方便蓋可知矣待他日開權之時節因緣一到在三君必自有顯實之談今何用遽興諍辨哉大乘宗地圖亦是夏創作為大師大乘八宗無不平等各有特勝最圓備之解說其秋作三唯論圖為唐大圓略釋一唯識論二唯境論依奘基所傳說實非空宗學者所許三唯根論依楞嚴經而創立蓋亦就唯識學者之少分認可為楞嚴非僞著想七月十日五月二十八日大師偕王森甫史一如等去廬山主持暑期講習會去秋嚴少孚去山以恢復大林寺名勝為由領地修建講堂規模粗具自傳十七海四六通訊與記事二十三日六月初十暑期講習會開講八月十一日草九日圓滿大師凡講四次佛法略釋佛法與科學佛法與哲學佛法悟入漸次陳維東與程聖功筆記大師而外黃季剛湯用彤張純一仲如並有演講令華洋神教徒為之驚異廬山暑期佛化似此於荊棘蒿萊中開建自傳十七海四六記事海四七記事大師開講日入晚風雷大作李隱塵詩以紀慶詩存外集大林峰畔講經臺千載松陰冷碧苔祇樹孤園原未散蓮華廬社此重開曼陀天雨紛潏采般若靈源助辨才十萬魔宮齊震動夜深岩壑吼風雷大師於大林寺發起世界佛教聯合會初以嚴少孚豎一世界佛教聯合會牌於講堂前自傳十七次有日本大谷大學教授稻田圓成訪大師於武漢不遇特轉道來廬山因談及世界佛教聯合會事時猶在演講會前自傳十七海四六其談話云師先生至中國遊歷甚久對於中日佛教有何聯合進行之計劃乎稻中日佛教之聯合以兩國佛教之情形互相開曉為先兩國佛教徒共謀意思疏通推廣佛化今遂有世界佛教聯合之動機我國佛教徒已有貴國佛教巡歷之計劃和觀光大概今秋三十餘名一團可來華次留學生交換亦為一法豫回國後勸說朋友選二三學生擬使留學佛學院以得如貴校之高野山留學生為幸師本會之設有聯合中日佛教徒以聯合進行傳布佛教於歐美之意思中日國民近來隔礙殊甚唯佛教原無國界且中日兩國素為佛教盛行之地中日之佛教徒當如何設法以融化兩國國民間之隔礙以發展東亞之文明而得與歐美人並雄於世界乎稻貴說同感切希中日佛教徒親和疏通為兩國親善之先驅布教世界人類俾佛日增輝法源常流一洗西人神我的物質的頭腦實世界全人類之幸福也迄大林寺法會開始大為旅廬日人屬目日本領事江戶以日本佛徒名義來參加並電日本約派代表明年來會大師乃著手於明年夏季召開第一次世界佛教聯合會之籌備由此地方轉呈中央備案自傳十七大師之世界佛教運動於是開始其間六月十六廬山復有世界佛化新青年會之組織未成立時先設漢口佛教會海四十宣言武漢之佛化新青年會則大師已先期五月草五日囑移於北京宣內象坊橋觀音寺海五武漢癸亥佛教年鑑主持者張宗載寧達蘊而外有道階覺先悲觀邵福宸楊蝶父等不久胡瑞霖等為之向各學校介紹有京津滬各大學從根本覺悟之青年學生多人本佛化之慈悲作真理之貢獻共成立佛化新青年會加入運動者達三千餘人此真青年學生之良藥新道德之標準也如此大好陽春尚恐有腳未至特此函達希同情共表代將此意遍布貴學生胡瑞霖梁啓超蔡元培章太炎黃炎培范源濂許丹張慰西江亢虎傅銅李佳白莊士敦同啓海四十通訊八月大師離廬山以湖北黃梅黃季蘅等邀請乃偕超一嚴少孚去黃梅十五日四日大師在黃梅講黃梅在佛教史上的地位等自傳十六海四八事紀所至悉紀以詩存老祖山黃梅吟等五首詩存大師回武昌二十三日七月十二日漢口佛教宣教講習所畢業大師致訓詞海四十二附録秋季開學大師講成唯識論解深密經兼授教觀綱宗與古潭空月唐大圓筆記成唯識論之懸論為唯識綱要解深密經則略敘綱要默庵記由唐大圓續講自傳十六大師時感禪林管訓難達預期思想而學生程度參差尤感教授不易乃決縮短學程三年為二年另定改善辦法自傳十六發表我新近理想中之佛學院完全組織主張維持本院研究部現狀而外先自小學部辦起自小學而中學而學戒而大學而研究之五級以二十四年學程養成行解相應之僧才整齊程度嚴格訓練實為針對佛學院缺點而提出者唯規模過於遠大事難卒行是秋大覺以病回川大覺苾芻塔銘並序九月一日七月二十一日日本大地震三十日大師會同武漢佛教徒發啓日災祈安會以表救災恤鄰之意是日到日本領事林久治郎等海四八紀事十月九月漢陽水警廳長何錫繁請大師蒞廳說法楊開甲孫自平唐大圓偕行海五武漢癸亥佛教年鑑史一如病海刊自九期起改由唐大圓編輯十五年來海潮音之總檢閲是年秋廣東孫科大賣佛教寺産十二月八日十一月七日佛學院國文教師唐畏三從大師出家字大敬去寶華山受戒自傳十一海五武漢癸亥佛教年鑑時李時諳已先期九月初八日祕密去寶華山受戒僞稱從大師出家自號大愚是年大愚與嚴少孚大智鄧天民大悲同皈依大師同受戒寶華與大敬合稱四大自傳十一大愚兩家夫婦同受具足戒紀略大愚致大師書按自傳十一忘大敬而以合大願為四大誤大悲依鎮江某師出家法名心普大智依漢口某師出家法名永空自傳亦謂二人另有剃度師大愚亦大師勉豫承認者大師自傳記此極亂以兩家夫婦同受具足戒紀略為正是冬穆藕初來訪咨詢佛法答穆藕初問論宋明儒學曹溪禪之新擊節應是時作大師析大程與小程理氣一理氣異二流以朱陸別承之於儒者之得於佛出於佛有所說明曹溪禪之新擊節乃約唯識義通之四教先亂般若五教尤亂瑜伽頗引起學者疑難是年大師之佛學院與歐陽竟無之內學院每為法義之諍初有史一如與聶耦庚關於因明作法之爭次有唐畏三慧綸與呂秋逸關於釋尊年代之辨後有大師與景昌極關於相分有無別種之諍大師與大圓一如維東等表現中國傳統佛學之風格大師告景昌極云君等乍遊佛法之門能執利器名相分別以防禦邪外固所樂聞若將深入堂奧則當捨干戈而從容趣入之未應持械以衝牆倒壁為事也否則增自之惑益人之迷兩害無利何取多言大師泛承舊傳諸宗內院特宗深密瑜伽一系在大師則闢起信非清辨類持械之衝牆倒壁在內院則視為顯正摧邪勢不得已彼此所說應互有是非其立場不同是非蓋亦難言問題在千百年來舊傳諸宗是否俱佛法之真是年商務印書館影印日本之續藏三十年來之中國佛教民國十三年一九二四癸亥甲子大師三十六歲一月二日十一月二十六日大師致書張純一對其年來佛化基督之倡導備致贊勉書十三日臘月初八日武昌正信會成立會長楊選丞禮請大師受菩薩戒海五一事紀二十日廣州國民黨第一次代表大會宣言聯俄容共二十二日十七日日本龍谷大學教授禿氏祐祥等來訪海五一事紀二十七日二十二日大勇開壇傳授密法十八道一尊法於武院二月二十七日正月二十三日圓滿大師基於八宗平等發展之信念以得見密宗之復興為志海刊一卷載有王弘願譯曼陀羅通釋三卷至五卷載有大日經住心品疏續弦祕曲比聞大勇歸國傳密於杭即以嚴切手書責以速來武漢乘寒假期中傳修密法是次就學者有李隱塵趙南山孫自平楊選丞杜漢三黃子理六人女衆三人選拔院內優秀生十八人共二十七人其餘傳一印一明至三月十七日二月十三日止入壇者共二百三十七人武漢密法忽焉而盛自傳十六海五一事紀海五三事紀按自傳所說日期人數均誤二月五日甲子元旦大師編慈宗三要大師特弘彌勒淨土至此乃確然有所樹立序曰遠稽乾竺仰慈氏之德風邇徵大唐續慈恩之芳焰歸宗有在故曰慈宗三要者謂瑜伽之真實義品及菩薩戒本與觀彌勒上生兜率經如次為慈恩境行果之三要也夫世親嘗集境行果三為三十頌回施有情護法諸師解之大義微言燦然矣是曰成唯識論第明境繁細難了而制行期果又非急切能致慧粗者畏焉或耽玩其名句味樂以忘疲不覺老至造修趨證者卒鮮今易以解此真實義持此菩薩戒祈此內院生既簡且要洵為人人之所易能然真實義詮境之要菩薩戒範行之要聞者殆無間然至觀上生為獲果之要必猶難首肯茲申論之十方諸佛剎雖有緣者皆得生而凡在蒙蔽罔知擇趨唯補處菩薩法爾須成熟當界有情故於釋尊遺教中曾持五戒受三皈稱一名者即為已與慈尊有緣可求生內院以親近之矣況乎慈尊應居睹史與吾人同界同土而三品九等之生因行之匪艱寧不較往生他土倍易乎一經上生即皆聞法不退菩提與往生他土猶滯相凡小者殊勝迥然矣時又作志行自述以告衆於學佛之特重菩薩戒行言之殊切略曰昔仲尼志在春秋行在孝經余則志在整興僧住持僧會正信會行在瑜伽菩薩戒本斯志斯行余蓋決定於民四之冬而迄今持之弗渝者也云志在整興僧會者除散見各條議之外關於住持僧之項大備於整理僧伽制度論而此論於佛教正信會之項亦略曾兼舉及之云行在瑜伽菩薩戒本者佛法攝於教理行果其要唯在於行行無數量攝之為十度又攝之為三學嚴核之則唯在乎戒學而已矣何者為戒惡止善作為戒夫惡無不止則雜染無不離矣善無不作則清淨無不成矣雜染無不離清淨無不成非如來之無上菩提耶而戒獨能達之故曰唯在乎戒也彼定與慧則戒之輔成者耳知法在行知行在戒而戒又必以菩薩戒為歸以菩薩之戒三聚饒益有情之戒聚實為菩薩戒殊勝殊勝之點梵網瓔珞諸本戒相之詳略有殊其高者或非初心堪任而復偏於攝律儀攝善法之共戒舊譯之彌勒戒本亦猶有訛略唯奘譯瑜伽師地論百卷中之菩薩戒本乃真為菩薩繁興二利廣修萬行之大標準而一一事分別應作不應作又初心菩薩之切於日行者也竊冀吾儕初行菩薩皆熟讀深思其義躬踐而力行焉故曰行在瑜伽戒本必能踐行此菩薩戒乃足以整興佛教之僧會必整興佛教之僧會此菩薩戒之精神乃實現吾之志行如是如有同志同行者則何樂如之時賢首家有不滿大師之抑賢首者大師乃作略說賢首義以明所崇重於華嚴者雖不若墨守賢首家言之甚而於平等大乘之上別標華嚴之殊勝處實不讓持賢首家言者也春季開學大師續講成唯識論及關於淨土之彌勒上生經關於戒律之瑜伽菩薩戒自傳十六大師為武院員生講學佛者應知應行之要事提出職業與志業說有感而發實為佛徒之針石高者隱山靜修卑者賴佛求活唯以安受坐享為應分此我國僧尼百年來之弊習而致佛化不揚為世詬病之大原因也豫有慨乎是宣化萌俗近歲人心丕變皈嚮漸多然細按之新起之在家佛教徒衆仍不脫僧尼之弊習且有傾向日甚之勢此由未知學佛之正行八正道故不為凡夫之溺塵即為外道之逃世也今所應確知以實行者應知職業志業之分是也學佛者志業也從吾志之所好以趨踐佛之淑吾身善吾心增進吾之德性達到吾之樂地者也故應以三皈之信五戒十善六度四攝之行為柢而毫忽不得藉此形儀名稱以為謀一家一身之生活計者而職業則於或家或國或社會或世界隨其勢位之所宜才力之所能任一工操一勞用與人衆交易其利以資一身一家之生活者也此因吾身藉家親國民之互助方得生養存活故吾應有以酬其益報其惠焉否則吾身於世即有所損既增他人之纍亦加自己之責墮落不免勝進奚冀故學佛之道即完成人格之道第一須盡職業以報他人資吾身命之恩第二乃勤志業以淨自心進吾佛性之德必如是佛乃人人可學必如是人乃真真學佛三月二月武漢信衆迎高野山學密歸來之持松任洪山寶通寺方丈學密之興趣倍深自傳十六海五四事紀四月仇亦山張慎盦來訪時將去英國大師與談政治稱美中國政治為治之根本皆為隨順人情之所好惡而調劑之使之無過不及合乎中道於西洋政治立法以強人服從為未善談東西學術及政治書與仇張二君談話後大師應泰東圖書局趙南公請康寄遙轉請為撰王陽明全集序論王陽明於良知及陽明四句教法以唯識義而解其深密頗多新意自傳十六海五五通訊是年春王又農從大師出家字以大剛大勇則以暮春去北京從白喇嘛進學藏密自傳十一十六菩提道次第略論序按自傳以大勇初夏去北京誤舊四月初二大勇已來函報告抵京二十三日印度詩哲泰戈爾抵北京佛化新青年會道老等於二十六日開會歡迎賞丁香花於法源寺徐志摩傳譯莊蘊寬等作陪佛化新青年月刊泰戈爾專號海五五事紀席間泰戈爾讚美佛法大師乃作希望老詩人的泰戈爾變為佛化的新青年勉以勿如中國無行文人無聊政客說過完事大師時作佛法之分宗判教立化俗出世正覺三教遮破內院教一乘三法相唯識分宗五月十一日佛誕武漢佛化新青年會廬山世界佛化新青年會改名就中華大學開成立大會大師及宗藻生李隱塵李慧空等均有演說海五五事紀十六日十三日日本融通念佛宗布教師清原實全過佛學院訪問大師海五五事紀二十六日二十三日大師於武昌佛教會開講金剛經六月十一日五月初十圓滿薰琴筆記成金剛經述記陳元白始從大師受皈依自傳十六海五五事紀海五七事紀按自傳以此為十二年十月間事誤暑假期前大師為武院學生論教育滿智記析教育為動物教育人倫教育天神教育佛化教育四類德國樂始爾博士來佛學院訪大師以大乘佛法陳維東譯語與德國樂始爾博士之談話六月十五日五月十四日武院暑期畢業得六十餘名大師初擬徹底改革辦法酌留優材生為研究部續招新生以比丘為限志在建僧注重律儀施以嚴格生活管理模仿叢林規制以樹整理僧制之基唯以李隱塵表示異議未能通過乃曲從諸董事意一倣過去辦法自傳十六十八海六一事紀十七十八日五月十六十七兩日佛學院禮請持松來院開壇傳密海五七事紀暑期前後泰戈爾來武昌今來鄂渚榴火正紅歡迎詞武漢佛化新青年會參加武昌之泰戈爾歡迎會大師與泰戈爾及徐志摩曾作一席談自傳十六訪記按自傳以此為十二年夏事誤是年春夏大師門下以狂熱為教之革新精神引起長老不安成新舊之爭春月湖南旅鄂沙門漱芳居士唐大定等有上湖南省諸山長老暨諸檀護書以興辦佛學院為請海五四通訊次有江浙同學致江浙各叢林寺院啓再致江浙諸山長老書以組織江浙僧界聯合會辦有系統之佛學院設慈兒院三事為請時圓映禪齊等均答以讚勉之覆函海五七通訊北京之佛化新青年會以道階覺先太虛現明明淨圓映轉道會泉性願持松空也等名義發出快郵代電謂佛教三十年來一迫於戊戌維新再挫於辛亥革命三排於外教四斥於新潮若無方便護持將歸天演淘汰此固非面壁獨修者所關懷亦非玄談業緣者所能救也於是提出八大使命充滿革命情緒第一件使命在革除數千年老大帝國時代舊佛教徒的腐敗習氣露出新世運非宗教式的佛教精神第二件使命在打破一切鬼教神教中西新舊偶像式銅像式的陋俗迷圈牢式的物質迷電出各方震動北京僧界致書大師表示有關佛教大局萬難承認此外傳單攻訐老僧亦不一而足如印老致唐大圓書云妄造謠言編發傳單光生而愚拙概不預社會諸事而以不附和故妄受彼等誣謗加以第一魔王之嘉號而諦間為第二范古農為第三以馬一浮為破壞佛法之罪魁其傳單有三數千言想亦早已見過矣上來文件並見海五八通訊佛化新青年會之動機與八大使命應有其理論根據與時代背景然不求以事實獲取信衆同情張皇鹵莽徒欲以虛聲奪人致受打擊而挫折為可惜也七月七日六月六日日本權田雷斧於潮州開壇傳授密法一星期而畢王弘願震旦密教重興紀盛王弘願得傳法灌頂為廣東居士傳密之始基大師先聞權田來曾致書王弘願曰讀敬告海內佛學家書知日本雷斧僧正將至中國此誠一大事因緣也以近年聞密教之風而興起者多得力於居士所譯雷斧諸書者而雷斧於日本密教之學者中洵亦一代泰斗然雖冒僧正之名實缺僧行聞之演華師其年七十餘時猶娶妾聞日本僧皆如此已成通俗所行殆不亞居士非議於淨土真宗之某某上人者夫密教貴行空言無行則祇能以哲學者視之不能以密教阿闍黎視之也故私意當請其周行講學等之杜威羅素而不應有開壇灌頂之事質之居士以為何如王弘願大不以為然且因此深植僧俗顯密之諍根時東密勃興動輒以六大緣起為究竟凌鑠諸家大師乃作緣起抉擇論以折之業感賴耶真如法界六大五種緣起於所知法於能知人皆當以六大緣起為最淺大師綜緣起說為六大分為三以六大緣起業感緣起為色心緣起以空智緣起無明緣起為意識緣起以真心法界緣起藏識緣起為心識緣起論意識緣起以為起信論之緣起義乃以登地以上菩薩心境而說無漏無間續生無漏無漏無間忽生有漏可云真如緣起或如來藏緣起有漏無間忽生無漏有漏無間續生有漏可云無明緣起此約等無間緣說緣起以通起信論為其後起信論唯識釋之所本論心識緣起以為各現各種現現增上遍諸法頓起頓滅起起不到攝十世此二義為唯識與華嚴之共義大師年來講成唯識論於唯識之緣起義欣尚日深故極讚立言善巧建義顯了以唯識為最是月大師偕武漢緇素上廬山召開世界佛教聯合會中國到湖北了塵湖南性修江蘇常惺安徽竺庵江西李政綱四川王肅方等十餘人日本推法相宗長佐伯定胤帝大教授木村泰賢來會史維煥為傳譯英德芬法而自承為佛教徒者數人中有艾香德自傳十七海五八事紀會期三日七月十三六月十二日至十五日商討中日交換教授學生喚起緬暹等聯合議決明年於日本開會定名東亞佛教大會會期中常惺木村泰賢黃季剛李政綱均有演講大師講西洋文化與東洋文化以為西洋文化乃造作工具之文化東洋文化乃進善人性之文化自傳十七海五八事紀海五十二事紀其後木村泰賢發表其觀感支那佛教事情其間計劃周詳規模宏遠屹立長江上游有宰制一切之威權操縱一切之資格者則為武漢之佛學院與佛教會佛化報海潮音佛化新青年等雜志皆其宣傳之機關報對於佛化運動甚為活潑而有力也是等運動不出於職業宗教家之僧侶而出於側面之護法精神彼等所唱之高調碻信能救濟世界之人心大師以明年須出席東亞佛教大會應合法推出代表乃與李隱塵等發起籌組中華佛教聯合會先成立籌備處海五八事紀五十事紀會畢大師偕常惺東下時常惺嗣泰縣光孝寺培安法以寺産過豐紳學界常與為難因發起禮請大師講經以資調和自傳十八常惺法師塔銘并序大師抵滬覓大勇未見即晚往鎮江康寄遙上太虛法師書超岸寺主晴峰約退居守培焦山智光觀音閣仁山盧潤州等宴敘自傳十八按大師自傳忘經滬之行大師偕守培等過揚州寂山反對佛教協進會者伴遊瘦西湖平山堂諸勝自傳十八大師偕寂山仁山讓之守培智光晴峰常惺象賢等抵泰縣光孝寺時大愚閉關於此機警大醒始於是見大師二十五日六月二十四日大師開講維摩詰經八月十八日七月十八日圓滿自傳十八海五七事紀五八事紀法會中奘老自寧波來聽經法會傳為盛事八月十三日大師為盧敬侯等士紳二三十人授三皈依一改向來輕蔑佛教之風大師教以結念佛社作泰縣念佛社序為泰縣佛教居士林前身求受皈依者接踵而至方便開示無慮千人自傳十八海五八事紀二十日大師應如皋紹三等請往如皋經淨業寺小憩說法抵如皋佛教利濟會讀大師志業與職業一文而組織潘海觀等熱烈歡迎設座縣議會大師講佛教與東西洋之文化自傳十八海五九事紀按自傳之中途經姜堰西方寺停一日準默庵所記太虛法師在泰縣淨業寺說法記知淨業即西方但留半日上海世界佛教居士林先期派張純一來如皋禮請二十三日大師偕常惺張純一等去上海二十四五兩日大師講於居士林題為衆生法佛法不異世間法海五八事紀居士林林刊七期按自傳忘上海佛教居士林之講演林刊謂係二十三二十四日與事紀不合林刊謂係星期日及星期一知林刊誤大師應約再到鎮江遊金焦鶴林諸勝盧潤州佛學研究會會長請於超岸寺說法大師講即俗即真的大乘行者象賢記自傳十八詩存文按自傳忘去上海故謂從南通乘輪船再到鎮江誤三十一日八月二日大師回抵武院翌日開學新生有寄塵機警亦幻墨禪虞佛心德元蘇秋濤等是期改推湯鑄新為院董長請善因為都講唐大圓張化聲任教研究部生大師自為教導授大乘五蘊論發菩提心論並發端而未竟四大種之研究律儀之研究知識行為能力是否一致均是時講自傳十八海六一事紀是年秋武昌佛教女衆院創立自傳十八九月十三日中秋集院衆賞月朱善純甲子中秋佛學院同人賞月記大師有和隱塵詩萬方正多難秋月又圓明忽悟塵勞海原為法樂城大悲來地獄至德發天聲翹首瞻空際無言意自傾十月九月北京佛化新青年會停頓寧張離京返川前以僧界反對次七月二十八日有民生通信社發出消息指張宗載為留俄共産分子長老反對伎倆原來如此雖經向中外報章聲明民生通信社道歉了事而形勢日非迫得暫告停頓海五八事紀海六二寧達蘊特別啓事十一日九月十三日大勇於北京慈因寺成立藏文學院開學海五十二事紀武院之大剛超一法尊觀空嚴定法舫等往從之大勇此舉得湯鑄新胡子笏但怒剛劉亞休陶初白等贊助自傳十九按自傳謂冬間開始成立誤海潮音自九期起改由張化聲主編十五年來海潮音之總檢閲二十四日九月二十六日蕭耀南往寶通寺禮請持松修護國般若經法七日繼又開結緣灌頂法會六日海六一事紀秋杪九月大師忽召集全院員生宣布院務暫交善因代行留函致院董會辭院長職即日搭輪離漢突如其來之行動頗滋武漢緇素疑訝自傳十八海六一事紀離院原因自傳謂春起我已得了胃病入夏漸劇擬作短期完全休息又因第二期係隨他意辦亦減少了熱心及鬆懈了責任參看略史今謂因病休養亦其一因大勇於去年七月十日來書即有尊恙實由思考過度腦力損傷所致靜養數年之說不可緩也大抵法務繁冗之餘體力或感不勝遇事緣乖舛則思退休而辦學不能如己意實為主因隱塵大部分院董對我亦漸持異議其所以異議一則信仰傾向密宗隱塵同鄉蕭督亦轉就寶通寺求修密法信仰異趣經濟亦轉用於彼去年理想之佛學院計劃今年暑期提出之辦法均以經費藉口而不行再則佛化新青年會若此革新與隱塵等轉趨於神祕寧無不快之感武漢信衆之日見離心實大師突然離院之因大師以見密宗之興為幸密宗起而大師之事業挫折大師含容廣大卒以矛盾礙其統一當非初料所及按自傳謂抵南京時適齊盧之戰將作考是戰起於九月三日此行決不在此時殆上次回武院時所經情形大師抵上海謁士老適奘老來滬朗清邀住雪竇分院始與朗清締交大師訪趙南公取人生觀的論戰科學與哲學等書從奘老回甬靜養於鄞江橋之黃杜岙之雲石洞凡月餘自傳十八奘老為編者說歐戰引起西方文明破産之說而儒佛一時興起諦老印老大師與歐陽竟無等廣事弘揚並乘此氣運而來然西方文明破産而並未毀滅逮五四運動起西方文明又日見抬頭去年以張君勱之人生觀演辭引起丁文江之駁斥有科學與玄學之戰是年以印哲泰戈爾來華更轉為精神文明與物質文明之爭爭辨續續未已唐鉞與張東蓀均有意見發表大師靜居巖洞尋其諍論所在乃發前唯物科學與唯識宗學之義撰人生觀的科學自傳十八大師尊重科學之經驗且以一切學術根源於經驗科學以能致謹於經驗見長洵為自悟悟他最良之方法然據我的觀察宗教玄學哲學亦同以感覺的徵驗為出發點不過其感驗有誠諦不誠諦依之由思念推辨所知之義理有契當不契當但一般之科學經驗未得究竟佛法乃足以完成之故云現時狹義的科學猶未能擴充心覺以得全宇宙之誠驗故不足以達究竟復次現時狹義的科學家所用科學方法未能自祛其能感知上的心病又於所用方法及所獲成績知識及由科學知識所成之事物不免沾沾自喜得少為喜而生執著故其錯誤仍難盡去科學的方法當以擴充感驗的能力為最要而今於視覺聽覺雖已有擴充方法然於嗅覺嘗覺觸覺之擴充方法既極短缺而於意覺又祇有論理訓練之一法不能施於意覺發動幽微之際而分解修繕之以擴充其純正感覺之力量余認瑜伽方法加入於現時狹義的科學方法即為廣義的科學方法以之得成由純正感驗所獲之明確理知即為廣義的科學亦由乎此蓋瑜伽方法不先立何標的禪宗但先澄靜其意覺而進為分析之觀察由是得到直接之感驗而構為善巧之說明俾衆同喻依純正感驗所構成之明確理知此非科學則科學復是何物論及人生觀大師抨擊梁漱溟之以佛法為反復勦絶說明即人成佛之真義人乘法原是佛教直接佛乘的主要基礎即是佛乘習所成種性的修行信心位故並非如梁氏說大師是改造的且發揮出來正是佛教的真面目此因釋迦出世的本懷見於華嚴法華其始原欲為世人凡夫顯示一一人生等事實三真相遍覺的律法的調和的俾由修行信心進趨人生究竟之佛乘無如僅有少數大心凡夫若善財童子等及積行大士若文殊普賢等能領受其意其餘大多數科學幼稚人情寡薄如聾如盲不能同喻為適應此印度的群衆心理乃不得已而示說人天乘福業不動業之報及聲聞乘獨覺乘解脫之道以今日征服天然發達自我之科學的人世已打破向神求人天福德及向未有以前求外道解脫之印度群衆心理正須施行從佛本懷所流出之佛的人乘以謀征服天然後欲望熾盛及發達自我後情志衝突之救濟且可施行此佛的人乘俾現時科學的人世基之以進達人生究竟以稱佛教本懷以顯示佛教之真正面目病愈大師慕雪竇寺名勝偕奘老往遊適一雨三日竟不得出門縱觀乃翻閲山志哦詩遣悶雪竇寺八咏皆臥遊所成自傳十八大師抵甬慈溪保國寺主一齊邀往遊憩住可一月日居無事又作大乘與人間兩般文化及起信論唯識釋二書自傳十八按重纂保國寺志序十四年冬余寓寺經月乃十三之誤又大乘位與大乘各宗謂起信唯識釋是民國十三年春著春應為冬之誤大乘與人間兩般文化曾再講於廬山如皋蓋針對物質文明精神文明之爭而作大意謂兩般文化為東方西方所共有特有所偏重再則此兩者各有利弊應以大乘導化之使完善此為大師融通世學之根本方式理智上是離言契性的甲行為上是克己崇仁的信向上是融跡同本的人間兩般文化理智上是藉相求知的乙行為上是縱我制物的信向上是取形棄神的甲實事善體存性利乙虛利利用厚生人間兩般文化甲妖怪苟惰沈迷弊乙封蔽奮鬥失望起信論唯識釋所以通唯識家內院師資之駁難者繼緣起抉擇論之說意識緣起以引申論究之其主要之意見為審定論主依據之心境聖位菩薩之造論皆依自證現量智境則馬鳴造此論之依據點必在八地或初地以上之菩薩心境登地以上菩薩心境有時有漏同異生亦有時無漏同如來有時執障相應染法現行亦有時智證真如而無明暫斷現行成唯識論之說等無間緣第七轉識有漏無漏容互相生第六轉識亦容互作等無間緣皆依此登地以上菩薩心境說此論示大乘法謂衆生心唯依據亦有漏可代表六凡亦無漏可代表四聖之地上菩薩心能說明之此即豫謂馬鳴造此論依據點之所在也其後王恩洋復作起信論唯識釋質疑大師復略答之十二月四日孫中山應北方請抵津主開國民代表大會以解決時局大師自謂其時發生兩種新覺悟一曰中華佛化之特質在乎禪宗欲構成住持佛法之新僧寶當於律儀與教理之基礎上重振禪門宗風為根本二曰中國人心之轉移繫乎歐化於正信佛法之新社會當將佛法傳播於國際文化先從變易西洋學者之思想入手對於重振禪風後但偶一論及而繫乎歐化則影響於大師此後之工作方針甚大然宗教弘布於具有高度文化之新國族原非一蹴可躋從復興中國佛教著想則難免緩不濟急之感民國十四年一九二五甲子乙丑大師三十七歲一月武院院董會推孫文樓來寧波訪謁大師於保國寺懇回武院住持適大勇胡子笏函來北京發起仁王護國般若法會請北上講經大師乃允短期回鄂一行自傳十八大師出甬抵滬以科學的人生觀及大乘與人間兩般文化交泰東圖書局發行晤章太炎與談起信論義及人乘階漸佛乘義頗得章氏激賞自傳十八人生觀的科學後序二十三日臘月念八日史一如病卒於滬海六四事紀按自傳以史一如卒於十二年下半年誤二十五日乙丑元旦大師抵漢口大醒為編者說回武院對院務逐加整理為學生講二十唯識論自傳十八大醒為編者說世間萬有為進化抑為退化以佛法批評社會主義佛法是否哲學佛教心理學之研究均此時為研究員講大師評社會主義確認其目的之正確而嫌其手段之偏謬見環境而忘本身專物産而遺心德齊現果而昧業因除我所而存我執故主改造本身究源心德進善業因伏斷我執以正其偏而庶乎能實現其目的論心理學大師依楞嚴經析為情的想的智的時革命空氣漸高大師乃作大乘之革命其革命之工具即二空觀是月北京佛化新青年會復活邵福宸負責進行海六一佛化新青年會通啓寧張在川亦有重慶及四川在成都分會之設立張宗載宣言誇張猶昔海六一宣言海六二宣言二月八日十五日李隱塵等約蕭衡珊耀南何韻珊陳叔澄等發起就中華大學請大師開講仁王護國般若經講數日講務由善因代座鍾益亭汪奉持等是年受皈依自傳十九海六二事紀三月六日二月十一日大師偕王森甫等一行二十餘人北上至京蒞車站歡迎者數千人駐錫慈因寺海六三事紀自傳十九按自傳正月底到京二月初間開講誤十四日十九日大師於中央公園社稷壇開講仁王護國般若經聽衆日常千人法尊法芳譯語兼記録成仁王護國般若經講録四月十六日三月二十三圓滿克蘭佩衛禮賢多傑覺拔貢覺仲尼均來法會參聽自傳十九海六四事紀法會致班禪書講次值孫中山先生逝世停靈社稷壇經筵臨時旁移數日大師往謁遺體致敬挽云自傳十九人物志憶六但知愛國利民革命歷艱危屢仆屢興成大業不忘悟人覺世捨身示群衆即空即假入中觀大覺亦於三月十二日二月十七日卒於重慶之歸元寺大覺苾芻塔銘時段祺瑞執政召集善後會議通電呼籲和平有誰本孔子一貫之旨凜佛家造孽之誡語大師乃舉三義以致書執政書太原大同學校試驗理想教育之德人衛西琴禮賢讀及大師有關教育之論文載晨報特來京訪晤咨詢佛之教育法自傳十九其後常通音問友誼頗篤四月大師與白普仁莊思緘等設中華佛教聯合會籌備處於北京呈內政部備案以便推派代表出席今秋東亞佛教大會自傳十九略史海六四事紀海六五事紀大師作中華佛教聯合會應如何組織耶主在家出家分組而後合組法會期間大師兼為藏文學院講攝大乘論法尊記僅至所知依分海六三通訊大師論及大乘三宗於平等中顯有淺深之跡一法空觀慧宗重破小乘法執二法相唯識宗前宗雖以空慧洗盡法執然離執之法相則未廣明故以此宗繼之真如淨德宗凡有言說可安立者前宗攝盡而無餘此宗所明者乃法空觀慧所生所顯法相唯識所明所證之體也十九日大師應燕京大學約往講為學所以求真實熊東明由此發心學佛自傳十九論是春班禪來京謁段執政班禪大師傳略非宗教同盟一時風起文殊誕四月二十七日左近大師偕胡子笏妙觀朝五臺山宿碧山寺廣濟茅蓬適風雪瀰天僅禮北臺菩薩頂自傳十九詩存五月大師偕子笏抵太原以莊蘊寬汪大燮葉恭綽許世英孫寶琦熊希齡湯薌銘等先容受閻百川之招待唯晤談之餘意趣不盡愜洽自傳十九海六十通訊大師訪山西村政遊晉祠五月五日等名勝於洗心社之自省堂講佛法與孔子之道自傳十九海六六太原四團體歡迎太虛法師之演講録大師經石家莊回北京時大勇決改組藏文學院為留藏學法團專學藏密自傳十九海六六事紀因乞大師開示書四偈示之心佛衆生一如無別下同悲仰上齊慈力本依率身律儀澡心冰雪嚴己正人住持體立嚴正寬消峻怨和凝厚德事緣吉羊成由福德寬和隨順時機施行法教攝化無方廣學善巧攝化大勇後以六月四日閏四月十三日成行海六六事紀能海之入藏學密亦是年三四月三月事海六五事紀大師離京南下沿途經濟南南京常州無錫蘇州並小住遊覽所至均紀以詩自傳十九針新僧詩存時佛化新青年會復活而武院同學會是春又出版新僧大醒迦林寄塵負責老僧為之驚恨大師遊歷歸來作針新僧以緩和老僧惡感文大師抵上海天童寺退居淨心住持文質已在滬迎候海六五事紀偕赴寧波禮育王舍利塔已去天童寺講楞伽經六月初開講陳慧秉記録成楞伽經義記自傳十九經期中山居閒適遊天童諸勝皆有題詠自傳十九詩存悲圓居士集序大覺苾芻塔銘並序均作於此時大師為東亞佛教大會撰敬告亞洲佛教徒蔡伯毅為譯成日文海六八通訊講畢大師抵滬七月二十九日三十日初八初九兩日在世界佛教居士林講演佛乘自傳十九海六七事紀按居士林說法自傳誤為北京初回未去天童之間八月四日六月十四日大師抵廬山大林寺十日起開暑期講演會三日北大教授張怡蓀台灣故友善慧並參預演講大師講世俗諦的人生觀海六七事紀發揮仁義禮樂之仁德今雖欲行儒之行而本之於佛而又歸之於佛也大師是年多以儒為方便致段執政書擷華夏之文化體佛用儒復衛禮賢書先從大乘佛化以得到符合內外上下渾然一體之宇宙人生實際之孔家儒化與大乘佛化乃能收事半功倍之效在太原講佛法與孔子之道其後復作中國人用中國法之自救自謂感於中國之日亂列強之不足恃主張發揚宋元來之國民性道德三教融合之精義淬礪而振作之其項目為一建佛法以建信基二用老莊以解世紛三宗孔孟以全人德四歸佛法以暢生性大師晚年論發揚中國文化要不出此是年夏秋大師設廬山學宭於大林寺以會覺大醒滿智迦林為學員令習英文與佛學熊東明從學佛法於山為寰遊歐美布教之預備自傳十七寰遊記一略史大師素以振興佛教唯中國能振興大乘佛教救世界今乃欲先著手於世界運動格化西人庶乎國人因西人之信仰佛法而信佛方針一變是秋唐大圓回湘海潮音移廬山九期起改由會覺編輯南北東西的海潮音海潮音十五年來之總檢閲支那內學院擴設法相大學廈門南普陀寺禮請常惺創辦閩南佛學院海六七事紀國民大學函商增設佛學史或印度哲學史請大師為教授辭之未就覆國民大學函時東密藏密泛濫日深蒙藏喇嘛形服同俗酒肉公開東密則曰俗形居中臺也曰定妃為女形也而居士據以傳法且誇即身成佛為獨具之勝義大師慨中國佛教漸陷混亂有辨髦戒行上苴淨業之危普陀印老同感春日大師作今佛教中之男女僧俗顯密問題在廬山學宭更講論即身成佛中國現時密宗復興之趨勢主張納於教理軌以戒律嚴其限制望大心比丘深入東密藏密而冶為中密讀大師致王弘願書七可概見當時爭論情形比年天下洶洶人失其性莫非值利譽則貪癡即縱處人己則瞋慢相陵播流四毒構成衆凶乃知非先自降伏煩惱則凡百皆為資福之具耳宏法宏法多少人將假此名以行其惡語之曷勝痛心去春雷斧之事日僧演華等續續來信且宣誓以證其所云之皆實余以君等已心喪其主客氣用事不能止惡徒以長瞋因之默爾而息其意在不添火宅之焰非有他也近衡時局稍發危言乃聞門弟述君於所撰之報紙公然惡口相加余唯有痛自慚愧祝君心快而已他復何言大師廬山講學更有阿陀那識論論法相必宗唯識議佛教辦學法大師立法相定義空前之法執非法相遮破法執之空慧非法相安立非安立圓融之法界非法相據是遮落聲聞般若等經論法相為慈氏系獨得而明其必宗唯識是年編廬山講稿為廬山學由泰東書局印行自傳十七十月九日大師由廬山過南京大醒等隨行學宭停辦大師訪歐陽竟無參觀法相大學受邀說法講認識的地位論時武院研究生有數人於此受學自傳十九海六十時事按自傳以此事為去廬山之前誤十日抵蘇州應北寺昭三及張仲仁等請講仁王護國般若經於北塔寺有李印泉根源等參聽二十六日八日受皈戒者三百餘人法會圓滿自傳十九海六十時事攝影人物志憶十二追悼熊秉三張仲仁兩先生當日還滬按志憶謂歷三月餘指包冬季再來而言法會期中大師於東吳大學講我之宗教觀師範學校講人生問題之解決基督教青年會講佛法自傳十九海六十時事大師論及宗教之將來以為人世既長有不滿足而邀求無限永存之心意即宗教有長在之餘地人心要求滿足之心不一致由宗教要求而有宗教之存在宗教即不能統一其時大師雖再受任為武昌佛學院院長海六七事紀然以信衆離心未能實現建僧本意大有捨棄之心空也致張化聲函會覺滿智致大師書得昭三同意擬接收北塔寺籌辦中華佛教大學自傳十九廬山所講議佛教辦學法即此時主張佛教僧伽過渡之大學辦法不辦小中學而專辦大學與前年理想中之佛學院完全組織相反不收俗衆而重戒律不分宗派以免偏注與僧伽制度論異按自傳謂已有世界佛學苑的提議考海六十攝影為中華佛教大學敬告亞洲佛教徒為世界佛化大學世界佛學苑之名始於寰遊歸來大師回滬參加東亞佛教大會之中華代表團全團二十六人有道階持松弘傘曼殊揭諦王一亭胡瑞霖韓德清徐森玉楊鶴慶張宗載寧達蘊劉仁宣等滿智為侍録自傳十九當晚團員赴日本俱樂部應留滬日僑之歡迎海六十二東亞佛教大會專刊按代表團於十月二十七日動身十一月二十一日回國自傳謂舊十月中旬齊集上海動身返上海時已十一月中旬十四年冬杪日本遊畢均誤二十七日大師等全團放洋赴日翌日組成中華佛教代表團道老大師王一亭胡瑞霖被推為團長專刊大師以任團長故各處致辭演講十九由大師任之自傳十九二十九日大師等一行抵神戶日本總招待水野梅曉大西良慶等來迎出席神戶佛教聯合會歡迎會大師致答詞自傳十九專刊三十日午車抵東京日本佛教聯合會主事窪川及佐伯定胤木村泰賢等來迎歡迎者不下萬人同赴芝公園增上寺安住自傳十九專刊十一月一日東亞佛教大會於增上寺大殿行開會式午後赴少女少年團之歡迎會自傳十九專刊下午開教義研究會大師宣讀論文阿陀那識論論下注晚赴帝國俱樂部出席日本關係中國之五團體歡迎會專刊二日大師出席教義研究會鑒於日本佛教之俗化主宣傳佛教之根本方法在乎僧格之養成其說得日本律宗管長同情其後特來訪晤自傳十九專刊三日下午大會行閉會式大師演說專刊按自傳以大會為七日誤四日中華佛教代表團由水野梅曉等陪導出發各處參觀是日遊日光專刊五日上午參觀帝國大學大師於帝大青年會講人生問題之解決列舉不同之解決而歸宗於正覺人生之解決續參觀帝國博物館往赴日本文部大臣之盛宴午後超薦前年震災之亡者晚應府市聯合會之招待自傳十九專刊六日參訪奈川鶴見町總持寺曹洞宗本山及日蓮宗本山立正大學大師於立正大學讚揚法華之殊勝專刊七日全團別東京向名古屋進行過靜岡有盛大之佛徒歡迎會抵名古屋出席市政公會所開歡迎演講會大師講佛教與吾人之現在及未來晚宿日暹寺專刊八日向福井縣出發晚宿曹洞宗本山永平寺專刊大師永平寺即景詩東亞有高會紅葉正深秋塵海佛光普關山客夢悠久懷永平寺來作采真遊一笑忘言說風徽仰古猷九日抵京都歡迎者萬人晚宿南禪寺專刊十日至奈良參觀正倉院東大寺法隆寺回宿南禪寺專刊十一日參觀大谷大學大師發表傳教西洋之提議繼參觀市政公所應歡迎之茶會大師講中日佛法之異點晚宿南禪寺專刊十二日參觀東西本願寺繼至龍谷大學大師講淨土之要義次參觀妙心寺回南禪寺專刊十三日參觀石山寺去坂本港晚宿延曆寺專刊十四日去日吉參觀三井寺參禮黃檗山臨濟大學大師講臨濟四賓主次去木幡參禮王寺宿信貴山專刊十五日至奈良重遊東大寺往參觀興福寺大師於歡迎會中講從奈良說到佛法之本源回南禪寺宿專刊十六日參禮知恩院建仁寺清水寺參觀博物館已往瞻禮三十三間堂回南禪寺南禪寺為天臺一山國師來日開山中華佛教代表團特為致祭大師撰疏專刊文十七日全團赴高野山晚宿龍光院專刊十八日參禮奧之院赴金岡峰寺茶會次出席高野山大學講演會金山穆韶講弘法大師之密教觀語中涉及大師之密教評論大師乃出以溫和之應戰講金山教授之說與感想專刊金山教授之說與感想附注十九日至大阪遊觀天王寺出席各新聞社之歡迎晚宿難波別院專刊二十日回抵神戶赴華僑講學會之午餐大師講菩薩行先從人道做起次在中華會館出席中日聯合歡迎會大師致謝辭專刊此行大會三日遊觀參訪十七日大師領導團員克成使命水野梅曉仰止生撰民國佛教界之盟主太虛法師以表示其觀感支那時報略云肩挑民國佛教界胡來胡現漢來漢現之英靈漢我太虛法師與記者相識不過十有餘年為中華民國佛教代表團團長偕二十餘緇素共來赴會造日華兩國佛教史上未曾有之記録法師欲依佛教主義之宣傳令歐美人改造對世界之基礎觀念於謀世界人類之和平與福祉之大抱負下不以其勞為勞誠精力絶人之勇者也日本佛教徒於法師得一新同事及將來發揮東方文化於世界之好伴侶希兩國佛教徒皆以法師為中心互取其長而補其短以期佛教之宣揚於世界幸法師自重以全此大任為禱藤井草宣於奉公雜志之介紹亦謂法師年齡聞僅三十有七實令人抱一非常之感大師赴會期中日本之名教授如南條文雄井上圓了村上專精大內青巒高楠順次郎鈴木大拙渡邊海旭常盤大定木村泰賢金山穆韶等並來訪談自傳十九而德駐日大使索爾夫帝大教授德人毗支莫莎並特約大師晤談得值參事卜爾熙後任駐華公使願為介紹柏林友人歡迎大師去德講學為大師西遊一助緣自傳十九寰遊記一二十一日大師與劉仁宣等離日返國道老及寧達蘊張宗載去臺灣轉廈門自傳二十專刊臨行代表團發表留別日本諸佛教同袍文大師作蓋聞心不孤起託事現行教不虛張因事施設以歐美偏霸之動遂孔釋中和之探啓西方之哲人慕東化乎儒佛又聞大火燎原發星火於片石洪流沃野出岷源之濫觴由去夏廬阜椎輪來今日蓬瀛大輅空成規乎既往曠進化乎將來於是增上淨緣開唯一無二高會觀音淺草留歷劫不壞金身緇素俱集商研究宣傳於法義士女交參議教育社會之事業應後藤主爵茗談為帝大學生演說活潑少年歡呼雷震莊嚴古佛宴坐花飛四座之衆咸傾三日之功既畢總持訪洞上高禪本門立日蓮正法植物園張文部之宴被服廠叩災骨之鐘由是名古屋宿覺王山煥然新制福井縣參永平寺卓爾古風見皆堪學十年勝過讀書迎即有辭一路歡聲入洛南禪創於一山東化紐乎兩國探古正倉隆性相之大法博物帝館謁東西之本願兩谷學府燦梵藏緬暹之文一心妙明超名句言思之表湖泛琵琶經延曆而黃檗山遊貴信賞深秋以丹楓再會奈良之群麋綜攬京都之諸勝高野為祕密之玄都輝騰覺海大阪蔚工商之大國寺麗天王吞佛剎於毛孔隱顯無方歷神仙之樂邦出入以戶一語半言線脈之心光互映千珍百品重重之紀念無窮喜馬拉兮高何極太平洋兮深莫測森羅萬有兮昭一心華夏扶桑兮融大日賦同袍兮天地寬轉法輪兮歐美入話別情兮聊贈言申謝忱兮欲奚說大師回滬二十五日應國民大學章炳麟殷芝麟約往講能知之地位上之所知諸法章炳麟致太虛法師書大師再去蘇州為少數人作楞伽經之研究自傳十九人物志憶十二追悼熊秉三張仲仁兩先生海六十事紀大乘入楞伽經釋約此時作發端而未竟其緒大師初擬十月二十三日接收北寺為佛教大學校基囑大醒往為管理大醒為編者說然以債務繁重中止進行自傳二十是冬明春大師常往來於上海蘇州之間自造按楞伽經之研究自傳與志憶未明言為第二次來事依時事知有楞伽學社定於仁王經畢講開講仁王講畢大師即去日推知必係此時所講大師日本歸來撰由職志的種種國際組織造成人世和樂國載諸東方雜志論建立國際合衆國其理想為一業一業皆成為一種一種之國際組織而由此一業之國際組織的團體以自治理其一業所關係之大事換言之教育界即於全人類之世上自成為一教育國宗教界即於全人類之世界之成為一宗教國而此一一國即一一成為國際組織的團體皆交互周遍於全人類世界無人種民族國籍領土之區別譬如一室多燈光光相網然則世人不難由此進一步為總組織之統一而造成為一平洽豐樂之世界國本論目的著重於佛教徒當首先進行佛教的國際組織此則僧伽應負其責一則當修養成職志一致之僧格即僧格之養成評今世耽妻室甘肉食而號為僧者應知其實非僧也二則當統率信徒組成有秩序之國際團體盡力於弘法利人大師建僧而不滿日本式蒙藏式實為一根本觀點是月二十一日大勇率衆至康定為藏方所拒留康修學大剛致克全書民國十五年一九二六乙丑丙寅大師三十八歲一月二十一日大師在上海參加居士林之釋迦成道紀念會海七二時事武漢佛教同人推大智來蘇專迓大師偕與抵漢口講經授皈依而回過武院為學生講能知地位差別上之所知諸法善長記自傳二十佛教會上太虛法師書二月七日二十五大師應蘇州自造寺佛學會寺主本醒約往寺略作開示象賢記海七二時事海七三圖像大師至浙西硤修彌勒七過舊年十三日丙寅元旦大師撰居家士女學佛之程序比來之學佛者或盲從他人以附和自無心中之所主或好奇趨時以標榜惟任妄情之所馳或徒託佛以逃世或更藉佛以沽譽大師乃為明確指出居士學佛則期以普及乎全人類風俗因以淳良社會由之清寧者也由遵行人倫道德養成人格而漸修十善菩薩行按自傳以此為在上海然居士學佛之程序末署丙寅元旦草於浙西彌勒閣其非上海可知會覺曾偶與編者談及大師行蹤間有人所未知舊曆十四年底住某處過年新年函廬山會覺在山編潮音郵戮蓋硤字樣竊疑此或海寧縣之硤石鎮今雖難確指然決非上海彌勒閣不必為寺名殿名蓋從修彌勒七得名二十七日元宵後二日覆體參書為論彥明轉識論之研究書是年春大師應劉仁宣等請約熊希齡章太炎王一亭等發起全亞佛化教育社後改名中華佛化教育社作佛化運動社址設虹口由劉仁宣編心燈旬刊大師則寓雪竇分院或育王分院息廬就近指導自傳二十海七二時事海七三時事三月二十二日二月初十大師講身心之病及醫藥於蘇州之江蘇醫科大學默庵象賢從行海七八採録二十八日居士林組法相唯識研究會請大師開講法相唯識學概論每星期日講僅三次而止海七三時事楞伽大旨唯識之淨土中國信願行淨土與日本教行信證真宗並去冬今春先後於居士林講是月白喇嘛於杭州啓建金光明法會五月四月初一日再建法會於南京毗盧寺海七三通訊四月二十一日三月初十大師應杭州佛學會吳璧華等請講仁王護國經護國品三日設座功德林王九齡來會參聽大師一別西湖倏忽五年訪靈隱昭慶彌陀諸寺自傳十九海七時事按自傳以此為去年北京歸來將去天童寺事誤二十三日大師在省教育會講演海七四時事時政局日緊班禪於四月五日通電全國願有助於和平大師亦漸注意時政聯合杭州學佛同人向各軍政長官呼籲和平佛誕日發電大師且致書孫馨遠傳芳為論政有王道霸道戰國之道冀其能從事於王霸之道論及提倡佛法則告以非今人所提倡之禳災祈福拜像諷經之佛化蓋指杭州南京金光明法會而言致孫總司令書六月中復致書雲南唐繼堯勉以睦鄰以止外紛專志以隆內治致雲南唐省長書五月十九日佛誕大師時在漢口佛教會講佛說無量壽經善長梵燈合記成佛說無量壽經要義大師過武院數日為學生講佛法大系時多傑在漢口傳密法自傳十九海七六時事大師回滬時上廬山收拾書物將海潮音移滬佛化教育社委陳秉良編輯五期起由唐大定編在山一餐而去自傳十七二十南北東西的海潮音十五年來海潮音之總檢閲會覺為編者說按自傳二次言及去年臘底上廬山但會覺謂在此年初夏彼編潮音至四卷而止自傳謂上山將海潮音遷上海編發是知大師誤憶是夏黃懺華初謁大師於上海之某寺分院晤對音儀一翻過去之誤會誓志追隨佛教各宗大意序黃懺華追仰太虛大師評寶明君中國佛教之現勢亦此時作勸其勿分新舊而以派別拘中有云晚唐來禪講律淨中華佛法實以禪宗為骨子禪衰而趨乎淨雖若有江河日下之概但中華之佛教如能復興也必不在於真言密咒或法相唯識而仍在乎禪大師新近覺悟中華佛化之特質在禪蓋即此意去夏天童講楞伽冬於蘇州講楞伽今春於居士林又有楞伽大旨之說應與特質在禪之心境有關惟禪之宗重有賴以身作則惜大師悲心所轉未之能從事也六月五日蔣中正任國民革命軍總司令出師北伐二十一日十二日圓映與寧達蘊張宗載等十九人自閩抵新加坡海七六時事七月大師再至杭州應佛學會請講華嚴經普賢行願品是月六日圓滿海七八時事大師在杭作建設人間淨土論致蔣慧雄蘇慧純二居士書緣起於山東臧貫禪之一再函請大師所論人間淨土之建設為世界佛徒聯合國際之組織與建設一佛化特區以資觀感惟中國佛徒毫無組織憑何與世界佛徒相聯合佛教未為社會中堅分子所重佛化特區必難得政府容認然則人間淨土從何著手建設是月大師應汪大燮熊希齡莊蘊寬胡瑞霖蔣尊褘梁密張相文等發起之北京講經會電邀進京海七八時事過南京時往訪蔣竹莊唐大圓於東南大學遇王隆中邀以偕訪孫馨遠傾談頗洽自傳二十大師主持之中華佛化教育社以是得其贊助覺乎否乎可以覺矣大師偕唐大圓入京寓安福胡同王驤陸所辦佛教閲經社二十八日六月十九在中央公園社稷壇開講四十二章經八月八日七月初一圓滿海七六法會啓事海七八時事是會聽衆簽名者二千餘人可謂極盛胡瑞霖重印四十二章經講録序周少如王尚菩黃通園駱馨吾筆記羅庸膺中整編為四十二章經講録法會圓滿日英克蘭柔夫婦梵文學者岡和泰日國本睦雅貢卻仲尼均來會分贈摺扇為紀念扇係法會特製由曹謙繪大師肖影汪伯棠繪洛陽白馬寺塔影莊思緘書四十二章經歷史湯定之繪社稷壇圖海七八時事特載按如此盛大法會自傳竟忘其事三十一日二十二日大師應彌勒院臺源請蒞院為學生略示唯識之名義海七八時事京中教育界就佛教閲經社組佛學研究會八月一日二十三日請大師講佛學概論聽者張怡蓀羅庸羅培常等均為各大學師生羅庸筆記成書海七八時事自傳二十論以因緣所生法為五乘共學三法印為出世三乘共學一實相印為大乘不共學條理佛法之義理為三階為大師晚年定論發表論華日當聯布佛教於歐美主以日本退還庚款為之文時大師將有南洋之遊因為宣傳歐美之籌備十五日大師與胡子笏等議設世界佛教聯合會北京辦事處於萬壽寺擬籌資先辦寰球佛教圖書館寰遊記一海七九時事按寰遊記作世界佛學院圖書館乃其後改名八月十九日七月十二大師回滬次日乘伏見丸南行去星洲海七十紀事初以去春廈門佛化新青年會會員蔣慧雄劍一蘇慧純鶴松黃慧玄謙六等皈依大師夏季南遊星島從事商業約轉道等籌組星洲講經會迎大師說法規模甚大希望甚遠自傳二十海六七通訊按自傳作六月底回抵淞滬誤海刊七卷十期紀事二十七日由滬南下七字疑衍或一之誤九月二日大師抵星洲歡迎至福州會館與華僑信衆相見大師為祝南洋佛教之聯合海七十紀事五日二十九日大師出席假座中華總商會之歡迎大會講略祛世人對於佛法之誤會海七十紀事六日大師應許公遂領事之歡宴席間議及南洋佛教聯合會之籌設海七十紀事十日起大師於新落成之維多利亞紀念堂開講覺世救人之佛法三日而畢自傳二十海七十紀事二十二日起大師間續於江夏堂開講佛乘宗要論大意維摩詰經大綱心經海七十紀事是月底大師以不慣熱帶生活致病自傳二十略史寰遊記一在星洲攝臥病影戲記以詩雙林橫臥日當空百萬人天罔測中死活一時俱示現一場遊戲亦神通大師在星洲遊宴演講不一而足陳嘉庚導大師參觀其橡樹園工廠商店胡文虎函詢有關佛法與商業四事面晤款談憩息其涼屋數日蔣劍雄蘇慧純等陪遊柔佛自傳二十大師受盛大歡迎於星島圓映適在星島某地而未曾晤面大師門下信衆間不滿圓映之言論啓大師與圓映晚年隔礙之始事以有記者往訪圓映以太虛法師學德何如為詢圓映意存輕抑告以太虛乃其學人消息既播致引起少數人不滿自此以前佛化新青年會通電列圓映之名海五八紀事江浙同學致書諸山長老圓映覆函願以追隨海五七通訊十四年夏天童推圓映為住持後未就武院學生致函稱賀海六通訊是冬出席東亞佛教大會大師函約圓映同行海六十二通訊大師與圓映雖風格志業不盡同然以昔年盟好大師及其學人未嘗不樂於引為同調自後日趨疏隙惜哉按圓映信衆傳有大師曾為圓映法子之說編者特訪奘老於天童三十七年十一月一日十月一日時圓映適自滬至天童奘老謂事出有因非光緒三十四年即宣統元年圓映大病數月奘老親為護侍圓映之病甚奇發則神情頓異纏綿欲絶時人視為鬼擾圓映亦自分必死間常哭語奘老從七塔寺慈運老和尚得法未曾傳出設一旦逝去法脈自我而斬何以對祖師且寧波老會館數載經營一旦付諸非人亦屬唐喪全功望太虛能接其法派願以老會館相交奘老以語大師大師不可奘老以為彼此友情素篤應通權允之稍慰其臨死苦迫之情如病愈圓映自當知其亂命分屬盟兄弟如何倒作師資而一笑了之是事奘老一手包辦圓映於病中曾書法卷字據與之字據有生西之後老會館交與太虛他人不得爭奪之語其後病竟愈當年或隔一年奘老將法卷與字據交還奘老又謂圓映長於太虛十一歲無論佛法與詩文大師出家之初俱對之大有助益且常有經濟援助云奘老率真對圓映友情更非泛泛其言如此應可信也十月八日大師出席江夏堂之歡送大會大師原擬遊歷宣化遠去歐美以不慣熱帶生活乃決意回國自傳二十略史寰遊記一海七十事紀十日國民革命軍克武昌佛學院及漢口佛教會均陷於停頓善因離佛學院返湘學院由大敬守屋佛學院院董會略史自傳十一十一日大師乘德加大輪船啓程回國與前廈門大學校長黃琬孟圭同舟傾談頗不寂寞自傳二十海七十一事紀十五日重九舟過香港大師偕黃琬登太平山頂次日曾星瑚等陪遊青山寺值寺中開戒寺主顯奇率衆歡迎請為開示自傳二十記歸舟過香港之所感從香港的感想說到香港的佛教十八九日晚輪過廈門會泉轉逢常惺王拯邦等來迎強大師小留曲從衆意上岸宿日光岩自傳二十海七十一事紀二十日過廈門經市場向南普陀寺沿途受盛大之歡迎洪鴻儒余超繆子才神田慧雲等預歡迎之行列至寺赴閩南佛學院之歡迎會自傳二十海七十一事紀二十一日南普陀寺柬約紳商學僧界領袖舉行隆重之歡宴與大師同席者林文慶周樹人魯迅孫貴定張頤真如沈士遠莊澤宣顧頡剛陳定謨羅培常繆子才等自傳二十人物志憶十魯迅對大師之印象為和易近人思想通泰孫伏園魯迅先生眼中之太虛法師陳定謨由是發心學佛按志憶以此為十八年歐美歸來事誤二十二日大師偕常惺蕙庭等赴廈門大學參觀應約為講緣起性空之宇宙觀常惺記自傳二十二十三日各界假教育會歡迎大師說法大師為講大乘佛法的真義為現實與精進海七十一事紀二十五日觀音誕大師往遊白鹿洞虎溪岩等海七十一事紀時有南普陀題石一律南海普陀崇佛剎虎溪白鹿擬匡廬千岩百洞奇難狀隕石飛星古所都水鳥皆談不生法雲林巧繪太平圖山獅十八驚呼起一吼當令萬象蘇大師抵滬之翌日送別日本之中華佛教視察團於輪中自傳二十法舫譯日本佛教徒之現代中華佛教觀由佛化教育社約集上海新聞界戈公振等大師發表南洋遊化之談話自傳二十十一月十四日大師應尚賢堂李佳白約講佛法應如何普及今世李氏譯之以載字林報其中論及天神創造說等之謬妄引起西人之難問大師復為文答之自傳二十愛之崇拜海七十二言論韓人玉觀彬因聽講而發心皈信大師名以慧觀自傳二十海七十二時事某星期日大師於尚賢堂講愛之崇拜李佳白以中國當時之反宗教運動由於缺乏愛之觀念大師乃謂不應盲從我執之愛愛亦為戰爭苦惱之因故應崇拜依覺悟人生萬物而起之大慈悲文其時大師電孫馨遠就其轄內宣傳佛化教育得孫氏贊許大師乃約王一亭劉仁宣張煌等會商決定五項辦法大雲七十四期後聯軍劉參謀催往講演大師攜默庵同行致默庵書十二月二十六日十一月二十二大嚴卒於寶華華山大嚴上人事略時大師有論賢首與慧苑之判教之作所論大乘三宗有以法性空慧為不了之意法性空慧宗顯空未具顯不空法相唯識宗無為真有為非真空不空具顯法界圓覺宗為無為皆真是年冬兩湖佛教陷於革命之大混亂中僧界組湖南民衆佛化協會以適時有佛法不是宗教擁護佛法即是擁護革命要以大慈大悲救人救世的精神努力革命等口號曉觀開悟等集僧侶千餘人一致加入國民革命會海七十二現代佛教史料然占寺奪産之風未曾稍戢時大愚掩關廬山痛心湘鄂贛間之大混亂悲心激切志求速得神通以救世自傳十一民國十六年一九二七丙寅丁卯大師三十九歲一月九日日人石井澄來滬視察佛教訪大師於佛化教育社海八一佛教時事月紀十六日大師開講佛之修學法於尚賢堂凡三講逢星期日李佳白致太虛法師書唐大定記大師對佛法之重要意見悉攝於此茲列為科目表以見一班絶對獨立之特德獨立與發展無限發展之自由佛學之根本精神緣起性空之和合和合與增上相應互資之增上聖心與凡識之異來源與施設應機與隨執之異佛學之特殊性質有漏與無漏之別無漏與離言著言與離言之別參用史實之考證考據與仰信尊重果覺之仰信修學之適當態度廣探教海之義理教義與宗趣尋究宗極之行趣時教難因革命軍事擴展而日益嚴重顯教大醒悅安等集詢應付辦法大師知僧伽制度論已失時效乃作僧制今論自傳二十一略史整理僧伽制度論跋定僧數為二十萬人合教區為五區析僧衆為長老學行服務尼四衆析信衆為皈戒研究女三衆論曰今佛化重心移信衆而時代趨勢又側重生計僧衆亦不能不為生利分子以謀自立於社會此七衆一者可廣攝學理之研究者二者可別開僧衆中之從事於資生事業者此依今此佛化衆情狀及適應現社會不得不然也按自傳與整理僧伽制度論跋以此為十五年或冬作中國佛教革命僧的訓辭及建僧大綱則謂十六年作十五年冬應是指舊曆說二月二日丁卯元旦大師於上海籌備之法苑舉行開幕禮章太炎王一亭謝鑄陳王森甫陳維東等並來參法會法苑乃本整理僧伽制度論而設立為一改良經懺除去其迷妄擴大其內容組織謀於此獲得經濟基礎以作新僧運動經濟之援助者為玉慧觀助理進行者為默庵悅安等自傳二十一海八一破天荒之新僧運動時革命風暴迫在目前大師不依僧制今論與研究佛學者相聯絡導一般僧衆從事資生工作乃欲藉改良愚迷陋習之經懺生活以謀發展似非善策使當年三民主義革命而真能實現則經懺決為取消而非改良也是年大師多與章太炎晤談章氏書陳白沙贈太虛上人詩句性空彼此無差別力大乾坤可跌交一聯以贈人物志憶二二十四日二十三日法苑之祈禱息災會開始凡七日大師略說楞伽大意時李開侁陳元白湯薌銘等並因戰事集滬時來法苑李開侁從持松修密自傳二十一薝葡集序海七十二時事海八二佛教時事月紀大師於法苑為張歆海及王森甫依佛式婚儀主婚引起舊派之猛烈反對甚或指法苑為共黨機關法苑之經懺來源因以大受影響自傳二十一退休僧致太虛法師書臧貫禪與唐大定往來書三月國民革命軍入上海南京南京法相大學解體內學院亦陷入窘境時張宗載西抵武漢忽以鋤奸會名義遍發傳單大罵僧尼誣加罪狀孫榮嘉致太虛法師書在漢口辦無畏月刊以涉及顧淨緣被捕多月自傳二十一樂觀為編者說佛化新青年會於是而息佛化新青年會初意未嘗無建樹之熱忱陳維東寧達蘊邵福宸始終未失信仰然以經濟來源之不正常佛教信解之不充分而大師又未嘗豫以堅強之領導乃於革命潮來灰飛煙滅大師感於政教之失序發表以佛法解決現世困難告強資階級以施捨告貧弱階級以戒忍告催殘道德文化者告保持道德文化者告毀壞佛教者告佛教內外護告保持道德文化者之言論可發人深省勿空言以保持道德文化為號召不發真切慈悲之意不求適宜方便之行徒以陳腐古板違時鳴高為保持則愈招反動之摧殘名為保持實銷滅之矣慎之勉之海潮音自第四期起由楞伽山民悅安編輯十五年來海潮音之總檢閲四月二日南京開始清黨時廈門南普陀寺住持會泉任滿大衆感於僧寺之危機因常惺推薦公舉大師為住持轉逢常惺轉岸來滬禮請法苑適陷於維持為難遂允就其請而法苑宣告結束自傳二十一常惺法師塔銘并序海八四五佛化時事雜記大師偕常惺先去福州謀定護持福建僧寺之本晤方聲濤陳石遺等語以維護軍政當局歡宴大師於功德林大師為說信仰佛法與從事革命之相成為軍政當局開示值胡任支因得李子寬基鴻了空從中調護閩省僧寺稍安大師在福州應青年覺般若社圓覺學社等信衆之歡迎兼遊鼓山怡山諸勝自傳二十一海八九雜記二十九日三月二十八日大師於廈門南普陀寺行住持進院禮兼任閩南佛學院院長寺務以轉岸覺斌為監院轉逢為都監以統理之自傳二十一海八四五佛化時事雜記大師為閩院員生講行為學與唯根論及唯身論蕙庭記大師不滿行為派心理學之強調行為以代替心理以其為佛法之大障特引楞嚴之唯根論范縝神滅論之唯身論明行為心理學近似於佛法然此為不了義說究竟則為阿陀那識為本之唯識是年一月大師有行為學與心理學之發表冬有再論心理學與行為學候爾特意識學與佛學之作大師於唯物論之行為派心理學嚴切注意如此五月初七日前大師回滬自傳二十一葉青眼致太虛法師書六月五日大師於上海作說革命文大師時撰以大同的道德教育造成世界和平將偕陳定謨出席坎拿大之世界教育會議進而遊化歐美由楊明塵兄弟及南普陀寺助以旅費瀕行以事未果乃託郭秉文代為提出寰遊記自傳二十二文此為理想教育之又一型雖緣飾於禮運之大同孫中山之天下為公而目標則仍在佛教宗教修養即大同的道德教育之綱骨修養之究竟莫過於圓成正覺普濟群生是年夏謝慧堅鑄陳編成太虛法師文鈔初集凡三編雅言世論佛學交中華書局印行無言太虛法師文鈔初集跋大師約晤胞妹於上海敬心寺時止安將往廈門於敬心寺親見之止安為編者說考自傳原稿於生母病卒下有母親遺在李家的三個弟妹也更無消息在民國十六年偶過長安聞一熟人談及書至此即勾去之大師必從是得弟妹消息故一度約晤七月大師至杭州靈隱寺休夏得住持慧明監院玉皇之厚遇自傳二十一時歐陽竟無發表論作師一文主在家得為出家者之師得受出家者之禮拜大師不以為然作與竟無居士論作師決言住持佛法為出家者之責結論云於穢土中七衆律儀大小共遵非別出家在家即為小乘而大乘無出家在家之分宜也於此七衆律儀不惟住某衆不守某衆戒條為毀犯其住某衆不安某衆之分如以近事凌躐比丘尤為毀壞七衆全部律儀亦即為毀一切菩薩律儀故具大悲方便而護法護有情者此宜知慎大師編佛法救世主義亦名淨化主義十九為剪裁舊作綴輯而成論以心的淨化立志修行成德器的淨化衆的淨化為次時大師休夏靈隱靜居觀物變渾欲入山深詩存態度頗為消極潮音編者云海八八圖友人造訪歸來言法師近似抱有消極之觀念嘗曰今佛法既衰僧亦不振外摧內腐其何以自存哉余雖力竭聲嘶其奈如聾若啞之僧徒何七月十五日武漢政府反共八月十二日蔣中正辭職下野夏秋間浙江省府有逐僧之議上海程雪樓施省之王一亭等組佛教維持會向當局呼籲追念王一亭長者時弘一在杭致書有關當局推薦由大師與弘傘出為整理林子青弘一大師年譜九月蔣中正電邀大師遊奉化雪竇寺黃膺白時稱道大師於蔣氏之前因有此約大師抵雪竇與蔣氏長談竟日因相偕及吳禮卿張文白遊千丈巖翌日十日中秋大師寓溪口文昌閣相與賞月為蔣氏夫婦經國之母及張吳等略說心經大意自傳二十二詩存大師即景賦詩有千古相知有明月一生難忘是中秋句國民政府下之佛教得以從狂風暴雨中復歸安定得以泄沓混日確與此夜此人有關大師和玉皇贈蔣歸隱詩以贈詩存黨國安危繫青山未是歸出曾驚鬼侮退豈貽人譏此日藏雲豹他年縛海豨大雄能大忍莫使素心違十一日大師返甬致函申謝並告以赴歐美遊化之意蔣氏因囑陳果夫以三千元為助自傳二十二寰遊記二十七日九月二日大師於廈門主持閩院秋季開學禮時常惺以王竹村邀先於暑期離閩赴滇弘法教務由蕙庭主持會覺滿智為教師自傳二十一常惺法師塔銘并序海八十佛化新聞大師留廈期間於閩院講救僧運動談玄記大師極言住持佛教必須有出家的真僧所論救僧之道積極則真修實證以成果捨身利衆以成行勤學明理以傳教消極則自營生計以離譏嚴擇出家以清源寬許還俗以除僞帝主於神民主於佛之根據亦此時講十月十四日觀音誕大師致書常惺勸以勿去西藏學密融攝魔梵漸喪佛真之泛神祕密乘殊非建立三寶之根本經書十倍華土聖證多有其人藏僧誇言未堪保信且試探藏密僧俗已有多人法師自可遊心三十七菩提分法以之奮追千古宏範三界何用門頭戶底去依傍之也因有相知之雅敢盡進言之責非太虛不能言此非法師不足信此若息緣之處則泉州雪峰亦上選也願法師決之大師偕會泉陳定謨遊漳州南山寺訪白雲巖朱熹解經處自傳二十一詩存時湘省佛教以唐生智老師顧淨緣組佛化會秋初辦兩湖佛教講習所強力接收寺院財産逮捕住持槍殺佛學院學生素禪全湘騷然逮唐以十一月下野佛化會解散僧魂乃得稍定海九三通訊十月大師回杭住靈隱寺潛心著述撰現實主義自傳二十一後改名真現實論且以當時編集為真現實之宗依編本論規模宏大極其量足以貫攝一切佛法破攝一切世學大師獨到之思想多含攝其中其以現實論為名蓋深有苦衷如救僧運動云今時從唯物論産生出來的科學思想根本與佛教異趣現代最普遍之思想則有人本主義與實驗主義這二種立足在人身眼耳鼻舌所能見能聞能嗅能味之上佛法以心為本而所說的三世因果五趣流轉幾成為他們射矢之的大師為此而論現實論徹底之現實即當前具體之變現事實而析其因素現變實事無始恆轉因素非事變外故不得執色等質素為本以成事據此變現事素而明實性現事實性無性緣成實理非事素外故不得執實理為本以起事即此現事理性以如實覺現覺實性無相真如則如理實證不偏不謬本此現覺以觀實變現覺實變無元心樞則變非心外乃顯無元心樞之不思議現實此本現實如是而唯佛能實證實說唯佛法能盡現實之量大師如此以成立以心為本之佛法進言之則唯佛法乃為真現實如云何謂現實主義乃佛陀無主義之主義耶除佛陀外莫不為非現實而有主義之主義故宗教執唯神故哲學與科學執唯我或唯物故實驗主義或實際主義實用主義又現實主義實證主義似為現實主義然未脫唯我或唯物之執孔家哲學似為現實主義然未窮現實之量而猶有拘局故唯佛陀為無主義主義之現實主義者而現實主義雖鏡涵萬流含容一切要非佛陀不足以正其名義也以簡別世俗現實主義故名曰真現實論十一月基督將軍馮玉祥下毀佛令河南佛教被摧殘殆盡十二月大師著自由史觀為大師名作之一大師謂第三活動系有情完備聚散變化死限生殖永續統攝自覺進化之四潛能也故有充分自由活動而表現為有情類也動物而至人類其自由性遂臻高度然其被囚之桎梏猶在焉得身體而生也則為身體饑寒淫疲病死所因依社會而存也則為社會制度習慣風尚所囚藉根境而知也則為心境時空名數事物所囚故吾人正當之所為唯自用自由源泉之心知活動自解放重重被囚之桎梏以增進其自由而完成其自由之本性耳大師以為專權而反自由之原理為唯神唯我唯物近代史上之自由運動為唯神唯我唯物之各式帝國主義所障礙而未能完成故應以佛陀現實主義之自由原理四真觀境八正道行三德藏果而完成之其要在創建自由史觀之世界教育社會經濟國際政治而真社會主義之經濟與真民治主義之政治皆待真共和之世界教育而成功此項思想蓋仍民元來社會革命觀點而完成之自傳四是冬明春大師多評論世學之作評郭沫若論文化評邁格文佛家哲學通論說四度以上的事論韋爾斯世界史綱評渡邊秀方中國學術史概論東方雜志短評四則評胡適戴震哲學等大師於論世界史綱提出無始進化說有其獨到之見其法應剖三史曰人文史曰地質史曰天體史以現今實際之人物地球星系天空為立足點從作史之年逆推而上先廣搜地球人類一切文語傳記旁參諸現存之古剎古物為材料細心推析以忠實之純客觀察果求因以敘其後先之變嬗上推至無復文語傳記而止約六千餘載曰人文史從是石器岩層更上推之曰地質史遠至地球由日裂生與各星及天空中無數恆星系且觀此太陽系未成以前此處為一空洞無物之以太電子界曰天體史於是為察因求果之推斷結論今此地球人類之果由若何演成并預言今後之人物地球當若何以至今後此一太陽系終當壞滅再為空洞無物之以太電子果如此則世界為無始恆轉之世界不斷流轉於成住壞空之歷程進化僅為片面之真理時吳稚暉受梁漱溟等影響誤會佛法以佛法為人死觀大師特致長函與論佛法及政治書發表告徒衆書大師初冬有海潮音停刊之議徒衆多有籌商維持者大師因指出佛教運動之重大危機為俗之僧奪僧之俗變而告覺社以來之根本主張夫此佛法救世運動之失敗舊佛徒不足責獨責出家在家之新佛徒昧於分宜耳在家新佛徒昧其分宜不及者則腐化僻化於舊僧於是遂欲以齊公齊婆放生念佛了之或由有錢及欲發財以過安閒生活了之江浙之在家佛徒比比然也太過者則以僧之無能而不足崇也欲奪住持佛教之僧位而代之為法相真言之學者又比比然也殊不知其分內所宜為者當上摧隱逸之僻化下破迷俗之腐化敬佛法僧信業果報以安定心志行十善法作四攝事以立身處群出家新佛教徒昧其分宜不及者亦腐化僻化於舊僧遂欲以當寺職充院主了之或欲以逸居無事念佛等死了之太過者則唯知以辦學宣傳服務作工為事而欲取僧之寺院産業皆化為基督教青年會式而後快無法以達之也則紛紛退僧而返俗以自尋其新式之生活殊不知其分內之所宜為者固當以持戒忍辱苦行為本深入僻僧中以自為出世之修證而開發彼為法為衆之悲願深入腐僧中以潛行應世之教化而引起彼求學持戒之慚愧覺社以來對於佛法之一貫宗旨即三寶觀今摘其第一項佛之根本觀念必在釋迦牟尼佛一切經律皆源本佛所宣說之聲教由佛徒歷次結集而成者勝義僧寶雖在三乘聖衆或賢衆中但此土之住持僧寶必在出家五衆尤在苾芻衆海潮音後得泰縣信徒錢誠善王誠普發心移泰縣居士林編發第九卷得以續刊第九卷海潮音續出之新希望民國十七年一九二八丁卯戊辰大師四十歲一月九日大師一度來滬與玉慧觀山田謙吉等作中日佛教徒聯誼之聚餐希豫創辦中之寰球佛教圖書館以協助海九一佛教史料大師度舊年於祖籍之崇德明耀古華法子為佛性說今存崇德訪古華禪兄詠福嚴寺四景詩存時大師心情陷於極度失望大有民初光景出關來以佛法救世之雄心民十受挫於淨慈知憑藉禪林以改進之不易十三年再受挫於武院知憑藉信衆資助之不易革命洪流澎湃而新起之法相真言學者唯日爭住持佛教之分新起之出家衆則唯宣傳虛囂而甚或離佛以去何以適應大時代而扶佛法大師頗有捨僧入俗之意趣十六年過長安夏約晤其胞妹茲又度舊年於崇德大師與故鄉俗眷而生關係唯獨此年貫串以尋不難見其心跡且此固大師所明確論及者如告徒衆書云就出家之新佛徒言余近在閩南演說之救僧運動一真修實證以成聖果二獻身利群以勤勝行三博學深究以昌教理就在家之新佛徒言能有一領袖以團結之皆十善菩薩為中心的新社會之骨幹也余則徘徊瞻顧於積極救僧運動之第二獻身利群第三項博學深究或轉身從事於十善菩薩行猶待觀機再為選定焉或轉身從事十善菩薩行即入俗之意然大師信願真切決非一般捨佛之類就大師觀之佛法唯是隨宜適化如出家而有益於佛教則出家使在家而更有益於佛教則在家出家在家胥視適應而異而其本則造次弗離了解大師對於佛法之心境此固無可非議者也二月十二日正月草一日武昌佛學院院董會改組推王慧力森甫為院董長海九二武昌佛學院新生命按佛學院院董會略史誤以此為十八年事十四日立春有感詩存微雪明明見寒雲密密封遠山增黯淡流水自叮咚人已度新歲天猶帶舊冬乾坤不終蟄一震起潛龍是月大師命大醒芝峰先後去閩南佛學院主持學務去冬閩院發生學潮會覺離院去南山寺蕙庭解決乏術事態惡化寺務院務均陷停頓蕙庭及學生代表傳戒巨贊來杭迎大師大師委大醒芝峰往為整理下學期始復正軌其後數年中閩院遂為大師教育事業中心自傳二十一略史大醒會覺巨贊為編者說大醒去廈門不久編行現代僧伽多涉人之臧否為老派痛心如淨心致大師書云舊派意見不難化除而新派恐非易融洽昨閲現代僧伽一書批評諦老印老及王一亭黃涵老等任意汙謗云是豬頭長老蛆蟲居士按自傳以蕙庭離廈至夏初閩院發生學潮全誤又鬧學潮之主要者為懷璞悟開自傳所記之慈航談玄等實無多大關係蓋大師未曾親處其事僅泛憶有此幾人耳是春大師仍住靈隱德人衛禮賢於佛郎府大學組中國學院函聘大師為院董並請往講學自傳二十二寰遊記按自傳以此為去年秋冬事今姑依當時之記一月蔣中正復任總司令職春遊杭之靈隱與大師玉皇卻非合影以為紀念自傳二十一海九三圖按此照片流傳甚廣不知何人剪去卻非僅留二人相三十七年編者親見三人合影照相於靈隱寺程演生趙壽人過靈隱相訪詩存外集暮春一別十年之老友昱山重晤於靈隱盤桓三日人物志憶九大師和其韻三首詩存一云春滿湖山花滿林連朝陰雨阻探尋老天不解如人意何日方能慰此心儻得狂風騰虎嘯盡教枯木作龍吟浮雲掃卻晴空現湧出紅曦換緑霖大師於失望中雄心猶昔與前立春有感詩同昱山贈詩慰之詩存外集性定曾經悟上乘卅年鍛鍊更相應青蓮火裡光華燦信是人間第一僧佛法雙肩早自承青年逸氣逐雲騰道宏世濁相知少歐海波瀾展未能時大師集抉擇大乘或抑或揚以導歸中正之舊作編為大乘宗地引論交光華書局發行是春多評內院之作生活與生死對呂澄印度佛教史略作論掌珍論之有為空量對呂澄因明綱要作再論唯識與法相對歐陽竟無攝大乘論大意作三月內政部長薛篤弼有改僧寺為學校之議海九四佛教史料中大教授邰爽秋有廟産興學之具體方案擬向全國教育會議提出常惺僧界救亡的一個新建議僧界大受震動現代僧伽社等呼籲反對大師以中國信佛的革命民衆領袖名義發表對於邰爽秋廟産興學運動的修正時革命空氣尚存即專志淨土之印老亦考慮僧制之整建謂佛制固不可不遵而因時制宜之道亦不可不亟亟研求以預防乎世變時遷海九二然時佛教猶無政府認可之合法組織交涉殊感不易四月二十一日大師作對於中國佛教革命僧的訓詞大師計劃之佛教革命方案我的佛教改進運動略史曾略述謂最根本者為革命僧團之能有健全的組織其宗旨為一革除甲君相利用神道設教的迷信乙家族化剃派法派的私傳産制二革改甲遁隱改精進修習化導社會乙度死奉事鬼神改資生服務人群三建設甲依三民主義文化建由人而菩薩而佛的人生佛教乙以人生佛教建中國僧寺制丙收新化舊成中國大乘人生的信衆制丁以人生佛教成十善風化的國俗及人世就其建設次第稱為三佛主義佛僧佛化佛國即建設之乙丙丁三項大師首重建僧故極力抨擊拋棄佛僧主義而空言佛教之社會化如云中國的佛教革命決不能拋棄有二千年歷史為背景的僧寺若拋棄了僧寺以言廣泛的學術化社會化的佛教革命則如拋棄了民族主義而言世界革命一樣危險大師自謂訓詞本以作革命僧團運動之綱領者惜為大醒芝峰公開發表致革命僧團未曾實行組織略史二十三日沈嗣莊以克魯泡特金譯稿相訪因作克魯泡特金的人生善行學一般所稱之倫理學人生哲學道德學大師以為名人生善行學為當文大師應之江大學約講生命之研究春杪大師病神經痛移滬醫治自傳二十一五月三日日兵於濟南造成慘案七日陷濟南大師以中國全國佛教會議代表名義與瑩照致電日本佛教聯合會望其勸日本當局撤兵致日本佛教徒電時大師在滬發起全國佛教徒代表會議主消除僧界之歧見新舊之爭容納各種提案成為全會決議然後成立佛教統一機構以資執行恭告全國僧界文時江浙有江浙佛教聯合會之組織圓映入京請願葉性禮圓映老法師事略大師應上海儉德儲蓄會請講人生的佛學以後人生佛教之甚多講述內容不外乎此佛法雖普為一切有情類而以適應現代之文化故當以人類為中心而施設契時機之佛學佛法雖無間生死存亡而以適應現代之現實的人生化故當以求人類生存發達為中心而施設契時機之佛學是為人生佛學之第一義佛法雖亦容無我的個人解脫之小乘佛學今以適應現代人生組織的群衆化故當以大悲大智普為群衆而起義之大乘法為中心而施設契時機之佛學是為人生佛學之第二義大乘佛法雖為令一切有情普皆成佛之究竟圓滿法然大乘有圓漸圓頓之別今以適應重徵驗重秩序重證據之現代科學化故當以圓漸之大乘法為中心而施設契時機之佛學是為人生佛學之第三義六月二十三日大師應蔣總司令之邀以大師電告放洋日期偕瑩照自上海赴南京寓毗盧寺謁蔣於總司令部翌日偕遊湯山大師談及佛學為世界人類最高理想之表現其救世之精神非其他學術宗教所可及必適應時代之思潮國民之生活方可推行無阻際此訓政伊始百度維新之際最好能組織一能統一僧俗兩界之佛學團體俾收民富國強政修俗美之效蔣氏贊同其說因為作函介紹往晤談組安蔡孑民鈕惕生薛子良篤弼王儒堂正廷李協和烈鈞張子珉靜江諸氏洽商進行自傳二十一略史海九五佛教要聞按佛教要聞謂大師與蔣氏同車晉京蓋傳聞之誤七月二十八日大師於南京毗盧寺成立中國佛學會籌備處開預備會三日此即得蔣總司令介紹訪晤之成果初擬稱佛教會以蔡孑民張靜江等謂此時不便提倡宗教以設立佛學會為宜至此國民政府下中國佛教始有正式組織雛型尚不能揭出佛教名義其艱苦何如會中決議推觀同惠宗王一亭為籌備主任成立佛教工作僧衆訓練班遠行及唐大圓負責編中國佛教旬刊由寧達蘊負責恭告全國僧界文中國佛學會會名說明略史海九八佛教史料其間大師發恭告全國僧界文告以決先組佛學會催開佛教徒代表會議大師列舉意見且告以即日出國佛教會事希各方好自為之文時大師為維護佛教先後多所論述佛教僧寺財産權之確定條陳整理宗教文為禮制官制致薛部長書呈五次中央執監會國民政府請願文八月一日大師在南京毗盧寺開講佛陀學綱凡三日而畢李烈鈞來參預法會黃懺華寧達蘊記文注略史學綱雖簡單實集大師思想之綜匯大目為一原理現實主義法爾如是二動機平等主義大慈悲三辦法進化主義由人生成佛四效果自由主義無障礙大師回滬偕陳維東訪問證道學會陳維東證道學會訪問記十一日大師偕譯人鄭太朴松堂趙壽人乘安特雷朋號離滬西遊民國十四年以來籌備之遊化歐美至此乃告實現先一日王一亭程演生張君勱李國杰黃警頑吳貽芳等為大師餞行於滄州別墅與會士女六七十臨行孫厚在趙充和黃警頑黃懺華謝鑄陳大醒等來送別為大師介紹歐美友人者英人克蘭柔德使卜爾熙外蔡孑民張君勱胡適之程演生王正廷金純儒等自傳二十一寰遊記海九七法界通訊海九八佛教史料十四日晨舟過香港登岸訪老友潘達微及證道學會寰遊記由上海至西貢一瞥從香港的感想說到香港的佛教十七日舟抵西貢留三日寓大觀園南圻日報總編輯陳肇琪來訪意致殷勤邀往李卓人家午餐參觀中法學校晤校長羅珀寰遊記由上海至西貢一瞥按由上海至西貢一瞥以李立卓人為校長誤十九日晚船復行同舟有英人翰密登美人希爾筏精研佛學將往暹羅出家大師乃約與深談寰遊記二十二日過星洲中印兩佛教會代表胡治安黃錫權等及轉道瑞于諸師來歡迎赴中華佛教會演說旋即登輪復行寰遊記海九九消息約經五日舟抵錫蘭哥侖布大師登陸參觀佛寺及佛教大學寰遊記九月經蘇彝士運河泊南口大師偕鄭趙二君登陸遊埃及首都之開羅渡尼羅河大橋至古開羅觀金字塔之雄勝寰遊記十一日船入地中海先時路式導江鏡如張作人等發起中華國民同舟會大師為撰緣起至是正式開會會後編同舟録十三日大師復為作後序寰遊記阮毅成彼岸是行凡月餘大師不病風浪日與同舟華人晤談若路式導阮毅成何鋭濱孫世傑張作人等加爾各答大學教授達塔信釋迦為聖人與談特多寰遊記阮毅成彼岸十四日晨舟抵法之馬賽東方文化學會趙冠五來迎相偕乘車過里昂翌晨遂抵巴黎寰遊記海九九消息按寰遊記作十五日抵馬賽消息作十四日抵馬賽而大師致海潮音社書則云今已至巴黎二日矣九月十五日書則是十三日抵馬賽三說互異今謂十四日抵馬賽為正至巴黎已二日殆即至法國二日之意十六日大師偕丁雄東首訪中國駐法使館余乃仁假法人俞休將軍第設蔬歡宴大師席間大師發表西來講佛學之意趣寰遊記海九九佛教史料一歐人所知之佛學之偏謬僅知小乘上座部巴利文一派之偏狹用歐人歷史眼光考證之謬誤譯大乘經典一二麟爪之偏謬二歐人未知真正佛學梵文大乘淪沒不全藏文亦偏蔽於混雜婆羅門行法之密教真正佛學今僅存於華文及華人之實證者歐人鮮能暢達中國文語精研佛學及虛懷訪問於佛學有實證之華人三歐人今有聞真正佛學以實行修證之根基以哲學之批評及科學之發明已漸摧神教及空想之迷執而接近佛學所顯示之宇宙人生實相犧牲一切以專心試驗求證真實及向變化中前進以期造成美善之果習於有組織有規律之社會生活能輕身家以為國群民族人世之公益四對歐人信受佛學後之期望以堅忍勤勇之精神於佛學得成實行實證之效果以哲學的科學的方法洗除佛教流行各時代方土所附雜之僞習而顯出佛學真相以有組織有規律輕身家重社會之品德能闡揚佛學真理以普及世界人類造成正覺和樂之人世五在歐講佛學之態度當仁不讓以攻破偏謬而顯示真正及時無間以應赴根機而實現期望開誠布公以待求真正佛學者之訪問歐洲今富聖人之才而缺聖人之道吾人今有聖人之道而乏聖人之才有道乏才則不足以證其道富才缺道則不足以盡其才得聖人之才以授聖人之道是為吾至歐講佛學之總意趣旬日間頗為閒適余乃仁趙冠五崑崙馬古烈輩時導大師遊巴黎名勝一一紀之以詩寰遊記詩存某日東方語言學校校長馬古烈為大師約諸東方學者設茶會於東方博物院寰遊記二十七日東方文化學會邀大師講學於巴黎哲人廳題為佛學與科學哲學及宗教之異同胡詠麟譯語周逸雲徐公肅記次偕胡詠麟趙壽人赴齊代辦駐法使館之歡宴同席者有劉文島巴黎大學教授葛拉乃東方語言學校校長卜也寰遊記二十八日卜也約往參觀東方語文學校為大師介紹與法國天主教大主教相晤見論及中國之反宗教運動及信仰自由問題寰遊記是日卜麗都女士造寓相訪以聽講發心學佛乞受皈依乃名以信源日人友松圓諦藤岡正隆山口益大谷馨淺野研真岡本貫瑩等亦相偕來訪寰遊記二十九日大師參觀東方博物院院長阿甘導觀說明寰遊記是月國內佛教仍一無起色一日佛學會常會議決另設佛教會致寧達蘊書蓋以南京會議時圓映猶多和同逮返滬為滬杭名流居士所包圍競主佛會設上海覺園便於控制南京設辦事處佛學會分子乃主別設佛教會保留佛學會以觀其變聞黃懺華說王一亭致書鍾康侯亦謂佛會應設首都以設覺園為不妥海九十一佛教史料前此本有江浙聯合會之設是時居士全體辭職一以常務辦事者多為居士二以浙江諸山別有興樹為江蘇方面所不滿海九十一佛教史料王一亭以維護佛法面請於蔣總司令蔣謂海九十佛教史料一真正依佛教行持的僧徒可以保存二藉教育以造就有知識的僧徒可以保存三寺院須清淨莊嚴不可使非僧非俗的人住持且對於社會要辦有益的事業可以保存政府於佛教固豫以新生之機其如老上座名居士之別有會心乎十月某日胡詠麟為設茶會於某旅社因識中國法律顧問愛斯嘉拉始談及發起世界佛學院事愛氏以告葛拉乃葛邀大師過其家商議寰遊記九日陳濟博自比利時來見大師寰遊記十日國慶中國駐法公使館招待外賓大師被邀出席晚大師應國民黨駐歐總支部招參觀慶祝寰遊記十一日法國信佛者馬格爾里維也等來訪大師語以組織巴黎佛教會以聯絡信佛同志寰遊記十四日應法國各界請於東方博物院講佛學之源流及其新運動院長阿甘譯語寰遊記講稿分佛學的發源佛學在印度的流行佛學在中國的流行現今佛教在世界上的三個中心余之佛學新運動五日論佛學在中國的流行揭露大師對於中國佛學之激賞從中國民族第一流人士自尊獨創的民族特性以達磨西來的啓發前不見古人後不見來者而直從釋迦未開口說法前的覺源心海打開了自心徹天徹地的大光明藏佛心自心印合無間與佛一般無二的圓明了體現了法界諸法實相即身便成了與佛陀一般無二的真覺者然後應用一切方言的俗言雅語乃至全宇宙的事事物物活潑潑以表現指示其悟境於世人使世人各各直證佛陀的心境此為佛學之核心為中國佛學之骨髓唯中國佛學握得此佛學之核心故釋迦以來真正之佛學現今唯在於中國論及余之佛學新運動舉其特色為人生的佛學科學的佛學實證的佛學世界的佛學大師法音既播報章多對之有好評寰遊記十五日訪法國有名印度學者新自日本歸國希爾筏勒肥與談發起世院事寰遊記其間曾任駐華法館職德禮克之夫人發心為大師畫像永留法蘭西畫苑為紀念寰遊記二十日大師召集巴黎友人於東方博物院商世界佛學院事宗旨為昌明佛學陶鑄文化增進人生之福慧達成世界之安樂發起人太虛法國為希爾筏勒肥阿甘葛拉乃胡雪愛斯嘉拉馬古烈臘爾華伯希和馬格爾龍舒貝勒等二十餘人商定設通訊處於東方博物院大師先付五千法郎為籌備費寰遊記由大師擔任中國南京毗盧寺設中國通訊處並邀集發起人告海內佛學同志書大師乃發告國內佛學同志書致蔣總司令書報道經過而希望奮起提倡二十一日大師講演於靈智證道通神學會講有情與流轉之進化信源及胡詠麟覺始譯語寰遊記海十一佛教史料大師在巴黎更有靈智學會初講之佛學一臠佛教美術講演會所講佛法與美胡詠麟譯語講稿今存巴黎大學講演會所講中國禪宗葛拉乃譯語海十一佛教史料並遊記所未詳大師之講演辭由巴黎佛學會出版之講演集英文英人擺乃能為之序埃而剛書店編譯之佛學法文晦謬幾不可讀記關於佛學之演說覆巴黎佛學會書二十二日大師設茶會答謝中外友人之盛意致告別辭寰遊記二十三日大師偕馬古烈陳濟博自巴黎抵英之倫敦寰遊記按陳濟博追記與羅素先生之談話時日遲寰遊記一日今依記二十五日大師訪中國駐英使館陳秩三代辦寰遊記二十六日大師赴三真社印人達斯果菩塔之約略講我之佛化新運動于焌譯語別有講耶回印度教義者有混融各民族各宗教之偉觀寰遊記海十一佛教史料二十八日應大英博物館東方文書部賈爾士之招偕馬陳同往參觀閎富堪稱第一寰遊記二十九日賀雪夫人邀大師赴美以美會之紀念大會晤大主教及內閣總理鮑爾溫旋由賀雪夫人牛津大學教授蘇息爾陳秩三代辦偕赴東方文字學校應中國學會講演之約大師講佛法之過去現在及將來于焌譯語寰遊記海十一佛教史料按中國學會之講演寰遊記作二十六日又作二十八日然依記推尋應為二十九三十日魏士特敏士特寺長福克士立樂立邀大師往寺參觀茶敘寺為英皇加冕處歷代英后咸葬於此是晚大師與倫敦佛教會長亨佛利士公開講演佛學與某社寰遊記十一月一日章士釗來寓訪晤談東西文化寰遊記大師遊觀所得乃知東方文化一名所指極廣決非舉一二種可為之代表亦非立一二種概念如所謂西方是物質文化東方是精神文化等類所能說明東方文化正名三日大師以蔡孑民之介得羅素電約偕陳濟博訪於海濱之山舍寰遊記陳濟博與羅素先生之談話其談話略云師吾為研究佛陀所說大小乘法之理論者於先生之學說亦頗曾涉略喜先生之卓見迥不猶人今日深幸得與先生一談羅吾亦思研究佛學但恨未能耳不知吾之哲學與佛學有相同之點否師先生之哲學頗多與佛學同點先生既祇認有如飛而遊之感覺與感覺今有而又創說有中立特體此之中立特體其即感覺或感覺今有耶抑為感覺與感覺今有之下更根本之另一法耶若為另一法則有違只認有感覺與感覺今有之主張若即感覺與感覺今有則何須更說此中立特體焉羅此問題吾尚在思考中猶難更為決定師先生所謂之中立特體為各各獨立存在之非因緣生法耶抑與若心若物等同為因緣所生法耶羅此中立特體是否亦為因緣所生法乃如旅行到荒漠中尚未能決定其方向一樣師若中立特體為各各獨立存在之非因緣所生法則近於佛學中小乘一切有部之實有法若亦為因緣所生法則近於大乘緣生性空之法此有小乘之阿毗達磨毗婆沙論及大乘之中觀論等主張其說似可供給先生之解決前二問題之參考先生亦曾研究之乎羅吾於佛學書只看過幾冊英文譯本所舉二論恐唯中國文所有惜不能研究之吾昔年遊歷中國知中國為今後世界中極有希望之一國大師新從中國來中國之政治情形可言其大略乎師據吾離開中國時所知者以言則中國已統一於國民黨政府內部能融合一致而不分裂則中國從此走上安內攘外之政治軌道四日大師應摩訶菩提會倫敦分會祕書達耶海瓦維塔恩之約往講小乘與大乘之關係陳濟博譯語大師勉以為世界佛教聯合之組織寰遊記海十一佛教史料五日晚赴倫敦佛教會講佛學聯合研究之必要曾憲孚譯語并議定該會所出佛學月刊任傳譯中國佛學之責由會長亨佛利士任聯絡英國佛學界籌設世界佛學院倫敦籌備處寰遊記海十一佛教史料今存倫敦無線電臺廣播之告全球佛學同志疑即此晚所講六日大師偕陳濟博抵比京寰遊記七日訪王公使景岐偕赴中比友誼會之聚餐會大師與王公使比駐華公使華洛斯國那社社長泰士合影寰遊記八日大師偕陳濟博應齊爾教授之約晤會見梵文教授杜門希臘文教授格列古爾波多大學哲學教授兌生星洲新國民報記者胡鑑民大師與齊爾談其自由哲學與大師自由史觀意見為近翌日鑑民以所譯自由哲學來大師因為之作跋鑑民作太虛法師在歐州載於星洲日報介紹大師學業頗致推崇寰遊記跋齊爾博士所著自由哲學鑑民太虛法師在歐洲九日應東方學會約晤會長普善荷蘭佛學者費式爾等寰遊記十一日參加王公使夫人發起之海外拒毒後援會成立會寰遊記十二日大師與陳濟博訪滑鐵盧之古戰場觀戰地寫真之油畫寰遊記十三日應東方學會之茶會費式爾贈大師以菩薩地經殘片梵文法文華文之會譯寰遊記十四日鄭松堂以德國佛郎府大學中國學院衛禮賢院長之函來迓寰遊記十五日費爾式來寓咨訪佛學大師為略說成唯識論大意是晚大師偕鄭松堂太朴乘車去德王公使等均來送別寰遊記十六日大師抵德之佛郎府寓雷博爾脫私家宿舍幽靜閒曠乃暫息征塵寰遊記十七日晤衛禮賢商定鄭君為大師譯華成德編書交敏興之雪洛斯書店出版中國學院學員詹顯哲常來為大師譯語寰遊記某日大師訪詩人歌德之遺屋寰遊記某日達姆斯達德城之開在林伯爵得張君勱介紹函約大師往遊開氏於佛學頗有所見大師與談禪宗寰遊記與德人談話鱗爪二十九日大師講身命觀與人生觀於佛郎府大學衛禮賢譯語聽者六七百人多半為該校員生大師舊識卜爾熙公使亦專誠來聽是講稿以緣起之和合相續為身命而以唯識中觀義說之德人讀此稿多有來函商討者寰遊記按海刊十卷一期佛教史料講題作佛陀哲學原則誤十二月一日大師偕衛禮賢詹顯哲去敏興寰遊記按海刊十卷一期佛教史料謂大師於敏興中國學院講佛學大綱衛禮賢譯語實為衛君代講之誤五日大師返佛郎府寓中國學院常占一室以誦經寰遊記十二日晨大師著衣誦經次卜爾熙公使來卜使約大師及衛禮賢作萊茵河探勝之遊與卜使談及國際間相忌相侵終無以得人世之和樂寰遊記與德人談話鱗爪十四日大師講演佛學之變遷大勢及其新傾向於中國學院衛院長譯語聽者二三百人皆熱心東方文化及哲學與佛學之研究者寰遊記海十一佛學要聞其間大師與衛禮賢商決以中國學院為世院之德國通訊處招集發起人於院刊譯載中文佛經寰遊記十七日晚詹顯哲陪大師赴萊勃齊應海里士萬燦之教授之請至則時值寒假乃改訂後期寰遊記十八日萬燦之來訪以海里士之邀往參觀東方學院與海里士魏勒晤談寰遊記下午應杜里舒教授之約晤蔡孑民張君勱介紹大師詢其隱德來希為原始唯一而終歸於一抑生物始終各有其一杜氏承認前說而以始終之間則各生物各有其一寰遊記十九日應愛吉士教授之邀晤愛氏謂在科學思想上能建立世界新宗教者唯有佛教寰遊記與德人談話鱗爪二十日抵柏林時詹顯哲應國府之法院編修職大師乃與話別寰遊記某日訪中國公使館晤梁祕書穎文年底無事日與留德學生俞大維趙懋華周自新錢子寧李祖冰鄧名方等相晤談并晤鄧演達黃祺翔任右民巴玉藻諸君遊覽過年寰遊記民國十八年一九二九戊辰己巳大師四十一歲一月三日大師赴學生總會共慶新年寰遊記四日遠東協會總祕書林待以衛禮賢之介約大師往晤見會長叩爾納等寰遊記五日以駐日德使索爾夫之介民族博物院萊辛曾從梅光羲學教授約大師往晤寰遊記六日大師應約赴德國外交部晤東方司長脫老乎脫孟課長密歇爾遁脫氏以上次歐戰由於缺乏道德修養大師告以歐洲以前本亦有宗教信仰以為道德涵養但因近代科學知識之進步歐洲以前所信之宗教在科學理智上已難成立其信仰故應有從科學理智而上達於最高最圓滿之佛法以為現代歐洲之新信仰促進於道德之修養寰遊記與德人談話鱗爪八日大師出席德國遠東協會外交部大學院柏林大學之聯合歡迎晚餐商世界佛學院事獲悉駐日索爾夫大使不日回德因決留柏林小住寰遊記其間疊應哈勒萊辛諸教授之茶會與晚餐寰遊記十六日大師四十初度攝影自題詩存浮生四十今初度幻質飄零尚未央風燭無常願無盡海天雲水正茫茫旋偕鄭松堂應張君勱介紹倭伊鏗夫人約去耶納寓倭伊鏗紀念室晤倭夫人甚致慨於近代之歐化而表示仰慕中國古文化之熱忱晚開演講會大師講佛法與哲學鄭松堂譯語聽者以倭伊鏗哲學會會員為多寰遊記與德人談話鱗爪海十一佛教史料十七日晨參觀大學及擊劍會午後赴萊勃齊晚講佛法與科學於萊勃齊大學鄭松堂譯語聽衆近千人杜里舒愛吉士海里士等送大師回寓設茶點再作長談寰遊記海十一佛教史料十八日還柏林寰遊記是日國務會議議決公布監督寺廟條例二十一條有以全部寺産充社會公益趨勢略史海十一佛教史料二十日維德海伯爵來訪詢禪定與神通寰遊記二十一日博爾士滿教授邀過其家茶敘寰遊記二十二日萊辛陪大師赴普魯士教育部長伯克之約晤伯克允為世院發起人有成立佛學院意大師乃以佛學之內容應分教理與行果二部由萊辛譯成德文以告之寰遊記二十四日聞蔣雨岩公使來柏林大師偕萬燦之往訪寰遊記二十五日大師講學於民族博物院萊辛譯語聽衆六七百人以柏林大學師生為多旋赴柏林佛學者司泰恩凱成立之柏林佛學會講人生佛學聽衆百餘並信佛士女寰遊記按中國近代之民族生活原注在德國耶納城講余乃仁記考遊記耶納既無此講余乃仁亦未至德國據題推察疑即於此民族博物院所講二十六日大師應留德學生總會約集有志研究佛學之中國學生為之講演寰遊記二十七日司泰恩凱來訪司氏於禪定頗多熏習衛禮賢來訪知徵求世院發起人已得各國六十餘人之贊允大師乃與話別寰遊記與德人談話鱗爪二十八日大師以法國外交部電邀等事乃與柏林友人話別離德去法蔣公使來送行寰遊記三十日下午大師還抵巴黎余乃仁胡詠麟楊婁峰信源等來迎寰遊記二月一日大師訪齊代辦晚應希爾筏勒肥之約晤時日本聞風興起亦派僧侶來法傳教希氏素與日友善欲設法日佛教學院寰遊記二日大師奉藏佛及佛畫二幀張供巴黎佛學會設龍舒女士別墅集會員與之商訂章程寰遊記三日大師至東方博物院應法國外交部之歡迎會到伯希和葛拉乃等法國外交部代表比勒致歡迎辭謂法政府令巴黎市政廳即捐地為世院基址大師致謝語以待商諸發起諸君總院是否設巴黎惟當以法政府之盛意通告各通訊處會畢大師與伯希和互致傾慕時法國允為發起人者已三百餘寰遊記八日旭佛乃爾夫人供午齊夫人為女交際家任職國際聯盟會席間為談佛法要義信心大發寰遊記十日己巳元旦巴黎佛學會開成立會大師出席指導為誦彌勒上生經導唱三歸依略示上生經大意龍舒女士與旭佛乃爾夫人乞授皈依乃名以德貞德亨大師以慈宗三要囑為譯傳流通寰遊記十二日德貞等來送別德貞致供養美金三百元寰遊記十三日胡詠麟陪大師至血部耳港乘亞美利加號去美寰遊記二十二日晨輪抵紐約屠副領事汝梅沈有乾黃恩孚司徒一平來接寓勃來斯冷旅館是夕應郭秉文之歡宴同席有張伯苓朱繼生孟君治等為論佛教及與中國之關係寰遊記二十三日紐約宗教學院休謨教授以汽車來偕聽福斯登牧師之講道休謨奉基督教略知佛教大師為述歷遊歐美之旨趣休謨與黃恩孚偕大師去宗教學院晉餐寰遊記二十四日訪總領事館遊唐人街晚應領事館歡宴寰遊記二十五日印人達斯來訪應而里特夫人茶會與會者均新聞界而里特夫人為譯世院通告書為英文寰遊記二十七日郭秉文陪大師赴望在爾夫人之茶會約有中國政府經濟顧問薩立門為大師攝一有聲電影留美紀念寰遊記二十八日著作家孫鮑恩來請供給有關佛學之材料愛拉博士來談以宗教無裨於人類之道德為言大師告以佛法不徒為信仰乃使人了解宇宙人生之真相以進於道德之實行寰遊記按遊記作二十九日與此年二月平不合三月一日黃恩孚陪大師往華盛頓江亢虎來迎晚江夫人陪往參觀國會圖書館即赴該館會堂講演講畢答該館東方部主任恆慕義之問寰遊記按大師致寧達蘊書署三月一日而云明日赴華盛頓與記差一日其後演講日期約差一日此由東西時差故所說不同今姑依記二日晨王文山以車來邀大師遊覽華市觀參衆兩院及總統府次訪伍梯雲公使下午偕江亢虎恆慕義共觀涅槃造像寰遊記三日江亢虎王文山偕大師往觀胡佛總統就職禮當晚返紐約寰遊記四日大師乘車赴耶魯拉多勒教授來迎下榻大學俱樂部晚講於耶魯大學沈有乾譯語寰遊記五日白朗洪夫人以車來迎遂赴哈福學院晤何樂益路思義等諸教授學生會公贈花束頗熱心討論宗教旋韓穆敦教授來出其翻譯未竟之二十唯識論於佛教之唯心哲學頗為讚賞晚大師演講沈有乾譯語聽者四五百人寰遊記按遊記之哈福學院即曾見前記之初五日哈脫福特宗教學院也大師致寧達蘊書二云六日赴哈脫福特大學七日赴哈佛大學講演然遊記明云哈佛大學約於三月二十六講演並請於四月初四日參加中國學院之成立余以日期過遲辭卻可知哈福即哈脫福特而哈佛則其後未去大師發致寧書蓋預告而未確定或西名記憶為難致有此誤六日大師返紐約寰遊記七日以陳煥章晏陽初與大師晤談郭秉文特為設筵木蘭大師為談佛學與共和國民及未來人世之關係寰遊記八日赴阿立爾夫人午餐約某老天主教師未知佛學為何義多不必要之辨詰大師贈以英文講演集令其研閲寰遊記九日上午赴摩訶菩提會紐約分會之歡迎會大師講演黃恩孚譯語達斯甚望佛教能與印度教為聯合之運動以促人世之和平實現四時應萬國學生公寓之約講沈有乾譯語即於寓中聚餐寰遊記十日應門羅博士約沈有乾陪大師往哥侖比亞大學與門羅談大同之世界教育頗得其同情次赴施乃德哲學教授之晚餐會富路特薛維林芳春熙戴聞達四教授及休謨同席次赴講演沈有乾譯語聽者多哲學系及宗教學院學生講畢略有問答寰遊記十一日大師離紐約去芝加哥沈有乾黃恩孚林松柏等來送別寰遊記車次賦閒吊時哲孫中山黎黃陂康南海梁新會四律詩存人物志憶按人物志憶以此為自芝加哥至舊金山車次誤十二日晚大師抵芝加哥趙之遠林我將來迎寰遊記十三日趙之遠