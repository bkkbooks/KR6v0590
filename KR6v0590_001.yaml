記海十三十史材是月大師議於大林寺建層樓作大殿法堂大林寺募修大殿法堂序遊廬山大漢陽峰詩存是年夏戴傳賢李濟琛朱慶瀾孫洪伊等發起就北平雍和宮修建金光明道場大師作論時事新報所謂經咒救國文八月三日七月二日天臺宗耆宿諦老卒年七十五寶靜諦公老法師年譜某日回漢口偕李了空乘飛機去重慶詩存二十日重慶北碚縉雲山創辦世界佛學苑漢藏教理院正式開學大師主持開學典禮以淡寧明敏為院訓岫廬記海十三十史材賦詩二律一云溫泉闢幽徑斜上縉雲山巖谷喧飛瀑松杉展笑顏漢經融藏典教理叩禪關佛地無餘障人天自往還二十九日大師致書留藏學僧法尊著回川主持與法尊書一蓋以漢院教職時唯超一滿智遍能岫廬慧松諸人未足以副漢藏教理之實九月大師過重慶三日於重慶反省院佛學組講人性之分析與修證慧松記大師約其義為一偈文一反自性成真佛三省吾身學古人悟得本空好勤拂永令明鏡絶纖塵某日再講佛學與宗教哲學及科學哲學於反省院又講人欲之分析與治理於求知俱樂部皆慧松記文大師回武漢二十三日應武昌文化公學約講如何建立國民的新道德文大師以為中國國民所最需要之道德為儉朴勤勞誠信為公而人類道德之原理為一衆緣主伴之互成二唯識因果之相續二十五日世苑圖書館開幕大師世界佛學苑之運動總苑地址去夏始確定於南京佛國寺適以長江流域之大水繼以九一八一二八之事變因緣乖舛德國衛禮賢亦卒進行不易是夏武院駐軍撤去大師即進行圖書館之籌備至是始告成立到孔庚方耀庭本仁夏斗寅王森甫羅奉僧等院董會改推方本仁為院董長略史海十三十一史材圖書館成立研究部分編輯考校二室研究員有談玄塵空葦舫本光等其後陸續來者有力定守志印順等館務由法舫主持凡六年大師留武昌期間講賢首學與天臺學比較研究法舫記文二十八日大師於正信會作臨別開示即登輪東下正信一十四是月寺廟興辦慈善事業實施辦法公布海十三十二史材十月八日重九大師應奉化蔣公延請住持雪竇寺行進院禮瑩照寬融玉慧觀均上山觀禮海十三十二史材玉慧觀浙東名山雪竇寺紀遊以克全為監院後改以又信任之二十五日大師赴廈門海十三十二史材二十九日大師於閩院開示現代僧教育的危亡與佛教的前途燈霞記文極力抨擊士大夫式的法師養成勉學僧以現代學僧所要學的不是學個講經的儀式必須要學能實行佛法建立佛教昌明佛法而養成能夠勤苦勞動的體格和清苦淡泊的生活十一月十二日大師應新青年會之請講新青年與救國之新道德與前如何建立國民的新道德同芝峰記後引起丘斌存丘非山等之批評有芝峰等與之論戰芝峰道德的小論戰其間大師應廈大教授所組文哲學會之約講法相唯識學概論虞德元佛心記海十四一佛教要聞守志潮汕弘法一周記本論昔年初講於世界佛教居士林未竟而中止雖粗陳大綱未必即能折世學而張唯識之法幢然概敘要義頗有條理綱目為一法相唯識學之略釋二法相唯識學之由起甲出發於究真之要求者乙出發於存善之要求者三法相唯識學之成立甲其餘唯心論不成立之故乙法相唯識論能成立之故獨頭意識與同時意識虛實問題同時意識與第八識變象質問題自識所變與他識共變自共問題第八識見與第七識見自他問題八心王法與諸心所法總別問題能緣二分與所緣三分心境問題第八識種與前七識現因果問題第八識現與一切法種存滅問題一切法種與一切法現同異問題前六識業與八六識報生死問題諸法無性與諸法自性空有問題唯識法相與唯識法性真幻問題染唯識界與淨唯識界凡聖問題淨唯識行與淨唯識果修證問題四法相唯識學之利益是論王恩洋張化聲唐大圓彥明梅光羲羅燦密林法尊胡妙觀黃懺華等為之序十二月一日大師於閩院講佛教的教史教法和今後的建設守志記文乃綜合年來對於佛法之條貫統攝及對於改進佛教之主張而論之三日大師辭退南普陀寺住持由常惺繼任舉行交接禮海十四一通訊時大師連任六年將滿而負責主持之大醒芝峰以年來煩纍於無謂糾紛不願再留乃議推常惺繼任自傳二十一按自傳推定次春請常惺法師繼任非也通訊作十一月二日考係十二月二日之誤九日以潮汕緇素推澄弘為代表來廈門歡迎大師乃偕會泉南行守志為侍録自傳二十一守志太虛大師潮汕弘法記按自傳誤以此為十九年冬事十日晨抵汕頭智證周覺空等來迎赴六邑會館之歡迎會大師講存心與擇法晚大師至商會開講心經凡三日其間有丁滄波馬傑三等來訪守志潮汕弘法記十三日大師等至潮州駐錫開元寺晚講心經大意守志潮汕弘法記十四日上午出席歡迎會大師講佛法與救國晚略講十善業道經大意守志潮汕弘法記按佛法與救國原注一二一六記於潮安與事實不合十五日大師為開元寺念佛會講阿彌陀佛經講要又應第四中學之請蒞校講佛學的色法與物是日大師訪唐大顛之叩齒庵守志潮汕弘法記按淨土宗月刊以阿彌陀佛經講要為二十三年講誤十六日大師等還汕頭晚於商會講阿彌陀經大意翌日離汕還廈門守志太虛大師潮汕弘法記二十三日大師於閩院開講大乘本生心地觀經勝濟窺諦東初燈霞雪生等合記成大乘本生心地觀經講記文大師譽此經為法備五乘義周十宗頗為推重二十五日廈門各界來受皈依因發起慈宗學會海十四一佛教要聞十四二圖如慈宗要藏敘云轉逢長老自小雪峰攜古銅彌勒菩薩像至乃就兜率陀院設慈宗壇以奉之民二十一二十二之交旦夕禪誦其中皈依者浸多有慈宗學會之設是年冬曾琦過廈門訪大師以世出世法不易會通者三事世法不能無執著不能無愛憎不能無殺戮相詢無名世出世法之融會時擁護班禪者有用回兵攻入西藏之議畢朋寺僧羅桑年札等發血淚書表示反對大師乃作讀西藏比丘血淚書告中央政府及國民以平息班禪達賴間之爭端為善法文民國二十二年一九三三壬申癸酉大師四十五歲一月一日慶祝元旦大師開示慶祝元旦時熊十力出新唯識論學出歐陽竟無而大反歐陽竟無之唯識大師許其不失為真如宗之屬以其提撕向上主反求實證相應鞭辟入裡切近宗門但其推尊大易傅合儒言不用聖比量以排除非量的凡情直覺而反引凡情直覺以排除聖比量又適成顛倒因於去年底作略評新唯識論舉大乘三宗義以通攝之適內院劉定權之破新唯識論至九日大師讀而復附識數語於後作略評新唯識論旬有餘日獲閲劉君定權之破新唯識論破之固當矣歐陽居士序之深致慨熊君十力之毀棄聖言量然履霜堅冰至其由來者漸夫起信與楞嚴等殆為中國佛教唐以來相承之最高聖言居士雖未獲融會貫通而判為引小入大之不了義說猶未失為方便乃其門人王君等撥而外之居士陰許而不呵止殊不知即此便開毀棄聖言之漸迫令千百年來相承起信楞嚴學者亦敢為遮撥法相唯識倣佛中論依傍禪宗爰有瞽僧狂士攻訐窺基護法而侵及世親無著今劉君猶曰除起信論僞書外居士亦未揀除徒責熊君之棄聖言所謂有知人之智而無自知之明歟十二日戴季陶等請班禪於寶華山主持藥師法會會衆有發十二願文藥師法會發十二願文序十八日大師輯慈宗要藏竣為之敘文臘大師應廈門大學心理學會之約講夢虞德元記記者附識時芝峰離閩大師命去武院編海潮音南北東西之海潮音二月一日大師講學佛先從人做起於思明縣佛教會燈霞記文十一日支那內學院交來佛誕紀元論刊定書對大師佛教紀元論有所指摘大師作復內學院書書二十八日大師返滬海十四四佛教要聞正信二五三月十二日大師於上海永生無線電臺廣播佛法大意海十四四佛教要聞十九日大師於雪竇寺開講出生菩提心經開題後由寶忍代講出生菩提心經講記跋海十四五通訊正信二五大師擬以雪竇寺為世苑禪觀林草禪觀林大綱海十四五通訊然主持無人迄未能如法進行大師讀教育部為中國佛教會佛教學苑組織大綱復內政部咨見二月十一十二時事新報歎為民國以來政府對於佛教第一有意義有價值之公文乃為論教育部為辦僧學事復內政部咨文於中國佛教會之主持者不知僧教育又不知國家教育制度胡擬佛教學苑組織大綱為政府責為妨礙國家教育制度之統一不識大體致其無限之感慨參略史是年春呂萬來山大師偕之遊四明山心歷訪雪竇諸勝詩存外集夏初四月二十頃大師至寧波展禮受經故居之永豐寺寧波七塔寺歧昌老和尚八十冥壽啓四月二十九日錫蘭佛教之復興運動者達磨波羅卒寂穎達磨波羅的死五月五日大師在滬作現代佛教周刊之路向以示大醒現代僧伽自二十一年改為現代佛教月刊失其初創之特色是年四月大醒至潮州改辦現代佛教周刊大師乃勉以辦為周刊應益注重改善僧制之運動而尚論佛教之時事收懲惡勸善之效開撥亂反正之路建立現代僧伽以住持現代佛教庶乎其有希望耳六日大師於上海世界佛教居士林開講八大人覺經八日圓滿海十四七佛教要聞七日大師於永生無線電臺播講佛教與護國海十四六佛教要聞時日人占榆關侵熱河國難日深大師信衆之普仁余乃仁普勇普德商諸大師擬創組青年佛教護國團大師乃電勸全國佛教青年組護國團海十四六佛教要聞主部分從軍抗暴部分則助捐及組救護隊慰禱隊運輸隊等十二日大師抵南京駐錫萬壽寺中國佛學會海十四七佛教要聞十三日大師訪隨甘地絶食而絶食之談雲山海十四七佛教要聞翌日致電甘地勸其進食電勸甘地進食時甘地八日起於獄中為賤民階級實行絶食三星期甘地運動成敗關係世界文化十四日大師於中國佛學會開講三十唯識論來會參聽有黃攻素張大千汪培齡范本忠張仲如姚雨平周仲良謝健黃懺華等百餘人海十四七佛教要聞三十一日大師作常熟之遊歷遊破山寶巖三峰諸勝約六月二日返海十四七佛教要聞詩存六月七日五月半寧波佛教會所落成禮請大師於佛教會講三十唯識論凡七日海十四八佛教要聞正信二九二十二日大師抵漢口翌日大師於佛教正信會開講大乘理趣六波羅蜜多經皈依三寶品葦舫與紹奘合記成大乘理趣六波羅蜜多經皈依三寶品講録海十四八佛教要聞正信二十一二十九日法會圓滿大師偕方本仁鍾益亭等參觀孤兒院海十四八佛教要聞海十四九通訊正信二十一三十日大師巡觀八敬學院院為今春新創大師為題名者與正信會諸居士書海十四九通訊七月四日大師移住武昌世苑圖書館海十四九通訊是年春夏同師日本權田雷斧之曼殊揭諦與王弘願對居士是否可以傳法灌頂大起爭論二十六日大師在廬山偕戴季陶遊含鄱嶺望南山之勝戴氏有於此建佛剎之願初抵谷口濃霧迷漫忽而開朗四山形勢一覽無餘欲行則雲從天下依然滿谷戴氏歎為佛力戴季陶有感寄太虛上人詩注三十日大師就大林寺開講金剛般若經戴季陶蔣作賓張默君等均至是日發題論佛法大意因緣所生法義葦舫記慧慈廬山大林寺金剛般若法會日記海十四九通訊適大林寺開白蓮華一枝後戴氏來講續放一枝戴氏以詩紀其瑞詩存外集初見白蓮為師發繼來再見白蓮開南山重霧隨聲散應有神龍運巨材指含鄱嶺之遊八月一日玉慧觀為暴徒殂擊殞命年四十二馮明政玉慧觀略歷慧觀於大師事業多所臂助壯年早殂大師悼之六日大林寺歡迎戴季陶并開講演會戴講藥師七佛法會會衆所發十二大願大師講倒果覺之下化起因行之上求源輝與黃暄初合記海十四九通訊文十三日金剛法會圓滿再開演講會適王揖唐來廬山因參與講演大師是日講發揚中國文化與佛教以救國救世界慧慈般若法會日記海十四九通訊是夏山居多與趙敬謀許公武等唱和詩存七日張文白治中招集花徑分韵大師得恨字花開花謝異欣厭春到春歸紛願恨豈知萬化總乘時榮悴總是天行健黃凌霜中央大學社會系主任休夏大林寺讀大師真現實論以唯生的中國哲學唯物的西洋哲學唯識的印度哲學為類因為大師言及陳立夫近在中央政治學校講唯生論頗近大師之說故分韵一絶約大易生生之義以為說唯生論讀後九月二日大師再度至武漢海十四十一佛教要聞二十四日大師於世苑圖書館為館員講世界佛學苑之世界佛法系統觀葦舫記正信三二時漢藏教理院以滿智煩動不孚衆望群為不安大師勉任為院務主任俾安其心逮滿智離職去大師因命遍能主教務常恩主事務漸歸平靜致滿智書致漢院員生書致遍能常恩書二十八日大師遊九峰正信三五海潮音自九期起改由大醒於漢口編輯南北東西之海潮音芝峰還寧波十月一日大師應漢口律師公會佛教正信會紅十字會請於漢口市總商會講怎樣來建設人間佛教談玄葦舫記三日圓滿海十四十一佛教要聞文國慶日東還海十四十一佛教要聞正信三四是年李梅石從大師出家字以德映尼呂九成致編者書十一月十八日十月一日大師應杭州靈隱寺彌勒佛開光之請開講彌勒上生經海十五二通訊正信三八二十四日法會圓滿上午應之江大學之約往講宗教構成之元素何惟聰記晚應青年會約為各界說法海十五二通訊大師在杭期間遊三生石六和塔諸勝詩存故友王芝如來訪大師偕之往吊許鐵巖墓人物志憶三越州故友王芝如得得雲林訪我居忽憶鐵巖許烈士玉泉亭畔一長噓二十六日大師經杭甬道返奉化雪竇山海十五二通訊十二月大師指導雪山植樹紀以詩溪風習習水淙淙曳杖飄然過伏龍寺內曾栽司令柏橋邊待補翰林松翠光迎納山曈暖寒色飛侵瀑雪濃老樹不刪成古趣且將新植課寒冬十七日西藏達賴喇嘛卒大師作達賴逝矣西藏將奈何是年秋冬大師多論時小品如論大學教授救國宣言世運之轉機內政部今頗注意宗教甘地運動的成敗關係世界文化告暹羅國民怎樣平世界兩個不平世苑圖書館以王慧力等之籌措成立研究預習班學生有智藏儼然明智雨曇等潮州以大師蒞臨弘法緣起嶺東佛學院寄塵主持之是秋開學閩院以閩變學院駐軍而引起學潮閩院自十七年大醒芝峰主持以來內部尚稱安定唯以對外糾紛為苦自常惺本夏實際主持以來知非會覺等先後任教務不滿於大醒芝峰思調和於新舊及本地外江之間唯本人不常在閩隔礙亦不易卒除而學院內部則學潮年必二三發迄二十五年常惺退住持閩院陷於半停頓抗戰軍興始停止民國二十三年一九三四癸酉甲戌大師四十六歲一月三日大師應鎮海團橋鎮永寧寺請講八大人覺經張聖慧記成八大人覺經講記海十五二通訊芝峰守志自金仙寺來預法會亦幻為編者說五日晨大師因便偕芝峰等遊慈北鳴鶴場金仙寺寺主亦幻武院學生就寺開歡迎大會大師講由諸行無常求合理的進步晚再講怎樣赴龍華三會均守志記海十五二通訊七日大師偕亦幻芝峰等遊五磊靈山寺晤亦幻之法和尚靜安論及昔年佛教弘誓會事並以延慶寺之衰落不堪為可惜大師語靜安亦幻芝峰勉以再興延慶海十五二通訊詩存亦幻為編者說八日靜安亦幻去寧波進行延慶寺事大師偕芝峰遊慈溪普濟寺翌日大師重遊汶溪之西方寺兼遊淨圓寺海十五二通訊詩存詩存遺十一日大師蒞寧波參加延慶寺之交替禮由靜安任住持亦幻芝峰於中主持之寺中駐兵大師商諸奉化俞氏乃得遣出延慶重見清淨海十五二新聞亦幻為編者說大師回雪竇寺度舊年海十五三新聞與通訊去年初以曼殊揭諦與王弘願諍次海潮音出密宗專號責難王弘願王弘願乃特出專刊以反駁大師作王師愈諍潮中的閒話以再破之二月十四日甲戌元旦大師於雪竇寺講彌勒上生經海十五三通訊與新聞四月三日大師在杭州戴季陶來訪復戴季陶院長書九日大師由滬抵南京與班禪面商佛事海十五四通訊佛法建立在果證上晚與黃懺華談及知近人於佛法多諸疑難內院對時輪金剛密法多有批評翌日大師乃於中國佛學會講佛法建立在果證上文十四日三月初一日大師於延慶寺開講妙法蓮華經懸論四日而畢守志記海十五四通訊文注本文則付根慧與芝峰共講之時戴季陶湯鑄新陳元白等籌備於杭州靈隱寺請班禪重開時輪金剛法會去年開於北平藏密流行教內教外人士頗多憂神鬼迷信之禍國多諸疑諍法會徵文於大師大師乃就法華經義作鬥諍堅固中略論金剛法會極說一切教法莫不建立在佛果智證境上香拔拉國與南天鐵塔所流出之密法決不能以無史實可稽而斥之文時大師作有梵網經與千鉢經抉隱以證密典亦古譯舊傳又作佛法一味論之十宗片面觀除素所讚仰之禪宗外特讚密宗之殊勝曰然真空門妙極於禪宗而假相門妙極於密宗故行證之妙門獨以此二為崇蓋天臺華嚴著重於玄妙的描寫致行證反成無力也二十日大師遊橫溪金峨寺正信五四五月大師抵杭州參加時輪金剛法會十八日圓滿攝影大師預會靈隱寺懸相片時大師從班禪受金剛阿闍黎灌頂執弟子禮專事弘揚人生佛教之大師乃應機而學融攝魔梵之密咒識與不識多為驚奇然就大師一切皆為方便無事不可適應之心境觀之則亦無足驚奇其後大師作答或問以自解數年來與班禪大師晤談多次彼此相知漸深春間得超一師為譯語談論益暢讚余為漢地弘揚佛法第一人惜言文隔礙不能互相研究因答余亦極欲研究西藏佛教特勝之密咒當謂非灌頂傳授不可余於佛祖古制非萬不獲已不肯違背因謂如能授以總灌頂俾可自在研究諸咒部者當從大師授之亟蒙喜允為專授金剛阿闍黎大灌頂法此余為得研習一切咒法之自在從受灌頂之意義及經過也時上海報章舉發一部分佛徒將去日本參加泛太平洋佛教青年會二十六日申報標為全係太虛之徒與日人勾結而成有太虛首先表示態度可領數十人赴會之說輿論譁然大師乃登報否認致王一亭居士書事緣留日學僧墨禪函約國內緇素赴會而藤井草宣神田慧雲等亦活動甚力間有少數意存兩可語涉模稜墨禪輒以載諸日本報章事為內院所舉發傳說中之代表團團長常惺等均紛紛否認事出有因特未至決定階段至於大師是年故無意東行大師乃作論第二次泛太平洋佛教青年會深以列有滿州國為礙六月五日四月二十四日大師應阿育王寺寺主源巃請開講藥師琉璃光如來本願功德經守志記成藥師琉璃光如來本願功德經講記致戴季陶院長書正信四五大師於東方淨土頗有善巧之解釋以為釋迦將濟生之事付與東方藥師度死之事付與西方彌陀於素重死鬼之佛教特揭資養現實人生之佛教可謂善巧方便矣法會中美人梅立德專誠來訪海十五六通訊海十五八通訊戴季陶以藥師七佛壇城圖貽贈大師題而藏諸雪竇寺題藥師七佛壇城圖端午十六日前法尊自西藏歸來謁大師於阿育王寺大師命從速入川主持漢藏院法尊略述太虛大師之悲願及其偉業先時漢院以遍能處事未善教員傳戒巨贊熊東明並與大師有關而又從內院學即藉生事端擬改漢院為內院第二院幸院護何北衡不為所惑得以無事逮法尊入川先後得葦舫塵空相助漢院始入小康之局二十七日五月十六日藥師法會圓滿講記末注七月五日錫蘭摩訶菩提會祕書法理性海來訪大師於上海雪竇分院海十五八新聞十四日大師抵廬山海十五八新聞是日漢口王慧力森甫卒正信四十武漢昔年之護法居士北伐以來或死或散多半又歸於密大師武漢法化得以賡續推行慧力之力為多大師於廬山得其噩耗悼之以詩去今兩夏廬山上兩度驚看噩電來滬玉慧觀漢王慧力相繼逝化生願各在蓮臺世苑圖書館預科是秋即以經費困難而停頓自此大師之在家信徒鮮有能豫以經濟之有力援助者二十七日大師於大林寺開講孛經以從慈悲為本方便為門以明孛經大旨發題法舫記八月二日圓滿海十五八新聞三十日大師為張化聲之化聲集作序張化聲初夏自湖南來武院轉來大林寺謁大師時化聲已轉佛而入道有且待五年以仙學問世之豪語大師不以為嫌而勉之蓋衛藏喇嘛祕傳之所蘊在乎氣功與道家之命功有異曲同工之妙殆欲界中修習禪定之前方便歟惜乎未滿五年化聲已仙去是年夏蔣委員長在廬山發起新生活運動舊道德論復活新儒家由此擡頭八月十二日大林寺舉行暑期講習會到馬秀芳李協和王一亭梁趙懋華閻寶琛蕭一山韓立如朱鐸民及德人博爾士滿等海十五八新聞二十九日大師自廬山抵漢口海十五九新聞大醒空過日記三十一日大師於武昌正信會開講善生經塵空記成善生經講録二十七日圓滿海十五九新聞大醒空過日記了空善生經講録序按正信會印行本作漢口正信會講誤時大醒於武院編潮音大師書數語勉之治學如朴學者辦事如職事僧講經師以宏法禪和子以持身九月五日大師為世苑圖書館員生講世苑圖書館之修學方針智藏記大醒空過日記大師類攝佛法為六系五三共法系小大律藏系法相唯識系般若中觀系中國臺賢禪淨系印華日藏密法系八日大師參加漢口正信會舉行之王慧力追悼會海十五十圖十五日大師於漢陽正信會講心經大醒空過日記十九日大師應湖北省教育院約講中國文化與復興農村海十五十新聞大醒空過日記二十日大師於湖北第一模範監獄講由人至成佛之路塵空記又講佛教美術與佛教於美術學校葦舫記文二十一日大師應唐大圓請講唯生哲學於東方文化研究院塵空記文唯生論讀後大師結論謂唯物論是淺的唯生論唯識論是深的唯生論苟善知唯生之義則一切學術皆可作唯生論之參考以成其唯生哲學二十二日秋節前一日大師偕李了空李慧空法舫等遊李了空故鄉應城大師於應城講有佛法根本義與時局之關係法舫記二十五日後二日回漢口李慧空應城遊記二十四日歐洲第一屆佛教大會在倫敦開會前二年來中國受戒之照空領導納粹黨人有接受佛教之表示引起諍辨大師為作歐洲佛教大會的論諍以通之文時陳立夫唯生論問世大師讀之作唯生論書後大師本以中國文化為唯生者與陳說有所不同其一陳以中國為唯心的精神文明與西洋之唯物的物質文明對立雖可使中山先生唯生論增高綜合東西之價值以唯生論兼包近代西洋的物質文明然文明之分為物質的精神的原不過比較上有其特勝之方面而實無絶對之區別察中國之文化於物質方面固不及近代西洋之發達但於精神方面亦未逮古印度之深遠故不如用歷來許多人對於世界文化之三分法以唯心的歸之印度而以原來是綜合心物之唯生論位置中國推中山先生為繼承唯生的中國文化融攝唯物的唯心的文化而充實之發皇之光大之以成現代中國文化或世界新文化者尤較為平實而有力蓋大學之格致誠正修齊治平雖有完備之綱目而考其內容代表中國正統文化之儒道其較優詳者祇在修齊治平格物致知之須藉西洋物質研究為補充而誠意正心可引印度佛學修養為資助實為最契理契機之辦法此具攝持格致誠正為修齊治平之精蘊亦唯物唯心為兩面而唯生為總體之旨也其二唯生論殊不宜有元子之概念與名稱蓋以原子律說明萬有之生起雖為古代印度及希臘所同有不僅為近代的西洋學說然此實為唯物論物質分析之所限極由分子析到原子再由原子析到電子皆不越物質之質點故為形數之可測量而得以極微最小或無窮小等以小大形之然近起而未成立之能子說已非屬質點而不可以小大形之何況唯生論之元可從分析至無窮小以求之且名之以子哉蓋一拘小形即落於形而下是唯物而不成唯生唯識矣故不如用生元或生氣之一名區別孫文學說上之生元為通俗的生物之生元而另以唯生論上之生元為哲學的萬有之生元詮明此唯生論的生元無窮小亦無窮大非小大可形而遍為小大形前無始而後無終非前後時而可為前後時則庶其近於易之太極而太極無極無不極則無極一名亦蛇足也二十七日大師離漢口返滬大醒空過日記十月六日大師講應注意蒙藏間文化和國防於學校法周記海十五九上海通訊十六日重九大師在南京偕詩友於雞鳴寺豁蒙樓登高分韻賦詩詩存十九日大師遊丹徒以會音寺開戒禮請開示大師略示瑜伽菩薩戒綱要作同戒録序丹徒會音寺同戒録序海十五十新聞大師過鎮江應省佛教會請講佛法無邊於紅卍字會文二十五日大師於浙東麗水南明山仁壽寺講八大人覺經詩存麗水之遊十絶遊跡次第可見正信五五詩存秋盡回雪竇山玉皇却非來訪詩存十一月七日大師於奉化中塔寺講彌勒上生經正信五五十二月二十二日冬至胡瑞霖妙觀應大師招來遊雪竇胡妙觀法相唯識學概論序二十六日蔣委員長來山晤談至法尊書三是冬法尊譯菩提道次第廣論畢大師一再囑譯咒道次第俾窺藏密之組織與法尊書四六九民國二十四年一九三五甲戌乙亥大師四十七歲一月十二日臘八大師為奘老作重刻地藏經序於雪山文時有勸大師於雪竇寺開戒者因作論傳戒以謝之今戒種斷而僧命亡矣續命之方其惟集有志住持三寶之曾受苾芻戒者二三十人清淨和合閲十年持淨苾芻戒律然後再開壇為人受苾芻戒大師赴漢口有赴漢皋舟次詩詩存二十二日大師四十六初度將二十年來所留髭鬚一齊剃卻殆有感體力漸衰勉自振作為青年歟大師剃鬚紀之此身四十六初度母難空添德慧無且幸猶存真面目莫教孤負好頭顱不因剃髮除煩惱那更留鬚表丈夫此日刮磨重淨盡露堂堂地證真吾是年海刊復由法舫編輯南北東西之海潮音十五周年紀念大師作十五年來海潮音之總檢閲二十九日大師於世苑作答或問多涉及密宗問題龍猛受南天鐵塔金剛薩埵灌頂為密宗開祖之推論亦是時作二月十一日大師作閲儒佛會勘隨筆以比來尊孔崇儒成一時風尚此文以禪攝儒實應機妙品二十六日墨禪等為中日佛學會事發表敬告全國佛教民衆及全國同胞署名者釋談玄釋墨禪阮紫陽呂大椿黃輝邦蔡吉堂高觀如佛教日報五月大師以病返上海療治感衰老劇增致法尊書八四月三月大師偕沈仲鈞黃清渠遊天臺山詩存六日清明華東基督教教育代表團來遊雪竇山以中國佛教趨勢中國佛教教育方針中日佛教關係佛教對基督教之關係中國佛教對於世界之貢獻為問大師一一答之性定記文是春十教授發表中國本位的文化建設大師以為應稱現代中國文化建設蓋一言本位易落宋儒窠臼中國本位文化建設略評時大師召芝峰講楞伽經於漢口正信會頗望能留武漢與法舫等同弘法化經期畢芝峰返甬大醒嘗謂中國佛教只要有十個有為的僧伽能真誠合作就有辦法達居等以詢大師大師頗有不勝感慨之意對於這問題好像很不願意多所發表達居等由青年路向問到佛教革興法尊譯出菩提道次第廣論將以印行大師序之於斯論不沒自宗不離餘法而巧能安立一切言教皆趣修證譽謂從天竺性相各判三時以至華日諸宗之判攝時教皆遜此論獨具之優點十日佛教日報創刊大師在滬作發刊辭去年大超曾任中國佛學會幹事與鄧慧載承大師意於上海市民報編佛教特刊逮停頓大師乃促組成佛教日報大師為社長范古農任總編輯鄧慧載主其事後改胡厚甫主持燈霞為編者說十四日日本好村春宣及留學僧墨禪等為成立中日佛學會事來訪大師於雪竇分院致歐陽竟無書大師與好村晤談問中日佛教學會擬推中日會長各一人日本方面於高楠鈴木二博士孰為宜而中國方面法師能擔任否答高楠博士編印大正新修藏主譯南傳巴利文藏中國佛學者知之較多聞今夏有常惺法師等將遊日本屆時可就詢之余以事繁庶未遑參預問中國僧人近已漸有赴日留學者日本僧人亦有可來中國留學之寺院否且用費如何答中國僧赴日留學經費頗為不易中國今某某等寺皆附設有佛學院設為國家所許而日僧能遵照中國僧生活習慣者則就某某寺等佛學院無須納費問擬請法師赴日講演不知有暇否今夏鈴木博士將重遊中國廬山暑期佛學會邀講演否答鈴木博士若遊廬山之便在大林寺講演期間當邀講演問大醒芝峰法舫等今夏能赴日考察否答或者能之問南傳巴利文藏經已譯成日文中國最好能轉譯之答武昌世界佛學苑圖書館中有暹羅某親王所贈巴利文藏經並已訂購南傳藏若得一精於此學之日本學者相助當於館中選華文之所無者譯之二十日大師以錫蘭僧納囉達約再由甬來滬翌日納囉達偕鄭銘榕訪大師於雪竇分院鄭銘榕譯語商南京世苑籌設巴利文學院及於京組比丘僧團律儀院海十六五新聞時以中日佛學會事引起甚大紛爭支那內學院熊東明作闢中日佛教學會定公巨贊化名作為中日佛教學會告國人書於大師及其門下指為勾結日人為害國族而墨禪則作誡支那內學院談玄以中國佛教調查團名義作支那內學院之鬼蜮謂內院心存嫉忌意圖染指庚款佛教日報為披露關於中日佛教學會之論辨不作左右袒一般報章間有不滿大師者大師因二十二日作告日本佛教大衆去年日本青年佛徒聯合沿太平洋各國青年佛徒開泛太平洋佛教青年會自憑片面希望於報紙宣傳可邀中國太虛之友生出席致太虛為嫉害者乘間攻毀全國報紙流言四起竟令辨不勝辨乃今年三月初申報轉載貴國報紙又云以日華佛教學會為中心於太虛所辦世界佛學苑作有力之聲援雖貴國佛徒或原出於好意然初未與太虛商洽而有所承認遽作此片面之宣傳又徒引起貪嫉者對於太虛為挾嫌之詆謗此非與中日兩國之佛教有百損而無一益者耶於上海一二八時太虛曾布因遼滬事件為中日策安危一文告日本佛教大衆雖中日兩民族不應相扼以俱盡當謀互助以共存然謂若非還我東北恢復中國疆土政治之完整則中國對於日本民族之感情末由好轉而盼日本之佛教徒力促日本國民之覺醒太虛持此宗旨迄今猶昔故特此再告日本佛教大衆誠能力促日本朝野入於回復中日民族感情之正軌則中日佛教自可共圖發揚設枝枝節節作空言無實之引誘必致徒勞無功尤冀對於太虛勿再播無據之空氣以益深中日佛徒之障隔中日佛教學會由墨禪談玄等與日人聯合組織時中日國交內則已趨險惡外則敦睦邦交大師唯以適應與否為是非故於中日佛教學會並不以為是而起圖之少數留日弟子之起而組織亦未嘗以為非而誡之使絶內院與大師積不相能一則以陰謀禍國為口實一則以嫉忌為言要皆意氣用事耳然以內院之攻錯泛太平洋會未出席中日佛教學會未成立於中國則未始毀之而適以成之也後以紛爭不已五月九日大師致書歐陽竟無望其一察其門下所為文二十四日大師往法租界第二特區監獄說法講人生苦痛之根本解除郁祖倫記海十六五新聞二十六日龍華開戒大師應請一往開示持戒與龍華道場海十六五新聞五月七日大師在雪竇作中日遼滬戰事雙方戰死者供養塔銘并序日本伊藤原宗為塔因蔣作賓公使來乞序乃作此以應之二十六日大師於南京中國佛學會講優婆塞戒經羅普悟曜青記成優婆塞戒經講録法會為戴季陶居覺生王用賓焦易堂彭養光褚民誼謝健仇鰲等發起者佛教為中國文化及智慧的宗教海十六六新聞正信六十一按正信作十月草六佛教為中國文化及智慧的宗教作一月草六並誤發題日大師論及本人在佛法中之意趣為一極有價值之自白甲非研究佛書之學者將佛法當學問來研究者並世雖不乏其人而本人則讀書每觀大略不事記誦不求甚解但資為自修化他之具故在吾之志願趣向上不在成為學者其所有著作亦皆為振興佛教弘濟人群之方便耳乙不為專承一宗之徒裔在佛法中自古即有開承一宗者至今皆有專承之人系統甚嚴而各自弘揚其本宗之教義至本人在佛法中之意趣以為由佛之無上遍正覺所證明之法界性相為度衆生應機設教則法有多門故法本一味而方便門則無量無邊所以本人觀察佛法之五乘共法三乘共法及大乘不共法原為一貫在教理解釋上教法弘揚上隨宜施設不專承一宗以自拘礙丙無求即時成佛之貪心佛法原不拘限以現身此世為立足點乃普為法界一切衆生而發心發心修行應不為空間時間所限宜普遍平等超出一切時空而涉及一切時空於佛法如此理解信行即能自悟悟他精進無息再無庸拘定要即此身成佛蓋成佛亦不過自悟悟他而已菩薩行滿佛陀果成但勤耕耘自能收穫何藉刻期企求若有拘求心量自狹將不免為虛榮心所驅使為滿足此虛榮心而去著相貪求則反增煩悶難得自在佛法為接引一類好夸大之衆生亦嘗施設立地成佛即身成佛等假名而本人則不因此假名而引起希求即身成佛之貪心丁為學菩薩發心而修行者本人係以凡夫之人得聞佛法信受奉行者願以凡夫之身學菩薩發心修行即是本人意趣之所在蓋真發菩提心已歷十信而登初住由此經十住十行十回向修菩薩行則為集福智資糧之菩薩今人每多稍具信行便爾心高氣傲不知尚未做到發菩提心之少分是月大醒去日本考察佛教六月十三日大師講佛法的做人道理於江蘇第一監獄羅曜青記文十五日大師在中央廣播電臺廣播佛學為世界和平要素佛教日報六月其後補充為提供談文化建設者幾條佛學時文化建設月刊編行世人每以文化建設為言大師乃為一論雖所論簡略實包含大師現實論自由論等要義一徹底的因果論與現實論佛法的法即指一切事事物物莫非是因果性的宇宙現象莫非因果不索其因求其果於宇宙現象之外其一一現象莫非無始終無邊中而為因果鐵則之所範持顯見為莫非是歷史性和聯繫性的亦可謂是徹底的客觀論唯物論機械論命定論必然論的然即其中任何一現實事物莫不可為未來事物的開始亦莫不皆是過去事物的終結莫不皆是現存事物之邊際亦莫不可為現存餘事的中心只從現實存在事物而推闡因果即可從現實存在事物而把握因果在人言人即可從即終即始即中即邊的吾人身心之活動轉變無始終無邊中的宇宙一切事物因果而為現實活力之所支配顯見為莫非是剎那性和獨立性的亦可謂是徹底的主觀論唯心論意志論無定論自由論的由因果論故法無自性諸法無我由現實論故我為法王於法自在二徹底的平等論與差別論一切事事物物莫非是因果性的同時又莫非現實性的故隨拈一法皆為法界隨一事物皆全宇宙絶無可為獨待的絶對的最先的最後的非果之因或非因之果如一神教所謂的神唯心哲學所謂的心唯物哲學所謂的物故為最徹底的平等論亦即是無神論無元論或一如無變異論然就每一事物現實而望其餘一一事物現實彼此宛然自他宛然先後宛然勝劣宛然則其程度之纍差與形性之別異又不可以僂指計則又為無數之差別而人類身心世界則為最完具此差別諸法而最能轉動此差別諸法者由此依人心於平等差別諸法之覺不覺或不覺而創造諸退化業因而受墮畜等諸劣果集成苦世界或覺而創造諸進化行因而致升天與羅漢辟支菩薩佛陀諸勝果集成樂世界而人生世界之意義和價值即在能走上進化之階程而不再退墮流落菩薩佛及其淨妙樂土即為人格及人世界進化之階段與最高成果由此故又為人神論心元論或進化有階向論三徹底的社會論與個人論佛陀證明一切法皆緣所成任舉一事物就其輾轉能作關係之緣的則無限極故隨一事物皆是宇宙性的就人切近言之即可謂隨一個人皆是社會性的然此一事物是宇宙衆緣成的而於一般的衆緣別成要泛違順差異且緣成此一事物而非其餘事物這由其在一切生緣中有其特殊因種故再之此一個人是社會衆緣成的亦於一般的衆緣別成親疏利害差異且緣成此一個人而非其餘個人這由在生緣中各有其自然個人故一切法緣生空義中必明一一法種子因義乃可全明一切法仗因托緣而生成的實相人生本來是社會的義中亦必明各是自然個人乃可全明社會作成人而人亦作成社會之實相由此資本主義文化核心之個人主義雖有所偏執不免今後之崩潰亦未嘗不握得一分的真際故能造成近代燦爛的文化集産或共産主義文化核心之社會主義雖亦能把握得一分的真際可有造成將來文化的傾向然亦以偏執在進行中已窒礙難行要之有見於孑無見於群有見於群無見於孑皆側傾一邊致分為兩個階段鬥爭莫決若應用佛說因緣生法因故社會必生起於個人緣故個人必長成於社會復次離緣則因不成因個人是社會之個人無社會以外之個人則個人主義的資本文化可融解於社會離因則緣不成緣社會是個人之社會無個人以外之社會則社會主義之集産或共産文化可引生於個人如是乃能不破壞近代的文化而入將來的文化四徹底的無常論與恆常論佛說諸有為法的無常不但根身的活死與世界的成壞尤在色心等一切皆剎那生滅而引續不斷演化無盡辨證法的以矛盾的對立又統一統一又對立說明變化不如佛說有為諸行種現無始而生滅不住雖至佛果不斷常與無盡常亦剎那生滅之徹底然徹底無常又如何徹底恆如則由有為法因緣所生起唯緣起滅唯緣滅一切皆無自性無自性實性遍一切無常法中常恆如是所以當處無常而當處恆如非由常如起無常復歸常如乃於無常而即恆如達無常性實性常如如故則於矛盾對立即見矛盾消解不待階級鬥爭而階級俄已融化五上所論乃為佛法建設現代文化之意義而對於建設現代中國文化更有何特殊之要點一因佛法傳存中國者最為完備二因佛法在中國將二千年與中國歷史文化禮俗習尚早皆滲透而尤普遍深入多數庶民心理中成為國民的精神要素但於佛教文獻中國人民心理中所蘊藏的大乘精義大多尚待人掘發闡揚出來流貫到一般思想信仰行為上去乃能內之化合漢藏蒙滿諸族外之聯合東南亞強弱小大諸族以二千餘年之佛教教化關係成亞洲東南各民族大聯合協力將大乘佛教文化宣達到亞洲西北以及歐美非澳融攝近代的個人主義文化將來的社會主義文化造成全世界人類的中正和平圓滿文化中國於佛教文化有可因藉之便利有待發揚之需要有能化合聯合佛教民族復興之關係有可融攝創造世界新文化之希望這是今日作建設中國文化運動的人所特須注意的二十三日優婆塞戒經法會圓滿海十六六新聞法會期間諸筱甫以志公塔為陳亡將士委員會所掘毀來謁大師陳述其事其後乃得以重建諸筱甫由太虛大師追悼會談到志公塔大師牙痛初損齒一枚致法尊書十二己卯日記七月三日大師應上海集雲精舍張孝行等歡迎講佛學的簡明意義張慧圓記佛教日報八月九日嘉興鐘鏡范古農來滬歡迎大師偕之往嘉興翌日講楞嚴大意於楞嚴寺吳印若記十二日圓滿佛教日報七月二十六日大師以避暑抵莫干山黃膺白張靜江吳蘊初施省之沈仲鈞等發起假公益會請大師講佛學三日海十六九現代佛教史料佛教日報七月八月六日大師復就張靜江公館開講佛學海十六九現代佛教史料九月八日大師應無錫佛學會請於佛學會開講大乘理趣六波羅蜜多經發菩提心品性定記經期凡六日海十六十現代佛教史料十二日大師度中秋於黿頭渚廣福寺詩存大師遊無錫惠泉等諸勝又遊宜興善卷子庚桑楚二洞受儲南強之招待又作銅官石礄之遊悉紀以詩詩存十月十日大師訪章太炎於蘇州人物志憶十八日大師於上海雪竇分院應朱世華朱世萱請講地藏菩薩本願經凡七日智定記大師逐日作佛七開示黃清渠記海十六十一現代佛教史料佛教日報十月十九日大師以納囉達公然聲言中國無僧伽乃特約晤談譯語者趙朴初徐和卿慧松記文其談話略云師中國原有僧律之成立時至今日遵行律之僧伽較少耳然說中國無僧伽將中國僧伽全體否認殊非合理吾今與師討論之重心點即在此中國今日無依律儀之僧團誦戒發露懺悔如師所言之烏巴薩陀而已但我們傳授戒律之歷史極光榮且豐富自曹魏嘉平年已有曇摩迦羅法時阿羅漢來洛陽舉行開壇傳戒此為吾國正式受戒之始乃信而可考者也為中國比丘尼受戒且專派人到印度迎二十位比丘尼來中國傳戒在途中死了幾位今各律寺傳戒之儀式仍有極隆重者猶見昔日之系統傳承未紊此其一中國今日個人持清淨比丘戒者如過午不食等仍大有人在不過服裝與錫蘭不同耳此其二故吾極盼勿僅以中國無僧團行其烏巴薩陀而遂謂中國無僧伽中國無比丘余昔年曾著整理僧伽制度論即有重興中國僧伽律制之計劃今欲派人求學錫蘭蓋為參考補充而已先實習錫蘭僧衆之生活試驗有何種困難而後實地重新振興固有之僧律據上說在中國已受比丘戒者在錫蘭應即允許參加比丘集團納如師所言真正之僧伽僅能在中國古代有之今日仍有缺吾所言真正之僧伽授戒師二十人須全清淨者錫蘭今日之僧伽已非往日之僧伽系統其故即由往日之僧伽腐敗故捨其舊而另從其相近之緬甸去承接貴國與吾錫蘭往日僧伽之情形相同亦盼取同樣之方針振興之耳師印度之律亦分數派乃程度上參差非性質上之有異佛滅百年後之比丘亦遠遜於佛在世時之比丘故不可過於苛求納比丘有多種師比丘吾亦比丘使雖有明確傳承之系統但因直接從其受戒之僧不淨則此前雖有淨僧即作為過去而不存在論師因吾國有僧伽而後言整理否則直云向錫蘭接續過來另外重行建立中國之僧伽矣吾所言欲師知吾國非無比丘僧伽乃至現在仍有印度史上整理僧律之事亦有數次故就中國僧伽亦自可整理納個人以為有差別如蘇州靈岩山僧雖較中國他處僧嚴淨但不能以之參加錫蘭僧伽之律儀師在印度往日亦有諸部派之別傳來中國者亦有多派中國持律僧不能參加錫蘭持律僧亦僅如此部僧不能與彼部僧同住耳二十七日大師應丹陽海會寺請啓講佛遺教經凡三日力定記成佛遺教經講要海十六十二現代佛教史料佛教日報十月二十九日大師講人生進善之階段於正則女中胡夢蝶記文三十日大師抵鎮江赴太平寺佛教會之歡迎會翌日大師於中國佛學會鎮江分會講佛法僧義凡三日明性與湧泉合記成佛法僧義廣論海十六十二現代佛教史料按上三條史料均誤作十一月三十日鎮江召開江蘇省會執監委員及各縣代表聯席會議兼歡迎大師以是年圓映主持之中佛會廢除省佛會改三級制為兩級制改常務委員制為理事長制以便直接控制縣會大為諸方不滿投訴內政部及中央黨部醞釀中佛會重組運動適大師在鎮因出席講中佛會實有健全組織之必要略史海十六十一現代佛教史料時中國佛教會為徵求會員問題徵文大師乃發布中國佛教會兩大問題對會章為根本之建議文十一月三日大師在鎮江伯先公園民教館開講八識規矩頌六日圓滿佛教日報十一月十日大師在滬以法尊將入藏擬請其師安東來漢院大師乃致函安東付法尊往迎書十九日大師以閩粵緇素之敦請登輪南下竺摩守志為侍録佛教日報十一月竺摩虛公大師閩粵弘法二月記二十二日大師抵廈門南普陀寺常惺等來歡迎翌日應中國佛學會閩南分會蔡契誠虞佛心等請就廈大旅舍天臺講佛學會與實現佛化海十七一現代佛教史料時閩院學潮時發教者學者均有其責大師為講師生應如何愛護學院文二十六日大師於廈門中山公園通俗教育社講佛教與現代中國佛教日報十二月是月孫馨遠被刺於北平佛教居士林靳智證雲鵬疑及懺悔之無從大師乃發明本性空而業報不爽之義引申以誡日本作覺乎否乎可以覺矣文三十日晨大師偕竺摩蘇慧純抵香港駐錫利園香港佛學分會當日赴東蓮覺苑之歡迎會大師講優婆夷教育與佛化家庭海十七一現代佛教史料佛教日報十二月閩粵弘法二月記按弘法記作二十九日到誤十二月一日應香港各界之歡迎主持者陳靜濤王學仁大師於利園講從香港的感想說到香港的佛教竺摩與陳慧濤靜濤記文七日大師就居士林開講彌勒上生經十日續講八識規矩頌海十七一現代佛教史料佛教日報十二月其間遊荃灣東普陀大埔墟大光園及菩提場大師均有開示在東普陀同成了觀音菩薩阿蘭那行與養成僧寶菩提場之念佛勝義佛教日報十二月十四日大師偕竺摩陳靜濤去廣州駐錫六榕寺廣州佛教會佛教日報一月竺摩為編者說按弘法記作十五日到十五日大師於廣州民衆教育館受佛教界聯合歡迎到鐵禪江孔殷謝英伯江穎叔李因如等大師講禪宗六祖與國民黨總理陳靜濤譯語文竺摩致編者書十六日大師應虛雲之邀去韶關南華寺瞻禮六祖遺身時南華寺開戒答廣州某報記者問十八日大師為南華大衆開示讚揚六祖功德以祝南華之復興十九日還抵廣州大師應中山大學哲學系之約往講佛教與中國文化晚應明德學社社長陳維周之歡宴同席有陳濟棠張之英張君勱等德音孔昭之鄒校長教育談答廣州某報記者問佛教日報一月二十日大師訪蕭佛成以時悲觀等慈等四人所組暹羅留學團奉大師為導師放洋經粵故為請於暹羅豫以方便海十七二現代佛教史料時大師在廣州日應勷勤大學教務長陳定謨約往講三十唯識論晚於高浩文李因如等主持之居士林講心經竺摩致編者書二十五日大師以