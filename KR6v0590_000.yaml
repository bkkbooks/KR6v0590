front:
  text: 太虛大師年譜序吾親教太虛大師精識五明殫心三藏廣長有舌著作等身如是我聞契風幡之不動應無所住善內外而咸通寧但辨才已為破執蓋古之龍樹馬鳴今之道安玄奘也大師弟子印順法師等既集遺文復修年譜攝四藏而都含敘一生以略備將付流通囑為序讚自惟學殖荒疏懼無所應而以主持出版辭復不能乃謹述因緣用志往迹遡昔遜清末葉歲在庚戌大師飛錫杯渡南來出岫無心望白雲而知止流水常定識雙溪而歸宗由是皈依師座誓志真乘卌載追隨倍深瞻仰度生願切護教心誠操持淡而彌真化導巧能並攝功留抗戰訪南洋則載譽歸來教闡人生融中印而精思絡繹真可謂智不足稱歎莫能名者也及其滬濱示滅面澤如生海潮荼毗心臟不壞燦舍利之若晶星珍炭灰其猶拱璧乃得政府褒揚用彰忠哲信徒建塔永紀師宗於戲然法炬以燭昏衢駕慈航而登彼岸而今而後其續其誰悲哲人之長往思大德以方來唯願衆善緣成創出人間淨土料應大慈赴會還自睹史陀天斯則吾佛之本懷既明大師之志行亦暢已佛曆二五一六年第七十七庚寅暮春之月皈戒弟子陳靜濤百拜敬題編者附言豫編太虛大師年譜成而深懼無以知大師蓋編者出家也晚民國十九年秋禮謁大師也晚草三年春親聆其講授也更晚草六年秋於大師早年學業初無所知出家來忝列師門而以致力義學於大師事業少參末議且為學多求諸古籍於大師思想亦多扞格吾何足以知大師然以編纂全書稍積聞思而年譜材料亦云粗備既師友之敦勸亦自惟文獻易失為懼乃勉為纂組成編錯脫處雖不可免然有能深知大師者即其文其事以發其微言探厥本懷則創述或不為無益矣本編於大師學行依年編次以大師為近代佛教唯一大師早年獻身革命中年弘教利群晚年復翊贊抗建體真用俗關涉至多故於敘次大師行蹤之際特著意於下列諸點一大師為中國佛學之大成者長於融貫統攝不拘於臺賢禪淨卓然成家其宗本在妙有之唯心論一再為楞嚴起信等釋難扶宗足以見其宗本之所在一大師自整理僧伽制度論至晚年之菩薩學處應機改建雖有不同而弘揚佛法首重建僧其理想之建僧工作始終未能實現徒招來無謂之毀譽可見建僧之難一大師為僧伽本位者故與時人有僧俗之諍顯密之諍為中國佛學本位者故與時人有起信與唯識之諍融攝以中國佛學融攝日本暹錫蒙藏之長與移植棄中國佛學而專弘其他之諍胥有關近代佛教思想一大師主以佛法應導現代人心而要自學佛者之摧乎僻化神化腐化著手使佛法而可行於斯世捨人生佛教莫由惟其平常乃見偉大一大師主教理教制教産之革新化私為公去腐生新宜其為傳統之住持階級所誹毀其有關中國佛教會之參與及爭衡可以見四十年來中國佛教僧政之一斑一大師真不礙俗深見政教之關係為佛教徒示其軌範或譏其為政僧而大師惟以不克當此為念一大師之東遊日本弘法歐美訪問南洋以及其弟子之留學日本暹羅錫蘭西藏實為中國佛教之國際佛教運動主流一大師之新佛教運動發端而未能完成內部動態之得失亦豫以指出年譜於大師之論事論理以及關乎當時諍論編者間為論斷雖論斷不必盡如人意然重事實之原則不敢忘是故一不斷章以取義凡大師之論事論理擇要引述務於得當不敢意為改易一不依後以改前如大師與圓映之早年友誼決不以晚年之扞格而故為歪曲一不偏聽以自蔽如大師與黃健六有關佛教會之諍與內學院有關中日佛教學會之諍並兩存雙方之説本編行文之義例亦有可言者一本編或依據文獻或采訪師友並為一一敘明以徵信唯民國十九年後有為編者所目見親聞則但直書其事而已一引述作品間有略稱者如太虛自傳之作自傳太虛大師寰遊記之作寰遊記訪問團日記之作訪記我的佛教改進運動略史之作略史潮音草舍詩存之作詩存潮音草舍詩存續集之作詩存續集海潮音之作海覺社叢書之作覺書等一引述大師作品或講記但直書題名其為他人作品則附作者並加括號以別之如葉性禮圓映法師事略一海潮音內容繁多故為分別以便查如海五五時事即為海潮音五卷五期之時事欄一民元以後概用陽曆唯所引文證尤於民國十五年前多用農曆故於月日下別以括號説明之如民元一月一日下有辛亥年十一月十三日一凡文記參差傳説不實回憶謬忘等概為按語考正其不能確定者則兩説以存疑
